name: Backfill Historical Recaps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Pipeline for Each Date Sequentially
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for DATE in 2026-06-12 2026-06-13 2026-06-14 2026-06-15 2026-06-16 2026-06-17 2026-06-18 2026-06-19 2026-06-20 2026-06-21 2026-06-22; do
            echo "--- Processing $DATE ---"
            npm run pipeline:generate -- --date=$DATE --force
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps.json data/stakes.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: backfill historical recaps Jun 12-22 [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
