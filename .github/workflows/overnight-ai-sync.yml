name: Overnight AI Recap Generation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 09:00 BST, after US West Coast late matches end
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to regenerate (YYYY-MM-DD). Leave blank to process yesterday.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            npm run pipeline:generate -- --date=${{ github.event.inputs.date }}
          else
            npm run pipeline:generate
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps.json data/player-verdicts.json public/assets/ai/ai_master.json public/assets/ai/csv/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: daily AI recap sync [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
