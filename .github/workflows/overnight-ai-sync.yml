name: Overnight AI Recap Generation

on:
  schedule:
    # Runs hourly 04:00–12:00 UTC to catch games at any West Coast kick-off time.
    # Self-gating in the script skips each run cheaply if games aren't done yet
    # or if both recap + stakes are already generated.
    # Window is extended to 12:00 UTC to absorb GitHub Actions cron delays (often 2-3h late).
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to regenerate (YYYY-MM-DD). Leave blank to process yesterday.'
        required: false
        default: ''
      force:
        description: 'Skip readiness checks (--force)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date=${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run pipeline:generate -- $ARGS

      - name: Commit and Push
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps.json data/stakes.json data/goal-patches.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: daily AI recap sync [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Recap Ready Notification
        if: steps.commit.outputs.committed == 'true'
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}
        run: npm run notify:recap
