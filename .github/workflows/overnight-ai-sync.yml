name: Overnight AI Recap Generation

on:
  schedule:
    # Runs hourly 04:00–08:00 UTC to catch games at any West Coast kick-off time.
    # Self-gating in the script skips each run cheaply if games aren't done yet
    # or if both recap + stakes are already generated.
    # Latest possible end time: ~9pm PT (3am BST) + 2h = 11pm PT = 07:00 UTC.
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to regenerate (YYYY-MM-DD). Leave blank to process yesterday.'
        required: false
        default: ''
      force:
        description: 'Skip readiness checks (--force)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date=${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run pipeline:generate -- $ARGS

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps.json data/stakes.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: daily AI recap sync [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
