name: Overnight AI Recap Generation

on:
  schedule:
    # Run every 2 hours midnight–noon UTC. The pipeline self-gates:
    # it exits immediately if games aren't all done yet or if the 1h
    # post-game buffer hasn't elapsed, and skips if a recap already exists.
    - cron: '0 0,2,4,6,8,10,12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to regenerate (YYYY-MM-DD). Leave blank to process yesterday.'
        required: false
        default: ''
      force:
        description: 'Skip readiness checks (--force)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date=${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run pipeline:generate -- $ARGS

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps.json data/player-verdicts.json public/assets/ai/ai_master.json public/assets/ai/csv/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: daily AI recap sync [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
