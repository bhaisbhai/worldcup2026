name: Overnight Gen AI Content Generation

on:
  schedule:
    - cron: '0 8 * * *' # Scheduled daily at 08:00 UTC / 09:00 BST (after latest PT kickoffs end)
  workflow_dispatch:   # Allows manual execution testing

permissions:
  contents: write

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environments
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run AI Synthesis Engine Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPORTS_DATA_API_KEY: ${{ secrets.SPORTS_DATA_API_KEY }}
        run: npm run pipeline:generate

      - name: Commit and Push Static Asset Synchronizations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/ai/ai_master.json public/assets/ai/csv/*.csv
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated overnight ai sports summary synchronization [skip ci]"
            git push origin main
          else
            echo "No changes found in generated assets. Skipping repository updates."
          fi
