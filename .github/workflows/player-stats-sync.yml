name: Player Stats Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7,13,19 * * *'  # 3x daily during the tournament

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Player Stats
        run: npm run pipeline:stats

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/player-stats.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: refresh player tournament stats [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
