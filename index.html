// ESPN ↔ BBC name mismatches
const TEAM_ALIASES = {
  'czechia':                      ['czech republic', 'czech'],
  'czech republic':               ['czechia', 'czech'],
  'korea republic':               ['south korea', 'korea'],
  'south korea':                  ['korea republic', 'korea'],
  'united states':                ['usa', 'usmnt', 'us men'],
  'usa':                          ['united states', 'usmnt'],
  'ivory coast':                  ["côte d'ivoire", "cote d'ivoire", 'ivory'],
  "côte d'ivoire":                ['ivory coast', 'ivory', 'cote'],
  'bosnia and herzegovina':       ['bosnia-herzegovina', 'bosnia & herzegovina', 'bosnia'],
  'bosnia-herzegovina':           ['bosnia and herzegovina', 'bosnia'],
  'dr congo':                     ['democratic republic of congo', 'congo dr', 'drc', 'congo'],
  'congo dr':                     ['dr congo', 'democratic republic of congo', 'congo'],
  'democratic republic of congo': ['dr congo', 'drc', 'congo'],
  'trinidad & tobago':            ['trinidad and tobago', 'trinidad'],
  'trinidad and tobago':          ['trinidad & tobago', 'trinidad'],
  'new zealand':                  ['all whites'],
  'saudi arabia':                 ['ksa', 'saudi'],
  'united arab emirates':         ['uae'],
  'north korea':                  ['dpr korea', 'korea dpr'],
  'dpr korea':                    ['north korea', 'korea dpr'],
};

function teamInTitle(title, name){
  const t = title.toLowerCase();
  const n = name.toLowerCase();
  if(t.includes(n)) return true;
  const aliases = TEAM_ALIASES[n] || [];
  if(aliases.some(a => t.includes(a))) return true;
  // Token fallback: any word 5+ chars from the team name found in title
  return n.split(/[\s\-]+/).filter(w => w.length >= 5).some(tok => t.includes(tok));
}

// All aliases for a team, for "v" pattern checking
function teamTokens(name){
  const n = name.toLowerCase();
  const base = [n, ...(TEAM_ALIASES[n] || [])];
  // Also add first significant word
  const sig = n.split(/[\s\-]+/).filter(w => w.length >= 4)[0];
  if(sig && !base.includes(sig)) base.push(sig);
  return base;
}

function hlScore(title, ev){
  const t = title.toLowerCase();
  if(!teamInTitle(t, ev.home.name) || !teamInTitle(t, ev.away.name)) return 0;
  let score = 1;
  // Bonus: BBC "X v Y" pattern using any alias combo
  const hToks = teamTokens(ev.home.name);
  const aToks = teamTokens(ev.away.name);
  const hasV = hToks.some(h => aToks.some(a => t.includes(`${h} v ${a}`) || t.includes(`${a} v ${h}`)));
  if(hasV) score += 1;
  if(t.includes('world cup') || t.includes('2026')) score += 1;
  return score;
}

async function fetchHighlight(ev){
  if(hlCache[ev.id] !== undefined) return;
  hlCache[ev.id] = null;
  try {
    // Use BBC's uploads playlist (real-time, no search index lag, 2 quota units for 100 videos)
    const catalog = await getBBCCatalog();
    const scored = catalog
      .map(v => ({ v, s: hlScore(v.title, ev) }))
      .filter(x => x.s >= 2)
      .sort((a, b) => b.s - a.s);
    const hit = scored[0]?.v;
    if(hit){
      hlCache[ev.id] = { videoId: hit.videoId, title: hit.title };
      document.querySelectorAll(`.mc-thumb-slot[data-hlid="${ev.id}"]`).forEach(slot => {
        slot.replaceWith(buildThumb(hit.videoId, hit.title));
      });
    }
  } catch(e){}
}

function renderScorers(goals){
  if(!goals || !goals.length) return '';
  function group(list){
    const map = new Map();
    list.forEach(g => {
      const k = g.name || 'OG';
      if(!map.has(k)) map.set(k, { name: k, mins: [], og: g.og });
      map.get(k).mins.push(g.min + (g.pen ? ' (p)' : ''));
    });
    return [...map.values()].map(e =>
      `<div${e.og?' class="mc-scorer-og"':''}>${e.name} <span class="mc-scorer-min">${e.mins.join(', ')}</span></div>`
    ).join('');
  }
  const h = group(goals.filter(g =>  g.isHome));
  const a = group(goals.filter(g => !g.isHome));
  if(!h && !a) return '';
  return `<div class="mc-scorers">
    <div class="mc-scorers-h">${h}</div>
    <div class="mc-scorers-gap"></div>
    <div class="mc-scorers-a">${a}</div>
  </div>`;
}

      </div>
    `;

  }

  card.innerHTML = `
    <div class="mc-top">
      ${badge || '<div></div>'}
      <div class="mc-grp">${ev.group}<br><span class="mc-tv-uk">${getUKChannel(ev.home.abbr,ev.away.abbr)}</span></div>

function fmtDate(d){
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function shiftDate(d, delta){
  const n = new Date(d); n.setDate(n.getDate()+delta); return n;
}
function isToday(d){
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function renderDayNav(d){
  let nav = $('day-nav');
  if(!nav){
    nav = el('div','day-nav'); nav.id='day-nav';
    $('today-content').prepend(nav);

  const prev = shiftDate(d,-1);
  const next = shiftDate(d, 1);
  const isTod = isToday(d);
  nav.innerHTML = `
    <div class="dnav-row">
      <button class="dnav-btn" id="navPrev" title="${fmtDate(prev)}">‹</button>
      <div class="dnav-center">

      <button class="dnav-today" id="navToday">Back to Today</button>
    </div>`;
  $('navPrev').onclick = () => goToDate(shiftDate(d,-1));
  $('navNext').onclick = () => goToDate(shiftDate(d, 1));

}

function goToDate(d){

function patchCard(card, ev){
  const isLive = ev.state==='in';
  const isFt   = ev.state==='post';
  const isUp   = ev.state==='pre';

  card.className = `mc${isLive?' live':isFt?' ft':isUp?' up':''} vis`;

  const badge = card.querySelector('.mc-badge');
  if(badge){
    badge.className = `mc-badge ${isLive?'live':isFt?'ft':'up'}`;
    badge.textContent = isLive?'● Live':isFt?'FT':'';
  }

  if(ev.state !== 'pre'){
    const scs = card.querySelectorAll('.sc:not(.vs)');
    if(scs[0]) scs[0].textContent = ev.home.score;
    if(scs[1]) scs[1].textContent = ev.away.score;
  }

  const tnames = card.querySelectorAll('.tname');
  if(tnames[0]) tnames[0].classList.toggle('winner', ev.home.winner);
  if(tnames[1]) tnames[1].classList.toggle('winner', ev.away.winner);

  const footL = card.querySelector('.mc-min,.mc-ft-time,.mc-cd,.mc-kickoff');
  if(footL){
    if(isLive){
      const next = document.createElement('div');
      next.className = ev.isHT ? 'mc-min ht' : 'mc-min';
      if(ev.isHT){ next.textContent='HT'; }
      else { next.dataset.clockid=ev.id; next.textContent=ev.displayClock; }
      footL.replaceWith(next);
    } else if(isFt){
      const next = document.createElement('div');
      next.className='mc-ft-time'; next.textContent='Full Time';
      footL.replaceWith(next);
    } else {
      // still pre — update the countdown child inside the kickoff wrapper
      const cd = footL.classList.contains('mc-kickoff')
        ? footL.querySelector('[data-cdid]')
        : footL;
      if(cd){ cd.dataset.cdid=ev.id; cd.dataset.ts=ev.date.getTime(); }
    }
  }

  // Add thumbnail when match finishes
  const existingThumb = card.querySelector('.mc-thumb,.mc-thumb-slot');
  if(isFt && !existingThumb){
    const cached = hlCache[ev.id];
    if(cached?.videoId){
      card.append(buildThumb(cached.videoId, cached.title));
    } else {
      const slot = document.createElement('div');
      slot.className = 'mc-thumb-slot';
      slot.dataset.hlid = ev.id;
      card.append(slot);
      fetchHighlight(ev);
    }
  } else if(!isFt && existingThumb){
    existingThumb.remove();
  }
}

function renderToday(events, dayDate, patch){
  const wrap = $('today-content');
  const live     = events.filter(e=>e.state==='in');
  const finished = events.filter(e=>e.state==='post');
  const upcoming = events.filter(e=>e.state==='pre');

  $('livePill').classList.toggle('hidden', live.length===0);

  // Resolve the display date — use local new Date() when viewing today so timezone offsets don't shift the day label
  const dispDate = browseDate || new Date();

  // --- patch mode: update existing cards without wiping the DOM ---
  if(patch){
    renderDayNav(dispDate);

    const existingIds = new Set([...wrap.querySelectorAll('.mc[data-ev-id]')].map(c=>c.dataset.evId));
    const newIds      = new Set(events.map(e=>e.id));

    // patch or add
    events.forEach(ev => {
      const card = wrap.querySelector(`.mc[data-ev-id="${ev.id}"]`);
      if(card){ patchCard(card, ev); }
      else {
        // new event appeared — full re-render is simpler; just rebuild
        patch = false;
      }
    });
    // remove disappeared events
    existingIds.forEach(id => {
      if(!newIds.has(id)){
        const c = wrap.querySelector(`.mc[data-ev-id="${id}"]`); if(c) c.remove();
      }
    });

    if(patch){
      live.forEach(ev => {
        if(!ev.isHT) liveClocks[ev.id] = { minute:parseMinute(ev.displayClock), raw:ev.displayClock, fetchedAt:Date.now() };
      });
      return;
    }
  }

  // --- full render ---
  // preserve nav if it exists
  const navEl = $('day-nav');
  wrap.innerHTML = '';
  if(navEl) wrap.append(navEl);

  renderDayNav(dispDate);

  // Daily recap card — contextual to the viewed day
  renderSummary(wrap, dispDate);

  if(events.length===0){
    wrap.append(el('div','empty','No matches scheduled · Use the arrows to browse other days'));
    return;
  }

  function section(badge_html, list){
    if(!list.length) return;
    const hd = el('div','sec-hd');
    hd.innerHTML = badge_html+`<span class="sc-count">${list.length} match${list.length>1?'es':''}</span>`;
    wrap.append(hd);
    const g = el('div','mgrid');
    list.forEach((ev,i) => {
      const c = buildCard(ev);
      c.dataset.delay = i*50;
      c.onclick = () => openMatchModal(ev);
      g.append(c);
    });
    wrap.append(g);
  }

  section(`<div class="sbadge live"><div class="rd"></div>Live Now</div>`, live);
  section(`<div class="sbadge up">🕐 Upcoming</div>`, upcoming);
  section(`<div class="sbadge ft">✓ Finished</div>`, finished);

  live.forEach(ev => {
    if(!ev.isHT) liveClocks[ev.id] = { minute:parseMinute(ev.displayClock), raw:ev.displayClock, fetchedAt:Date.now() };
  });

  setTimeout(observeCards, 30);

}

let _recapRows = [];

function parseCSV(text){
  const lines = text.trim().split('\n');
  const headers = csvRow(lines[0]);
  return lines.slice(1).map(line => {
    const vals = csvRow(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  });
}

function csvRow(line){
  const out=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c===','&&!inQ){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}

      const rows = await r.json();

function fmtRecapDate(iso){
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}

function dismissRecap(date, e){
  e.stopPropagation();
  localStorage.setItem('recap_dismissed', date);
  const card = document.querySelector('.recap-card');
  if(card) card.remove();
}

function renderSummary(container, dispDate){
  if(!_recapRows.length) return;
  const todayStr = new Date().toLocaleDateString('en-CA');
  const yd = new Date(); yd.setDate(yd.getDate()-1);
  const yesterdayStr = yd.toLocaleDateString('en-CA');
  const ds = dispDate ? dispDate.toLocaleDateString('en-CA') : todayStr;
  const isToday = ds === todayStr;
  // Only fall back to the most recent recap if it is from exactly yesterday — not older
  const row = _recapRows.find(r => r.date === ds) ||
    (isToday && _recapRows[0]?.date === yesterdayStr ? _recapRows[0] : null);
  if(!row) return;
  if(isToday && localStorage.getItem('recap_dismissed') === row.date) return;
  const isYesterday = isToday && row.date === yesterdayStr;
  // Time gate: only show the "Yesterday" card before noon local time
  if(isYesterday && new Date().getHours() >= 12) return;
  const label = isYesterday ? 'Yesterday' : (row.date === todayStr ? 'Today' : fmtRecapDate(row.date));
  const card = document.createElement('div');
  card.className = 'recap-card';
  card.onclick = function(e){ if(!e.target.closest('.recap-dismiss')) this.classList.toggle('open'); };
  const isNewFormat = !!row.summary;
  const progressionText = row.progression || row.progressionNews || '';
  const resultsSection = isYesterday ? `<div class="recap-results" id="recap-res-${row.date.replace(/-/g,'')}"><div class="recap-section-lbl">Results</div><div style="font-size:11px;color:rgba(255,255,255,.35);padding-top:4px">Loading…</div></div>` : '';
  card.innerHTML =
    `<div class="recap-hdr">
      <span class="recap-pill">${label}</span>
      <span class="recap-hl">${isNewFormat ? row.summary : (row.headline||'')}</span>
      <button class="recap-dismiss" onclick="dismissRecap('${row.date}',event)" title="Dismiss">✕</button>
    </div>
    <div class="recap-body"><div class="recap-body-inner">
      ${!isNewFormat && row.theDrama ? `<div class="recap-section"><div class="recap-section-lbl">The Drama</div><div class="recap-section-txt">${row.theDrama}</div></div>` : ''}
      ${!isNewFormat && row.mustWatchHighlights ? `<div class="recap-section"><div class="recap-section-lbl">Watch / Skip</div><div class="recap-section-txt">${row.mustWatchHighlights}</div></div>` : ''}
      ${progressionText ? `<div class="recap-section"><div class="recap-section-lbl">Progression</div><div class="recap-section-txt">${progressionText}</div></div>` : ''}
      ${resultsSection}
    </div></div>`;
  const nav = container.querySelector('#day-nav');
  if(nav && nav.nextSibling) container.insertBefore(card, nav.nextSibling);
  else container.append(card);
  if(isYesterday) fetchRecapResults(row.date, card);
}

async function fetchRecapResults(date, card){
  try {
    const ds = date.replace(/-/g,'');
    const r = await fetch(`${ESPN_URL}?dates=${ds}`, { signal: AbortSignal.timeout(8000) });
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    const events = (data.events||[]).map(parseEvent).filter(e => e.state==='post');
    const el = card.querySelector(`#recap-res-${ds}`);
    if(!el) return;
    if(!events.length){ el.remove(); return; }
    const rows = events.map(ev =>
      `<div class="recap-result-row">
        <div class="recap-result-home">${flag(ev.home.abbr)} ${ev.home.name}</div>
        <div class="recap-result-score">${ev.home.score}–${ev.away.score}</div>
        <div class="recap-result-away">${ev.away.name} ${flag(ev.away.abbr)}</div>
      </div>`).join('');
    el.innerHTML = `<div class="recap-section-lbl">Results</div><div>${rows}</div>`;
  } catch(e){
    const ds = date.replace(/-/g,'');
    card.querySelector(`#recap-res-${ds}`)?.remove();
  }
}

async function fetchMatches(){
  setRefreshLabel('↻ Refreshing…', true);
  $('rfLabel').style.pointerEvents = 'none';
  const isPatch = lastEvents.length > 0 && !document.querySelector('.skel-grid');
  const dateParam = '?dates=' + (browseDate ? localDateStr(browseDate) : todayStr());
  try {
    const r = await fetch(ESPN_URL+dateParam, { signal: AbortSignal.timeout(8000) });
    if(!r.ok) throw new Error(`${r.status}`);
    const data = await r.json();
    const raw = data.events || [];
    const events = raw.map(parseEvent);

    // Goal celebration — detect score increases on live matches
    if(lastEvents.length > 0){
      const prev = {};
      lastEvents.forEach(e => { prev[e.id] = { h: parseInt(e.home.score)||0, a: parseInt(e.away.score)||0 }; });
      events.forEach(ev => {
        if(ev.state !== 'in') return;
        const p = prev[ev.id];
        if(!p) return;
        if((parseInt(ev.home.score)||0) > p.h || (parseInt(ev.away.score)||0) > p.a) showGoalCelebration();
      });
    }

    lastEvents = events;
    const dayLabel = data.day?.date || '';
    renderToday(events, dayLabel, isPatch);
    // Track which groups play today (only when viewing today's date)
    if(!browseDate){
      todayGroupIds = new Set(
        events.map(e => (e.group||'').match(/Group\s+([A-L])/i)?.[1]).filter(Boolean)
      );
      highlightTodayGroups();
    }
    hideErr();
  } catch(e){
    if(lastEvents.length === 0) showErr();
  }
  const hasLive = lastEvents.some(e => e.state === 'in');
  setRefreshLabel('↻ Refresh', false);
  $('rfLabel').style.pointerEvents = '';
  setTimeout(fetchMatches, hasLive ? 10000 : 30000);
}

let radialZoomScale = 1;
let radialPanX = 0;
let radialPanY = 0;

function applyRadialTransform() {
  const zoomGroup = document.getElementById('radial-zoom-group');
  if (zoomGroup) {
    zoomGroup.setAttribute('transform', `translate(${radialPanX}, ${radialPanY}) scale(${radialZoomScale})`);
  }
}

window.adjustRadialZoom = function(factor) {
  radialZoomScale = Math.min(3, Math.max(0.5, radialZoomScale * factor));
  applyRadialTransform();
};

window.resetRadialZoom = function() {
  radialZoomScale = 1;
  radialPanX = 0;
  radialPanY = 0;
  applyRadialTransform();
};

function setupRadialZoomEvents(svgEl) {
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let startPanX = 0;
  let startPanY = 0;
  
  let initialDist = 0;
  let startScale = 1;

  svgEl.addEventListener('mousedown', (e) => {
    if (e.target.closest('.kc-team') || e.target.closest('.radial-zoom-controls')) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startPanX = radialPanX;
    startPanY = radialPanY;
    svgEl.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    radialPanX = startPanX + dx;
    radialPanY = startPanY + dy;
    applyRadialTransform();
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      svgEl.style.cursor = 'default';
    }
  });

  svgEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    
    const rect = svgEl.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const groupX = (mouseX - radialPanX) / radialZoomScale;
    const groupY = (mouseY - radialPanY) / radialZoomScale;
    
    radialZoomScale = Math.min(3, Math.max(0.5, radialZoomScale * factor));
    
    radialPanX = mouseX - groupX * radialZoomScale;
    radialPanY = mouseY - groupY * radialZoomScale;
    
    applyRadialTransform();
  }, { passive: false });

  svgEl.addEventListener('touchstart', (e) => {
    if (e.target.closest('.kc-team')) return;
    
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startPanX = radialPanX;
      startPanY = radialPanY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      initialDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      startScale = radialZoomScale;
    }
  });

  svgEl.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      radialPanX = startPanX + dx;
      radialPanY = startPanY + dy;
      applyRadialTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (initialDist > 0) {
        const factor = dist / initialDist;
        radialZoomScale = Math.min(3, Math.max(0.5, startScale * factor));
        applyRadialTransform();
      }
    }
  }, { passive: true });

  svgEl.addEventListener('touchend', (e) => {
    isDragging = false;
    if (e.touches.length < 2) {
      initialDist = 0;
    }
  });
}

function findESPNEvent(m){
  if(!koEvents || koEvents.length === 0) return null;
  const clean = n => {
    if (!n) return '';
    const s = n.toLowerCase().trim();
    if (s === 'usa' || s === 'united states') return 'usa';
    if (s === 'congo dr' || s === 'dr congo' || s === 'cod') return 'congo dr';
    return s;
  };
  return koEvents.find(ev => {
    if(m.hResolved && m.aResolved){
      const evH = clean(ev.home.name);
      const evA = clean(ev.away.name);
      const mH = clean(m.hName);
      const mA = clean(m.aName);
      const normalMatch = (evH.includes(mH) || mH.includes(evH)) && (evA.includes(mA) || mA.includes(evA));
      const invertedMatch = (evH.includes(mA) || mA.includes(evH)) && (evA.includes(mH) || mH.includes(evA));
      if (normalMatch || invertedMatch) return true;
    }
    const evDateStr = ev.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    if(evDateStr === m.date && ev.city.toLowerCase() === m.city.toLowerCase()) return true;
    return false;
  });
}

function getResolvedMatchesMap(){
  const matchesMap = {};

  function resolve(label){
    const wMatch = label?.match(/^W M(\d+)$/);
    if(wMatch){
      const parentNum = parseInt(wMatch[1]);
      const parent = matchesMap[parentNum];
      if(parent && parent.winnerName){
        return { name: parent.winnerName, flag: parent.winnerFlag, resolved: true };
      }
      return { name: label, flag: '🏳️', resolved: false };
    }
    const flagEmoji = flag(label);
    return { name: label, flag: flagEmoji, resolved: flagEmoji !== '🏳️' };
  }

  function processRound(matchesList, roundKey){
    matchesList.forEach(m => {
      const homeInfo = resolve(m.h);
      const awayInfo = resolve(m.a);
      const matchObj = {
        num: m.num,
        hLabel: m.h,
        aLabel: m.a,
        hName: homeInfo.name,
        hFlag: homeInfo.flag,
        hResolved: homeInfo.resolved,
        hSlot: null,
        aName: awayInfo.name,
        aFlag: awayInfo.flag,
        aResolved: awayInfo.resolved,
        aSlot: null,
        stad: m.stad,
        city: m.city,
        date: m.date,
        roundKey,
        hScore: null,
        aScore: null,
        winnerName: null,
        winnerFlag: null,
        state: 'pre',
        espnEvent: null
      };
      const ev = findESPNEvent(matchObj);
      if(ev){
        matchObj.espnEvent = ev;
        matchObj.state = ev.state;
        if(ev.home.name && ev.home.name !== 'TBD'){
          matchObj.hName = ev.home.name;
          matchObj.hFlag = flag(ev.home.abbr);
          matchObj.hResolved = true;
        }
        if(ev.away.name && ev.away.name !== 'TBD'){
          matchObj.aName = ev.away.name;
          matchObj.aFlag = flag(ev.away.abbr);
          matchObj.aResolved = true;
        }
        if(ev.state !== 'pre'){
          matchObj.hScore = ev.home.score;
          matchObj.aScore = ev.away.score;
          if(ev.home.winner){
            matchObj.winnerName = matchObj.hName;
            matchObj.winnerFlag = matchObj.hFlag;
          } else if(ev.away.winner){
            matchObj.winnerName = matchObj.aName;
            matchObj.winnerFlag = matchObj.aFlag;
          }
        }
      }
      matchesMap[m.num] = matchObj;
    });
  }

  processRound(KO_DATA.left.r32, 'r32');
  processRound(KO_DATA.left.r16, 'r16');
  processRound(KO_DATA.left.qf, 'qf');
  processRound(KO_DATA.left.sf, 'sf');
  processRound(KO_DATA.right.r32, 'r32');
  processRound(KO_DATA.right.r16, 'r16');
  processRound(KO_DATA.right.qf, 'qf');
  processRound(KO_DATA.right.sf, 'sf');
  processRound([{ num: 104, h: 'W M101', a: 'W M102', stad: 'MetLife Stadium', city: 'East Rutherford', date: 'Jul 19' }], 'final');

  return matchesMap;
}

function renderBracketTree(){
  const container = $('bracket');
  if(!container) return;
  const svg = $('bracket-svg');
  container.innerHTML = '';
  container.append(svg);
  if(svg) svg.innerHTML = '';

  const matchesMap = getResolvedMatchesMap();

  function buildMatchCard(mNum){
    const m = matchesMap[mNum];
    if(!m) return '';
    const hTBD = !m.hResolved;
    const aTBD = !m.aResolved;
    const hWin = m.winnerName === m.hName;
    const aWin = m.winnerName === m.aName;
    let hScoreHtml = '';
    let aScoreHtml = '';
    if(m.state !== 'pre' && m.hScore !== null && m.aScore !== null){
      hScoreHtml = `<span class="bt-score">${m.hScore}</span>`;
      aScoreHtml = `<span class="bt-score">${m.aScore}</span>`;
      const hEv = m.espnEvent?.home;
      const aEv = m.espnEvent?.away;
      if(hEv?.shootoutScore !== null && hEv?.shootoutScore !== undefined &&
         aEv?.shootoutScore !== null && aEv?.shootoutScore !== undefined){
        hScoreHtml += `<span class="bt-pens">(${hEv.shootoutScore})</span>`;
        aScoreHtml += `<span class="bt-pens">(${aEv.shootoutScore})</span>`;
      }
    }
    let statusLabel = '';
    if(m.state === 'in'){
      const displayClock = m.espnEvent?.displayClock || 'LIVE';
      statusLabel = `<span class="mc-min" style="font-size:8px;padding:1px 4px;margin-left:auto;background:#f97316;color:#fff">${displayClock}</span>`;
    }
    const tvChannel = getUKChannel(m.espnEvent?.home?.abbr || '', m.espnEvent?.away?.abbr || '');

      <div class="bm" data-mid="${m.num}" data-team-h="${m.hName}" data-team-a="${m.aName}" onclick="handleKOMatchClick(${m.num})">

  if(koActiveSide === 'left'){
    container.append(mkKORoundColumn('Round of 32',    KO_DATA.left.r32,  'r32'));

  const container = $('ko-list-container');
  if(!container) return;
  const matchesMap = getResolvedMatchesMap();
  const matches = Object.values(matchesMap).filter(m => m.roundKey === koActiveRound);
  if(matches.length === 0){
    container.innerHTML = `<div class="empty">No matches scheduled for this round.</div>`;
    return;
  }
  container.innerHTML = matches.map(m => {
    const hTBD = !m.hResolved;
    const aTBD = !m.aResolved;
    const hWin = m.winnerName === m.hName;
    const aWin = m.winnerName === m.aName;
    let scoreDisplay = `<span class="ko-lm-score-sep">vs</span>`;
    if(m.state !== 'pre' && m.hScore !== null && m.aScore !== null){
      let hPensHtml = '';
      let aPensHtml = '';
      const hEv = m.espnEvent?.home;
      const aEv = m.espnEvent?.away;
      if(hEv?.shootoutScore !== null && hEv?.shootoutScore !== undefined &&
         aEv?.shootoutScore !== null && aEv?.shootoutScore !== undefined){
        hPensHtml = `<span class="bt-pens">(${hEv.shootoutScore})</span>`;
        aPensHtml = `<span class="bt-pens">(${aEv.shootoutScore})</span>`;
      }
      scoreDisplay = `<span class="ko-lm-score ${hWin ? 'win' : ''}">${m.hScore}${hPensHtml}</span><span class="ko-lm-score-sep">–</span><span class="ko-lm-score ${aWin ? 'win' : ''}">${m.aScore}${aPensHtml}</span>`;
    }
    let statusBadge = '';
    if(m.state === 'in'){
      statusBadge = `<span class="mc-min" style="background:#f97316;color:#fff">${m.espnEvent?.displayClock || 'LIVE'}</span>`;
    } else if(m.state === 'post'){
      statusBadge = `<span class="mc-badge ft">FT</span>`;
    } else {
      statusBadge = `<span class="mc-badge up">${m.date}</span>`;
    }
    const tvChannel = getUKChannel(m.espnEvent?.home?.abbr || '', m.espnEvent?.away?.abbr || '');
    const tvLabel = tvChannel ? `<span class="ko-lm-tv">${tvChannel}</span>` : '';
    return `
      <div class="ko-list-match" onclick="handleKOMatchClick(${m.num})">
        <div class="ko-lm-header">
          <span>Match ${m.num} · ${m.stad}</span>
          ${tvLabel || statusBadge}
        </div>
        <div class="ko-lm-teams">
          <div class="ko-lm-team home ${hWin ? 'win' : ''}">
            <span class="bf" style="font-size:16px">${m.hFlag}</span>
            <span class="${hTBD ? 'tbd' : ''}">${m.hName}</span>
          </div>
          <div class="ko-lm-score-wrap">${scoreDisplay}</div>
          <div class="ko-lm-team away ${aWin ? 'win' : ''}">
            <span class="${aTBD ? 'tbd' : ''}">${m.aName}</span>
            <span class="bf" style="font-size:16px">${m.aFlag}</span>
          </div>
        </div>
        <div class="ko-lm-footer">
          <span>${m.city}</span>
          <span>${m.espnEvent?.detail?.split(' at ')?.[1] || ''}</span>
        </div>
      </div>`;
  }).join('');
}

function renderCircularBracket(){
  const container = $('ko-circular-container');
  if(!container) return;

  const matchesMap = getResolvedMatchesMap();
  const W = 850, H = 850, cx = W/2, cy = H/2;
  const radialMatrix = {
    t1_out: 380, t1_in: 330,
    t2_out: 260, t2_in: 210,
    t3_out: 150, t3_in: 110,
    t4_out: 70,  t4_in: 45
  };
  const NEON = '#00ff87', NEON2 = '#60efff';

  // poolOuter flags from Cuppy (re-ordered for Right side match alignment)
  const poolOuterFlags = [
    "🇨🇦", "🇲🇦", "🇵🇾", "🇫🇷", "🇧🇷", "🇨🇮", "🇲🇽", "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
    "🇺🇸", "🇧🇪", "🇪🇸", "🇵🇹", "🇨🇭", "🇨🇴", "🇦🇷", "🇦🇺"
  ];
  const poolOuterNames = [
    "Canada", "Morocco", "Paraguay", "France", "Brazil", "Ivory Coast", "Mexico", "England",
    "USA", "Belgium", "Spain", "Portugal", "Switzerland", "Colombia", "Argentina", "Australia"
  ];

  const rayR32Matches = [
    73, 75, 74, 77, 76, 78, 79, 80,
    81, 82, 84, 83, 85, 87, 86, 88
  ];
  const rayR16Matches = [
    90, 89, 91, 92, 94, 93, 96, 95
  ];
  const rayQFMatches = [
    97, 98, 99, 100
  ];
  const raySFMatches = [
    101, 102
  ];

  function toRad(d){ return d * Math.PI / 180; }
  function pt(r, deg){
    const rad = toRad(deg);
    return { x: +(cx + r*Math.cos(rad)).toFixed(2), y: +(cy + r*Math.sin(rad)).toFixed(2) };
  }

  // Radial bracket path from Cuppy
  function getRadialBracketPath(r1, a1, r2, a2, r_mid) {
    const p1 = pt(r1, a1);
    if (Math.abs(a1 - a2) < 0.001) {
      const p2 = pt(r2, a2);
      return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
    }
    const pm1 = pt(r_mid, a1);
    const pm2 = pt(r_mid, a2);
    const p2 = pt(r2, a2);
    let diff = a2 - a1;
    while (diff < -180) diff += 360;
    while (diff > 180) diff -= 360;
    const sweepFlag = diff >= 0 ? 1 : 0;
    return `M ${p1.x} ${p1.y} L ${pm1.x} ${pm1.y} A ${r_mid} ${r_mid} 0 0 ${sweepFlag} ${pm2.x} ${pm2.y} L ${p2.x} ${p2.y}`;
  }

  const nodes = [];
  const nodesMap = {};

  function addNode(id, r, angle, name, flag, won, matchNum, parentId) {
    const coord = pt(r, angle);
    const nodeObj = {
      id,
      cx: coord.x,
      cy: coord.y,
      r,
      angle,
      name: name || 'TBD',
      flag: flag || '🏳️',
      won: !!won,
      matchNum,
      parentId
    };
    nodes.push(nodeObj);
    nodesMap[id] = nodeObj;
  }

  // 1. Tier 1 (Round of 32)
  for (let i = 0; i < 16; i++) {
    const angle = i * 22.5 - 90;
    const mNum = rayR32Matches[i];
    const md = matchesMap[mNum];
    const isHomeOuter = md && (md.hFlag === poolOuterFlags[i] || md.hName === poolOuterNames[i]);
    
    const outName = isHomeOuter ? md?.hName : md?.aName;
    const outFlag = isHomeOuter ? md?.hFlag : md?.aFlag;
    const outWon = md?.winnerName && md.winnerName === outName;

    const inName = isHomeOuter ? md?.aName : md?.hName;
    const inFlag = isHomeOuter ? md?.aFlag : md?.hFlag;
    const inWon = md?.winnerName && md.winnerName === inName;

    const nextTierIndex = Math.floor(i / 2);
    const routesToOuter = (i % 2 === 0);
    const targetParentId = `t2-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t1-out-${i}`, radialMatrix.t1_out, angle, outName, outFlag, outWon, mNum, `t1-in-${i}`);
    addNode(`t1-in-${i}`, radialMatrix.t1_in, angle, inName, inFlag, inWon, mNum, targetParentId);
  }

  // 2. Tier 2 (Round of 16)
  for (let k = 0; k < 8; k++) {
    const angle = k * 45 - 90 + 11.25;
    const mNum = rayR16Matches[k];
    const md = matchesMap[mNum];

    const outName = md?.hName;
    const outFlag = md?.hFlag;
    const outWon = md?.winnerName && md.winnerName === outName;

    const inName = md?.aName;
    const inFlag = md?.aFlag;
    const inWon = md?.winnerName && md.winnerName === inName;

    const nextTierIndex = Math.floor(k / 2);
    const routesToOuter = (k % 2 === 0);
    const targetParentId = `t3-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t2-out-${k}`, radialMatrix.t2_out, angle, outName, outFlag, outWon, mNum, `t2-in-${k}`);
    addNode(`t2-in-${k}`, radialMatrix.t2_in, angle, inName, inFlag, inWon, mNum, targetParentId);
  }

  // 3. Tier 3 (Quarterfinals)
  for (let m = 0; m < 4; m++) {
    const angle = m * 90 - 90 + 5.625;
    const mNum = rayQFMatches[m];
    const md = matchesMap[mNum];

    const outName = md?.hName;
    const outFlag = md?.hFlag;
    const outWon = md?.winnerName && md.winnerName === outName;

    const inName = md?.aName;
    const inFlag = md?.aFlag;
    const inWon = md?.winnerName && md.winnerName === inName;

    const nextTierIndex = Math.floor(m / 2);
    const routesToOuter = (m % 2 === 0);
    const targetParentId = `t4-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t3-out-${m}`, radialMatrix.t3_out, angle, outName, outFlag, outWon, mNum, `t3-in-${m}`);
    addNode(`t3-in-${m}`, radialMatrix.t3_in, angle, inName, inFlag, inWon, mNum, targetParentId);
  }

  // 4. Tier 4 (Semifinals)
  for (let s = 0; s < 2; s++) {
    const angle = s * 180 - 90 + 2.8125;
    const mNum = raySFMatches[s];
    const md = matchesMap[mNum];

    const outName = md?.hName;
    const outFlag = md?.hFlag;
    const outWon = md?.winnerName && md.winnerName === outName;

    const inName = md?.aName;
    const inFlag = md?.aFlag;
    const inWon = md?.winnerName && md.winnerName === inName;

    addNode(`t4-out-${s}`, radialMatrix.t4_out, angle, outName, outFlag, outWon, mNum, `t4-in-${s}`);
    addNode(`t4-in-${s}`, radialMatrix.t4_in, angle, inName, inFlag, inWon, mNum, 'masterHub');
  }

  // Champion
  const fm = matchesMap[104];
  const champFlag = fm?.winnerFlag && fm.winnerFlag !== '🏳️' ? fm.winnerFlag : '';
  const champName = fm?.winnerName || '';

  // Draw concentric guides
  const svgGuides = [];
  const rings = [
    { size: 380 * 2, type: 'solid' },
    { size: 330 * 2, type: 'dashed' },
    { size: 260 * 2, type: 'solid' },
    { size: 210 * 2, type: 'dashed' },
    { size: 150 * 2, type: 'solid' },
    { size: 110 * 2, type: 'dashed' },
    { size: 70 * 2,  type: 'solid' },
    { size: 45 * 2,  type: 'dashed' }
  ];
  rings.forEach(rg => {
    const strokeDash = rg.type === 'dashed' ? 'stroke-dasharray="3 6"' : '';
    svgGuides.push(`<circle cx="${cx}" cy="${cy}" r="${rg.size / 2}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" ${strokeDash}/>`);
  });

  // Draw lines
  const svgLines = [];
  nodes.forEach(node => {
    if (!node.parentId) return;
    let r2 = 0;
    let a2 = node.angle;

    if (node.parentId !== 'masterHub') {
      const parent = nodesMap[node.parentId];
      if (!parent) return;
      r2 = parent.r;
      a2 = parent.angle;
    } else {
      r2 = 0;
      a2 = node.angle;
    }

    const isProg = node.won;
    const r_mid = (node.r + r2) / 2;
    const pathD = getRadialBracketPath(node.r, node.angle, r2, a2, r_mid);

    let strokeColor = 'rgba(255, 255, 255, 0.15)';
    let strokeWidth = 1.5;
    let filterStyle = '';

    if (isProg) {
      strokeColor = 'rgba(0, 255, 135, 0.65)';
      strokeWidth = 2.5;
      filterStyle = 'filter="url(#neonArc)"';
    }

    svgLines.push(`<path id="pipe-${node.id}" d="${pathD}" fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" ${filterStyle} style="transition: stroke 0.3s, stroke-width 0.3s; pointer-events: none;"/>`);
  });

  // Draw flag circles (nodes)
  const svgNodes = [];
  nodes.forEach(node => {
    const isTBD = !node.flag || node.flag === '🏳️' || !node.name || /Winner|Runner-up|TBD|W M\d/.test(node.name);
    
    let tr = 20;
    let fs = 15;
    if (node.id.startsWith('t1-')) { tr = 20; fs = 16; }
    else if (node.id.startsWith('t2-')) { tr = 18; fs = 14; }
    else if (node.id.startsWith('t3-')) { tr = 16; fs = 12; }
    else if (node.id.startsWith('t4-')) { tr = 14; fs = 10; }

    const bgFill = node.won ? 'rgba(0, 255, 135, 0.18)' : isTBD ? 'rgba(30, 35, 45, 0.85)' : 'rgba(15, 20, 30, 0.93)';
    const stroke = node.won ? 'rgba(0, 255, 135, 0.75)' : isTBD ? 'rgba(255, 255, 255, 0.08)' : 'rgba(255, 255, 255, 0.22)';
    const sw = node.won ? 2.2 : 1.2;
    const filterStyle = node.won ? 'filter="url(#neonNode)"' : '';

    svgNodes.push(`
      <g class="kc-team radial-node-group" id="node-${node.id}" onclick="handleKOMatchClick(${node.matchNum})" style="cursor:pointer" data-id="${node.id}" data-name="${(node.name||'').replace(/"/g,"'")}">
        <clipPath id="clip-${node.id}">
          <circle cx="${node.cx}" cy="${node.cy}" r="${tr}" />
        </clipPath>
        <circle cx="${node.cx}" cy="${node.cy}" r="${tr}" fill="${bgFill}" stroke="${stroke}" stroke-width="${sw}" ${filterStyle} style="transition: transform 0.2s, stroke 0.2s; transform-origin: ${node.cx}px ${node.cy}px;">
          <title>${node.name}</title>
        </circle>
        <text x="${node.cx}" y="${node.cy}" text-anchor="middle" dominant-baseline="central"
          font-size="${isTBD ? Math.round(fs * 0.7) : Math.round(fs * 2.52)}" clip-path="url(#clip-${node.id})" style="pointer-events:none;user-select:none"
          fill="${isTBD ? 'rgba(255,255,255,0.22)' : '#fff'}">${isTBD ? '?' : node.flag}</text>
      </g>
    `);
  });

  // Trophy in center
  const centerFill = champName ? 'rgba(0, 255, 135, 0.1)' : 'rgba(255, 215, 0, 0.05)';
  const centerStroke = champName ? '#00ff87' : 'rgba(255, 215, 0, 0.25)';
  const centerFilter = champName ? 'filter="url(#neonNode)"' : '';

  svgNodes.push(`
    <g class="radial-node-group" id="node-masterHub" onclick="handleKOMatchClick(104)" style="cursor:pointer" data-id="masterHub" data-name="${(champName || 'Champion TBD').replace(/"/g,"'")}">
      <circle cx="${cx}" cy="${cy}" r="42" fill="${centerFill}" stroke="${centerStroke}" stroke-width="2" ${centerFilter}/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="28" style="pointer-events:none">🏆</text>
      ${champFlag ? `<text x="${cx}" y="${cy + 56}" text-anchor="middle" font-size="12" fill="#00ff87" font-weight="700" style="pointer-events:none">${champFlag} ${getTeamAbbreviation(champName)}</text>` : ''}
    </g>
  `);

  const DEFS = `<defs>
    <radialGradient id="tGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${NEON}" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="${NEON}" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonArc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="${NEON}" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonNode" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feFlood flood-color="${NEON}" flood-opacity="0.75" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonBadge" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feFlood flood-color="${NEON2}" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  const svgEl = `<svg id="radial-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
    style="width:min(100vw, 850px);display:block;margin:0 auto;overflow:hidden">
    ${DEFS}
    <rect width="${W}" height="${H}" fill="rgba(10,13,20,0.4)" rx="12"/>
    <g id="radial-zoom-group">
      ${svgGuides.join('\n')}
      ${svgLines.join('\n')}
      ${svgNodes.join('\n')}
    </g>
  </svg>`;

  container.innerHTML = `
    <div style="padding:2px 0 8px;display:flex;justify-content:center;position:relative;width:100%;overflow:hidden">
      ${svgEl}
      <div class="radial-zoom-controls">
        <button onclick="adjustRadialZoom(1.2)" title="Zoom In">+</button>
        <button onclick="adjustRadialZoom(0.83)" title="Zoom Out">−</button>
        <button onclick="resetRadialZoom()" title="Reset">↺</button>
      </div>
    </div>
    <div style="text-align:center;font-size:8px;color:rgba(255,255,255,0.18);padding:4px 0 10px;letter-spacing:.03em">Design inspired by <a href="https://emiliosansolini.com" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.24);text-decoration:none">Emilio Sansolini</a></div>
  `;
  applyRadialTransform();

  const svgDom = container.querySelector('#radial-svg');
  if (svgDom) {
    setupRadialZoomEvents(svgDom);
  }

  // Hover & path tracing logic
  const groups = container.querySelectorAll('.radial-node-group');
  groups.forEach(g => {
    const nodeId = g.getAttribute('data-id');

    g.addEventListener('mouseenter', () => {
      const activePath = new Set();
      let currentId = nodeId;
      while (currentId) {
        activePath.add(currentId);
        const node = nodesMap[currentId];
        currentId = node ? node.parentId : null;
        if (currentId === 'masterHub') {
          activePath.add('masterHub');
          break;
        }
      }

      activePath.forEach(id => {
        const pipe = container.querySelector(`#pipe-${id}`);
        if (pipe) {
          pipe.setAttribute('stroke', '#60efff');
          pipe.setAttribute('stroke-width', '3.5');
          pipe.setAttribute('filter', 'url(#neonArc)');
        }
        const nodeEl = container.querySelector(`#node-${id} circle`);
        if (nodeEl) {
          nodeEl.style.transform = 'scale(1.25)';
          nodeEl.setAttribute('stroke', '#60efff');
          nodeEl.setAttribute('stroke-width', '2.2');
          nodeEl.setAttribute('filter', 'url(#neonBadge)');
        }
      });
    });

    g.addEventListener('mouseleave', () => {
      nodes.forEach(node => {
        const pipe = container.querySelector(`#pipe-${node.id}`);
        if (pipe) {
          const isProg = node.won;
          pipe.setAttribute('stroke', isProg ? 'rgba(0, 255, 135, 0.65)' : 'rgba(255, 255, 255, 0.15)');
          pipe.setAttribute('stroke-width', isProg ? '2.5' : '1.5');
          if (isProg) {
            pipe.setAttribute('filter', 'url(#neonArc)');
          } else {
            pipe.removeAttribute('filter');
          }
        }
        const nodeEl = container.querySelector(`#node-${node.id} circle`);
        if (nodeEl) {
          nodeEl.style.transform = 'scale(1)';
          const isTBD = !node.flag || node.flag === '🏳️' || !node.name || /Winner|Runner-up|TBD|W M\d/.test(node.name);
          nodeEl.setAttribute('stroke', node.won ? 'rgba(0, 255, 135, 0.75)' : isTBD ? 'rgba(255, 255, 255, 0.08)' : 'rgba(255, 255, 255, 0.22)');
          nodeEl.setAttribute('stroke-width', node.won ? '2.2' : '1.2');
          if (node.won) {
            nodeEl.setAttribute('filter', 'url(#neonNode)');
          } else {
            nodeEl.removeAttribute('filter');
          }
        }
      });

      const masterCircle = container.querySelector('#node-masterHub circle');
      if (masterCircle) {
        masterCircle.style.transform = 'scale(1)';
        masterCircle.setAttribute('stroke', champName ? '#00ff87' : 'rgba(255, 215, 0, 0.25)');
        masterCircle.setAttribute('stroke-width', '2');
        if (champName) {
          masterCircle.setAttribute('filter', 'url(#neonNode)');
        } else {
          masterCircle.removeAttribute('filter');
        }
      }
    });
  });
}

function getTeamAbbreviation(name){
  if(!name) return '';
  const cleanName = name.trim();
  const nameToAbbr = {
    'South Africa': 'RSA',
    'Canada': 'CAN',
    'Netherlands': 'NED',
    'Morocco': 'MAR',
    'Germany': 'GER',
    'Paraguay': 'PAR',
    'France': 'FRA',
    'Sweden': 'SWE',
    'Brazil': 'BRA',
    'Japan': 'JPN',
    'Ivory Coast': 'CIV',
    'Norway': 'NOR',
    'Mexico': 'MEX',
    'Ecuador': 'ECU',
    'England': 'ENG',
    'Congo DR': 'COD',
    'USA': 'USA',
    'United States': 'USA',
    'Bosnia-Herzegovina': 'BIH',
    'Belgium': 'BEL',
    'Senegal': 'SEN',
    'Portugal': 'POR',
    'Croatia': 'CRO',
    'Spain': 'ESP',
    'Austria': 'AUT',
    'Switzerland': 'SUI',
    'Algeria': 'ALG',
    'Colombia': 'COL',
    'Ghana': 'GHA',
    'Argentina': 'ARG',
    'Cape Verde': 'CPV',
    'Australia': 'AUS',
    'Egypt': 'EGY'
  };
  if(nameToAbbr[cleanName]) return nameToAbbr[cleanName];
  for(const g of GROUPS_DATA){
    const found = (g.teams||[]).find(t => t.n.toLowerCase() === name.toLowerCase());
    if(found && found.abbr) return found.abbr;
  }
  return name.substring(0,3).toUpperCase();
}

window.handleKOMatchClick = function(mNum){
  const matchesMap = getResolvedMatchesMap();
  const m = matchesMap[mNum];
  if(!m) return;
  if(m.espnEvent){
    openMatchModal(m.espnEvent);
  } else {
    const ev = (lastEvents || []).find(e => {
      const evH = e.home.name.toLowerCase();
      const evA = e.away.name.toLowerCase();
      const mH = m.hName.toLowerCase();
      const mA = m.aName.toLowerCase();
      return (evH.includes(mH) && evA.includes(mA)) || (evH.includes(mA) && evA.includes(mH));
    });
    if(ev){
      openMatchModal(ev);
    } else {
      openMatchModal({
        id: 'ko-'+mNum, state: 'pre', isHT: false, displayClock: '',
        detail: `${m.date} at ${m.stad}`, date: new Date(),
        home: { name: m.hName, abbr: getTeamAbbreviation(m.hName), score: 0, winner: false },
        away: { name: m.aName, abbr: getTeamAbbreviation(m.aName), score: 0, winner: false },
        venue: m.stad, city: m.city,
        group: m.roundKey === 'final' ? 'Final' : m.roundKey.toUpperCase(), bcast: ''

};

function drawConnectorLines(){
  const svg = $('bracket-svg');
  if(!svg) return;
  svg.innerHTML = '';
  const bracket = $('bracket');
  if(!bracket) return;
  const bRect = bracket.getBoundingClientRect();
  const matchesMap = getResolvedMatchesMap();

  KO_CONNECTIONS.forEach(({ from, to }) => {
    const fromEl = document.querySelector(`[data-mid="${from}"]`);
    const toEl = document.querySelector(`[data-mid="${to}"]`);
    if(!fromEl || !toEl) return;
    const rFrom = fromEl.getBoundingClientRect();
    const rTo = toEl.getBoundingClientRect();
    const xFromOffset = rFrom.left - bRect.left;
    const yFromOffset = rFrom.top - bRect.top;
    const xToOffset = rTo.left - bRect.left;
    const yToOffset = rTo.top - bRect.top;
    const isLeftToRight = xFromOffset < xToOffset;
    let xFrom, yFrom, xTo, yTo;
    if(isLeftToRight){
      xFrom = xFromOffset + rFrom.width; yFrom = yFromOffset + rFrom.height / 2;
      xTo = xToOffset;                   yTo = yToOffset + rTo.height / 2;
    } else {
      xFrom = xFromOffset;              yFrom = yFromOffset + rFrom.height / 2;
      xTo = xToOffset + rTo.width;      yTo = yToOffset + rTo.height / 2;
    }
    const dx = Math.abs(xTo - xFrom);
    const x1 = isLeftToRight ? xFrom + dx * 0.45 : xFrom - dx * 0.45;
    const x2 = isLeftToRight ? xTo - dx * 0.45   : xTo + dx * 0.45;
    const d = `M ${xFrom} ${yFrom} C ${x1} ${yFrom}, ${x2} ${yTo}, ${xTo} ${yTo}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'bracket-path');
    path.dataset.from = from;
    path.dataset.to = to;
    const fromMatch = matchesMap[from];
    const toMatch = matchesMap[to];
    path.dataset.teams = JSON.stringify([fromMatch?.hName, fromMatch?.aName, toMatch?.hName, toMatch?.aName].filter(Boolean));
    svg.append(path);
  });
}

function setupPathHighlightingListeners(){
  const btNodes = document.querySelectorAll('.bracket .bt:not(.tbd)');
  btNodes.forEach(node => {
    const teamName = node.querySelector('.bn')?.textContent;
    if(!teamName) return;
    node.addEventListener('mouseenter', () => highlightTeamPath(teamName));
    node.addEventListener('mouseleave', () => clearTeamPathHighlight());
    node.addEventListener('click', e => {
      e.stopPropagation();
      if(node.classList.contains('highlighted-active')){
        clearTeamPathHighlight();
        node.classList.remove('highlighted-active');
      } else {
        document.querySelectorAll('.bt').forEach(n => n.classList.remove('highlighted-active'));
        highlightTeamPath(teamName);
        node.classList.add('highlighted-active');
      }
    });
  });
  document.addEventListener('click', () => {
    clearTeamPathHighlight();
    document.querySelectorAll('.bt').forEach(n => n.classList.remove('highlighted-active'));
  });
}

function highlightTeamPath(teamName){
  if(!teamName || teamName.includes('Winner ') || teamName.includes('Runner-up ') || teamName.includes('TBD')) return;
  const cn = teamName.trim().toLowerCase();
  document.querySelectorAll('.bracket .bm').forEach(card => {
    const h = card.dataset.teamH?.trim().toLowerCase();
    const a = card.dataset.teamA?.trim().toLowerCase();
    if(h === cn || a === cn) card.classList.add('highlight-path');
  });
  document.querySelectorAll('.bracket-svg path').forEach(path => {
    try {
      const teams = JSON.parse(path.dataset.teams || '[]');
      if(teams.some(t => t.trim().toLowerCase() === cn)) path.classList.add('highlight-line');
    } catch(e){}
  });
}

function clearTeamPathHighlight(){
  document.querySelectorAll('.bracket .bm').forEach(c => c.classList.remove('highlight-path'));
  document.querySelectorAll('.bracket-svg path').forEach(p => p.classList.remove('highlight-line'));
}

let io;
function observeCards(){
  if(io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach((e,i) => {
      if(e.isIntersecting){
        const d = parseInt(e.target.dataset.delay||0);
        setTimeout(()=>e.target.classList.add('vis'), d);
        io.unobserve(e.target);
      }
    });
  },{threshold:.05, rootMargin:'0px 0px -10px 0px'});
  document.querySelectorAll('.mc:not(.vis),.gcard:not(.vis)').forEach(c=>io.observe(c));
}

function mlToProb(ml){
  ml = parseFloat(ml);
  if(!ml || isNaN(ml)) return null;
  return ml < 0 ? (-ml)/(-ml+100) : 100/(ml+100);
}
function fmtML(ml){
  ml = parseFloat(ml);
  if(!ml || isNaN(ml)) return '—';
  return ml > 0 ? '+'+Math.round(ml) : String(Math.round(ml));
}
function decOdds(ml){ ml=parseFloat(ml); if(!ml||isNaN(ml)) return'—'; return(ml<0?100/(-ml)+1:ml/100+1).toFixed(2); }
function computeRating(stats){
  if(!stats?.length) return null;
  const get=n=>stats.find(s=>s.name===n)?.value||0;
  let r=6.0;
  r+=get('totalGoals')*2.0; r+=get('goalAssists')*1.2; r+=get('shotsOnTarget')*0.15;
  r-=get('yellowCards')*0.5; r-=get('redCards')*2.0;
  r-=Math.max(0,get('foulsCommitted')-2)*0.08;
  const faced=get('shotsFaced');
  if(faced>0){ r+=get('saves')*0.25; if(get('goalsConceded')===0) r+=0.5; }
  return Math.max(4.0,Math.min(10.0,r)).toFixed(1);
}
function timeAgo(iso){
  const d = Date.now() - new Date(iso).getTime();
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
  if(h>24) return `${Math.floor(h/24)}d ago`;
  if(h>0)  return `${h}h ago`;
  return `${m}m ago`;
}

async function fetchMCSummary(eventId){
  if(mcCache[eventId]) return mcCache[eventId];
  try {
    const r = await fetch(`${ESPN_SUMMARY}?event=${eventId}`, { signal: AbortSignal.timeout(9000) });
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    mcCache[eventId] = d;
    return d;
  } catch(e){ return {}; }
}

function switchMCTab(tabId){
  const {ev,data} = mcState||{};
  if(!ev) return;
  document.querySelectorAll('.mc-tab-btn').forEach(b => b.classList.toggle('active',b.dataset.tab===tabId));
  if(mcCdInt){ clearInterval(mcCdInt); mcCdInt = null; }
  if(mcLiveInt){ clearInterval(mcLiveInt); mcLiveInt = null; }
  const body = document.getElementById('mcBody');
  if(!body) return;

  if(tabId==='live'){
    if(!data){
      body.innerHTML = `<div class="lineup-loading" style="padding:40px 0">Loading live data…</div>`;
      return;
    }
    body.innerHTML = mcLiveTab(ev, data);
    requestAnimationFrame(()=>{ document.querySelectorAll('[data-w]').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); });
    mcLiveInt = setInterval(async ()=>{
      if(!mcState?.ev){ clearInterval(mcLiveInt); mcLiveInt=null; return; }
      // Sync ev + header from background fetchMatches data so clock/score stay current
      const freshEv = lastEvents.find(e => e.id === mcState.ev.id);
      if(freshEv){ mcState.ev = freshEv; renderMCHeader(freshEv); }
      if(mcState.ev.state!=='in'){ clearInterval(mcLiveInt); mcLiveInt=null; return; }
      delete mcCache[mcState.ev.id];
      const freshData = await fetchMCSummary(mcState.ev.id);
      mcState.data = freshData;
      if(document.querySelector('.mc-tab-btn.active')?.dataset.tab==='live'){
        const b = document.getElementById('mcBody');
        if(b){ b.innerHTML=mcLiveTab(mcState.ev,freshData); requestAnimationFrame(()=>{ b.querySelectorAll('[data-w]').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); }); }
      }
    }, 10000);
  } else if(tabId==='overview'){
    body.innerHTML = ev.state==='pre' ? mcPreOverview(ev,data) : mcMatchOverview(ev,data);
    requestAnimationFrame(()=>{ body.querySelectorAll('[data-w]').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); });
    if(ev.state==='pre'){
      const tick=()=>{
        const el=document.getElementById('mcCdTime');
        if(!el) return;
        const diff=ev.date-Date.now();
        if(diff<=0){el.textContent='Now!';return;}
        const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      };
      tick(); mcCdInt=setInterval(tick,1000);
    }
  } else if(tabId==='stats'){
    if(!data){
      body.innerHTML = `<div class="lineup-loading" style="padding:40px 0">Loading match stats…</div>`;
      return;
    }
    body.innerHTML = mcStats(ev,data);
    requestAnimationFrame(()=>{ document.querySelectorAll('[data-w]').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); });
  } else if(tabId==='lineups'){
    if(!data){
      body.innerHTML = `<div class="lineup-loading" style="padding:40px 0">Loading lineups…</div>`;
      return;
    }
    body.innerHTML = mcLineups(ev,data);
  } else if(tabId==='highlights'){
    mcHighlightsTab(ev,body);
  } else if(tabId==='news'){
    if(!data){
      body.innerHTML = `<div class="lineup-loading" style="padding:40px 0">Loading news…</div>`;
      return;
    }
    body.innerHTML = mcNews(ev,data);
  }
}

/* ── PRE-MATCH OVERVIEW ─────────────────────── */
function mcPreOverview(ev,data){
  let html='';
  // Countdown
  const diff=ev.date-Date.now();
  const h=Math.max(0,Math.floor(diff/3600000)),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  const cdTxt=diff>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:'Now!';
  const d=new Date(ev.date);

  html+=`<div class="mc-cd">

    <div class="mc-cd-sub">${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} · ${localTime(ev.date)} local</div>
  </div>`;

  // Win probability
  const odds=(data?.odds||[])[0];
  if(odds){
    const hp=mlToProb(odds.homeTeamOdds?.moneyLine);
    const ap=mlToProb(odds.awayTeamOdds?.moneyLine);
    const rawDraw=typeof odds.drawOdds==='number'?odds.drawOdds:odds.drawOdds?.moneyLine;
    const dp=mlToProb(rawDraw);
    if(hp!=null&&ap!=null&&dp!=null){
      const tot=hp+dp+ap||1;
      const hPct=Math.round((hp/tot)*100), aPct=Math.round((ap/tot)*100), dPct=100-hPct-aPct;
      const hN=ev.home.name.split(' ').slice(-1)[0], aN=ev.away.name.split(' ').slice(-1)[0];
      html+=`<div class="mc-prob">
        <div class="mc-prob-lbl">Win probability (implied from odds)</div>

          <div class="mc-ph" style="width:${hPct}%"></div>
          <div class="mc-pd" style="width:${dPct}%"></div>
          <div class="mc-pa" style="width:${aPct}%"></div>
        </div>
        <div class="mc-prob-nums">
          <div class="mc-phn">${hPct}% ${hN}</div>

        <div class="mc-odds-cell">
          <div class="mc-odds-team">Draw</div>
          <div class="mc-odds-pct" style="color:var(--t2)">${dPct}%</div>
          <div class="mc-odds-dec">${decOdds(rawDraw)}</div>
          <div class="mc-odds-ml">${fmtML(rawDraw)}</div>
        </div>
        <div class="mc-odds-cell">
          <div class="mc-odds-team">${aN}</div>
          <div class="mc-odds-pct" style="color:#ff7070">${aPct}%</div>
