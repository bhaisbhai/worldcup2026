  const plays=data?.plays||[];
  const goals=plays.filter(p=>p.scoringPlay===true||(p.type?.text||'').toLowerCase().includes('goal'));
  if(goals.length>0){
    html+=`<div class="mc-tl">
      <div class="mc-tl-lbl">⚽ Goal timeline</div>
      <div class="mc-tl-track">
        ${goals.map(p=>{
          const min=parseInt(p.clock?.displayValue)||0;
          const pct=Math.min(97,(min/90)*100);
          const isHome=p.team?.id===homeId;
          const scorer=p.participants?.find(pp=>pp.type==='scorer')?.athlete?.displayName||p.text||'';
          return `<div class="mc-tl-dot ${isHome?'home':'away'}" style="left:${pct}%" title="${min}' ${scorer}"></div>`;
        }).join('')}
      </div>
      <div class="mc-tl-mins"><span>0'</span><span>45'</span><span>90'</span></div>
    </div>`;
  }

  // Scorers
  const hGoals=goals.filter(p=>p.team?.id===homeId);
  const aGoals=goals.filter(p=>p.team?.id===awayId);
  const scorerRows=(gs)=> gs.length===0
    ? '<div class="mc-no-goal">No goals</div>'
    : gs.map(p=>{
        const min=parseInt(p.clock?.displayValue)||0;
        const name=p.participants?.find(pp=>pp.type==='scorer')?.athlete?.displayName||'';
        const typeTxt=(p.type?.text||'').toLowerCase().includes('pen')?'PEN':(p.type?.text||'').toLowerCase().includes('own')?'OG':'';
        return `<div class="mc-srow">
          <div class="mc-smin">${min}'</div>
          <div class="mc-sname">${name}</div>
          ${typeTxt?`<div class="mc-stype">${typeTxt}`:''}</div>`;
      }).join('');

  html+=`<div class="mc-scorers">
    <div><div class="mc-scol-lbl"><div class="mc-sdot home"></div>${ev.home.name}</div>${scorerRows(hGoals)}</div>
    <div><div class="mc-scol-lbl"><div class="mc-sdot away"></div>${ev.away.name}</div>${scorerRows(aGoals)}</div>
  </div>`;

  // Quick stats
  const bsTeams=data?.boxscore?.teams||[];
  const hStats=bsTeams.find(t=>t.team?.id===homeId)?.statistics||bsTeams[0]?.statistics||[];
  const aStats=bsTeams.find(t=>t.team?.id===awayId)?.statistics||bsTeams[1]?.statistics||[];
  const gs=(stats,...keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s) return s.displayValue||String(s.value||'—');}return'—';};
  const pos_h=gs(hStats,'possessionPct','possession'),pos_a=gs(aStats,'possessionPct','possession');
  const sho_h=gs(hStats,'totalShots','shots'),sho_a=gs(aStats,'totalShots','shots');
  const sot_h=gs(hStats,'shotsOnTarget','shotsOnGoal'),sot_a=gs(aStats,'shotsOnTarget','shotsOnGoal');
  if(pos_h!=='—'||sho_h!=='—'){
    const posHn=parseFloat(pos_h), posAn=parseFloat(pos_a);
    const posHr=isNaN(posHn)?0:Math.round(posHn);
    const posAr=isNaN(posAn)?100-posHr:Math.round(posAn);
    const posHd=posHr+'%', posAd=posAr+'%';
    const shoH=parseFloat(sho_h)||0, shoA=parseFloat(sho_a)||0;
    const sotH=parseFloat(sot_h)||0, sotA=parseFloat(sot_a)||0;
    const pct=(h,a)=>{ const t=(h+a)||1; return [Math.round(h/t*100), Math.round(a/t*100)]; };
    const [posBh,posBa]=pct(posHr,posAr);
    const [shoBh,shoBA]=pct(shoH,shoA);
    const [sotBh,sotBa]=pct(sotH,sotA);
    html+=`<div class="mc-stat-hdr" style="margin-top:14px">
      <span style="color:var(--accent)">${ev.home.name}</span>
      <span>Key stats</span>
      <span style="color:#ff7070">${ev.away.name}</span>
    </div>
    <div class="mc-stat-row">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${posHd}</div><div class="mc-stat-nm">Possession</div><div class="mc-stat-rv">${posAd}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${posBh}" style="width:0"></div><div class="mc-stat-r" data-w="${posBa}" style="width:0"></div></div>
    </div>
    <div class="mc-stat-row">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${shoH||'—'}</div><div class="mc-stat-nm">Shots</div><div class="mc-stat-rv">${shoA||'—'}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${shoBh}" style="width:0"></div><div class="mc-stat-r" data-w="${shoBA}" style="width:0"></div></div>
    </div>
    <div class="mc-stat-row" style="margin-bottom:0">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${sotH||'—'}</div><div class="mc-stat-nm">On Target</div><div class="mc-stat-rv">${sotA||'—'}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${sotBh}" style="width:0"></div><div class="mc-stat-r" data-w="${sotBa}" style="width:0"></div></div>
    </div>`;
  }
  return html;
}

/* ── STATS TAB ──────────────────────────────── */
function mcStats(ev,data){
  const comp=data?.header?.competitions?.[0];
  const homeId=comp?.competitors?.find(c=>c.homeAway==='home')?.id;
  const awayId=comp?.competitors?.find(c=>c.homeAway==='away')?.id;
  const bsTeams=data?.boxscore?.teams||[];
  const hStats=bsTeams.find(t=>t.team?.id===homeId)?.statistics||bsTeams[0]?.statistics||[];
  const aStats=bsTeams.find(t=>t.team?.id===awayId)?.statistics||bsTeams[1]?.statistics||[];

  if(ev.state==='pre'){
    // Pre-match: show last-5 form comparison
    const l5=data?.lastFiveGames||[];
    if(l5.length<2) return`<div class="mc-stat-na">Stats will be available once the match starts</div>`;
    const rec=(evs)=>evs.reduce((a,e)=>{
      if(e.gameResult==='W')a.w++;else if(e.gameResult==='D')a.d++;else a.l++;
      return a;
    },{w:0,d:0,l:0});
    const r1=rec(l5[0]?.events||[]),r2=rec(l5[1]?.events||[]);
    const rows=[{name:'Wins',h:r1.w,a:r2.w},{name:'Draws',h:r1.d,a:r2.d},{name:'Losses',h:r1.l,a:r2.l}];
    return `<div class="mc-stat-hdr"><span style="color:var(--accent)">${ev.home.name}</span><span>Last 5 games</span><span style="color:#ff7070">${ev.away.name}</span></div>`
      +rows.map(r=>{const t=(r.h+r.a)||1,hp=Math.round((r.h/t)*100),ap=100-hp;return`<div class="mc-stat-row">
        <div class="mc-stat-vals"><div class="mc-stat-lv">${r.h}</div><div class="mc-stat-nm">${r.name}</div><div class="mc-stat-rv">${r.a}</div></div>
        <div class="mc-stat-track"><div class="mc-stat-l" data-w="${hp}" style="width:0"></div><div class="mc-stat-r" data-w="${ap}" style="width:0"></div></div>
      </div>`;}).join('');
  }

  const STATS=[
    {name:'Possession %',keys:['possessionPct','possession']},
    {name:'Total Shots',keys:['totalShots','shots']},
    {name:'On Target',keys:['shotsOnTarget','shotsOnGoal']},
    {name:'Corners',keys:['corners','cornerKicks']},
    {name:'Fouls',keys:['fouls','totalFouls']},
    {name:'Yellow Cards',keys:['yellowCards']},
    {name:'Saves',keys:['saves','goalkeepSaves']},
    {name:'Offsides',keys:['offsides']},
    {name:'Pass Acc %',keys:['passingAccuracy','passAccuracy']},
  ];
  const gv=(stats,keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s)return parseFloat(s.displayValue?.replace('%','')||s.value)||0;}return null;};
  const rows=STATS.map(s=>{
    const hv=gv(hStats,s.keys),av=gv(aStats,s.keys);
    if(hv==null&&av==null) return null;
    const h=hv||0,a=av||0,tot=(h+a)||1;
    return{name:s.name,hv:h,av:a,hp:Math.round((h/tot)*100),ap:Math.round((a/tot)*100)};
  }).filter(Boolean);
  if(!rows.length) return`<div class="mc-stat-na">Stats not yet available</div>`;
  return `<div class="mc-stat-hdr"><span style="color:var(--accent)">${ev.home.name}</span><span>Match stats</span><span style="color:#ff7070">${ev.away.name}</span></div>`
    +rows.map(r=>`<div class="mc-stat-row">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${r.hv}</div><div class="mc-stat-nm">${r.name}</div><div class="mc-stat-rv">${r.av}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${r.hp}" style="width:0"></div><div class="mc-stat-r" data-w="${r.ap}" style="width:0"></div></div>
    </div>`).join('');
}

/* ── LIVE TAB ───────────────────────────────── */
function mcLiveTab(ev, data){
  const comp = data?.header?.competitions?.[0];
  const homeId = comp?.competitors?.find(c=>c.homeAway==='home')?.id;
  const awayId = comp?.competitors?.find(c=>c.homeAway==='away')?.id;

  let html = '';

  // ── Timeline ────────────────────────────────────────
  // Source 1: goals from ev.goals (always populated via scoreboard comp.details)
  const goalItems = (ev.goals||[]).map(g => ({
    min: g.min, icon: g.pen?'⚽🅿':'⚽', iconCls:'goal',
    txt: g.og?`${g.name} (og)`:g.pen?`${g.name} (pen)`:g.name,
    isHome: g.isHome,
  }));

  // Source 2: cards / subs from summary plays (supplement only; skip scoring plays already in goalItems)
  const _allPlays = data?.plays || data?.playByPlay?.plays || data?.summary?.plays || [];
  const _KEY_IDS = new Set([31,40,41,45]);
  const playItems = _allPlays.filter(p=>{
    if(p.scoringPlay || p.shootoutPlay) return false; // covered by goalItems
    const id = Number(p.type?.id||0);
    if(_KEY_IDS.has(id)) return true;
    const t = (p.type?.text||p.type?.name||'').toLowerCase();
    return t.includes('yellow')||t.includes('caution')||t.includes('booking')||
           t.includes('red card')||t.includes('second booking')||t.includes('substitut')||t.includes('var');
  }).map(p=>{
    const typeId = Number(p.type?.id||0);
    const t = (p.type?.text||p.type?.name||'').toLowerCase();
    const isHome = homeId ? p.team?.id===homeId : true;
    let icon='🟨', iconCls='yellow';
    if(typeId===41||t.includes('red')||t.includes('second booking')){ icon='🟥'; iconCls='red'; }
    else if(typeId===45||t.includes('substitut')){ icon='↕'; iconCls='sub'; }
    else if(typeId===31||t.includes('var')){ icon='VAR'; iconCls='var'; }
    const subOn  = p.participants?.find(pp=>pp.type==='substitution_in')?.athlete?.displayName||'';
    const subOff = p.participants?.find(pp=>pp.type==='substitution_out')?.athlete?.displayName||'';
    const txt = subOn?`${subOn} ↑  ${subOff} ↓`:(p.participants?.[0]?.athlete?.displayName||p.text||'');
    return { min:p.clock?.displayValue||'', icon, iconCls, txt, isHome };
  });

  // Merge and sort newest first
  const tlItems = [...goalItems, ...playItems]
    .sort((a,b) => parseMinute(b.min) - parseMinute(a.min));

  html += `<div class="live-tl-hdr">Timeline</div>`;
  if(tlItems.length){
    html += `<div class="live-tl">`;
    for(const item of tlItems){
      html += `<div class="live-tl-row ${item.isHome?'is-home':'is-away'}">
        <div class="live-tl-min">${item.min}</div>
        <div class="live-tl-icon ${item.iconCls}">${item.icon}</div>
        <div class="live-tl-txt">${item.txt}<span class="live-tl-team">${item.isHome?ev.home.abbr:ev.away.abbr}</span></div>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="mc-stat-na" style="padding:14px 0 18px">No events yet — match is underway</div>`;
  }

  // Live stats bars
  const bsTeams = data?.boxscore?.teams||[];
  const hStats = bsTeams.find(t=>t.team?.id===homeId)?.statistics||bsTeams[0]?.statistics||[];
  const aStats = bsTeams.find(t=>t.team?.id===awayId)?.statistics||bsTeams[1]?.statistics||[];
  const LIVE_STATS=[
    {name:'Possession %',keys:['possessionPct','possession']},
    {name:'Total Shots',keys:['totalShots','shots']},
    {name:'On Target',keys:['shotsOnTarget','shotsOnGoal']},
    {name:'Corners',keys:['corners','cornerKicks']},
    {name:'Fouls',keys:['fouls','totalFouls']},
    {name:'Yellow Cards',keys:['yellowCards']},
    {name:'Saves',keys:['saves','goalkeepSaves']},
  ];
  const gv=(stats,keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s)return parseFloat(s.displayValue?.replace('%','')||s.value)||0;}return null;};
  const rows=LIVE_STATS.map(s=>{
    const hv=gv(hStats,s.keys),av=gv(aStats,s.keys);
    if(hv==null&&av==null)return null;
    const h=hv||0,a=av||0,tot=(h+a)||1;
    return{name:s.name,hv:h,av:a,hp:Math.round((h/tot)*100),ap:Math.round((a/tot)*100)};
  }).filter(Boolean);
  if(rows.length){
    html+=`<div class="mc-stat-hdr" style="margin-top:16px">
      <span style="color:var(--accent)">${ev.home.name}</span>
      <span>Live stats</span>
      <span style="color:#ff7070">${ev.away.name}</span>
    </div>`;
    html+=rows.map(r=>`<div class="mc-stat-row">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${r.hv}</div><div class="mc-stat-nm">${r.name}</div><div class="mc-stat-rv">${r.av}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${r.hp}" style="width:0"></div><div class="mc-stat-r" data-w="${r.ap}" style="width:0"></div></div>
    </div>`).join('');
  }

  html+=`<div class="live-refresh"><span class="live-refresh-dot"></span>Updating every 10s</div>`;
  return html;
}

/* ── LINEUPS TAB — formation pitch ─────────── */
function mcLineups(ev,data){
  const rosters=data?.rosters||[];
  if(!rosters.length) return`<div class="mc-lu-na">Lineups not yet confirmed</div>`;

  const hR=rosters.find(r=>r.homeAway==='home')||rosters[0];
  const aR=rosters.find(r=>r.homeAway==='away')||rosters[1];
  const hTi={name:ev.home.name,abbr:ev.home.abbr};
  const aTi={name:ev.away.name,abbr:ev.away.abbr};

  function buildGroups(roster){
    const entries=(roster?.roster||roster?.entries||[]);
    const starters=entries.filter(e=>e.starter);
    const bench=entries.filter(e=>!e.starter);
    const grp={GK:[],DEF:[],MID:[],FWD:[]};
    const fStr=roster?.formation||'';
    const fLayers=fStr.split('-').map(Number).filter(n=>n>0);
    if(fLayers.length>=2){
      const sorted=starters.some(e=>e.formationPlace!=null)
        ?[...starters].sort((a,b)=>(a.formationPlace||99)-(b.formationPlace||99))
        :starters;
      let idx=0;
      if(sorted.length) grp.GK.push(sorted[idx++]);
      fLayers.forEach((count,i)=>{
        const target=i===0?grp.DEF:i===fLayers.length-1?grp.FWD:grp.MID;
        for(let j=0;j<count&&idx<sorted.length;j++) target.push(sorted[idx++]);
      });
    }
    return{grp,bench,formation:fStr};
  }

  function xSpread(n){
    if(!n) return[];
    if(n===1) return[50];
    const pad=n<=2?28:n<=3?20:n<=4?13:8;
    const step=(100-pad*2)/(n-1);
    return Array.from({length:n},(_,i)=>pad+i*step);
  }

  // Y% from top: keep each team in their own half so dots don't cross
  const HY={GK:94,DEF:82,MID:68,FWD:57};
  const AY={GK:6,DEF:18,MID:32,FWD:43};

  function makeDots(grp,yMap,isHome,ti){
    let out='';
    ['GK','DEF','MID','FWD'].forEach(key=>{
      const group=grp[key];
      xSpread(group.length).forEach((x,i)=>{
        const e=group[i];
        const a=e.athlete||{};
        const id=a.id||'';
        if(id) _plLookup[id]={entry:e,teamInfo:ti};
        const rtg=ev.state==='post'?computeRating(e.stats||[]):null;
        const rtgHtml=rtg?`<div class="fp-rtg ${parseFloat(rtg)>=7.5?'hi':parseFloat(rtg)>=6?'mid':'lo'}">${rtg}</div>`:'';
        // Short surname: strip "J. " initial prefix ESPN adds in shortName
        const raw=a.shortName||a.displayName||'—';
        const lbl=raw.replace(/^[A-Z]\.\s+/,'').split(' ').slice(-1)[0]||raw;
        out+=`<div class="fp-dot ${isHome?'home':'away'}${id?' fp-click':''}" style="left:${x.toFixed(1)}%;top:${yMap[key]}%"
          ${id?`onclick="openPlayerDetail('${id}')" role="button" tabindex="0"`:''}>
          <div class="fp-circle">${e.jersey||a.jersey||''}</div>
          <div class="fp-lbl">${lbl}</div>
          ${rtgHtml}
        </div>`;
      });
    });
    return out;
  }

  function benchRow(e,ti,isHome){
    const a=e.athlete||{};
    const id=a.id||'';
    if(id) _plLookup[id]={entry:e,teamInfo:ti};
    const rtg=ev.state==='post'?computeRating(e.stats||[]):null;
    const rtgHtml=rtg?`<span class="mc-lu-rtg ${parseFloat(rtg)>=7.5?'hi':parseFloat(rtg)>=6?'mid':'lo'}">${rtg}</span>`:'';
    return`<div class="mc-lu-p${id?' clickable':''}" ${id?`onclick="openPlayerDetail('${id}')" role="button" tabindex="0"`:''}>
      <span class="fp-bench-dot ${isHome?'home':'away'}"></span>
      <span class="mc-lu-num">${e.jersey||a.jersey||''}</span>
      <span class="mc-lu-pos">${e.position?.abbreviation||''}</span>
      <span class="mc-lu-name">${a.displayName||a.fullName||'—'}</span>
      ${rtgHtml}${e.captain?'<span style="font-size:9px;color:var(--gold);flex-shrink:0">©</span>':''}
      ${id?'<span class="mc-lu-arrow">›</span>':''}
    </div>`;
  }

  const h=buildGroups(hR), a=buildGroups(aR);
  if(!h.formation||!a.formation) return`<div class="mc-lu-na">Formation data not available</div>`;
  const hForm=h.formation, aForm=a.formation;

  return`
    <div class="fp-header">
      <div class="fp-team-lbl home">${flag(ev.home.abbr)} ${ev.home.name}${hForm?` <span class="fp-form-badge">${hForm}</span>`:''}</div>
      <div class="fp-team-lbl away">${ev.away.name}${aForm?` <span class="fp-form-badge">${aForm}</span>`:''} ${flag(ev.away.abbr)}</div>
    </div>
    <div class="fp-wrap">
      <svg class="fp-lines" viewBox="0 0 100 143" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect x=".5" y=".5" width="99" height="142" fill="none" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
        <line x1=".5" y1="71.5" x2="99.5" y2="71.5" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
        <circle cx="50" cy="71.5" r="16" fill="none" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
        <circle cx="50" cy="71.5" r="1.2" fill="rgba(255,255,255,.4)"/>
        <rect x="20" y="109" width="60" height="34" fill="none" stroke="rgba(255,255,255,.13)" stroke-width=".7"/>
        <rect x="36" y="125" width="28" height="18" fill="none" stroke="rgba(255,255,255,.08)" stroke-width=".7"/>
        <rect x="20" y=".5" width="60" height="34" fill="none" stroke="rgba(255,255,255,.13)" stroke-width=".7"/>
        <rect x="36" y=".5" width="28" height="18" fill="none" stroke="rgba(255,255,255,.08)" stroke-width=".7"/>
        <circle cx="50" cy="122" r="1" fill="rgba(255,255,255,.3)"/>
        <circle cx="50" cy="21" r="1" fill="rgba(255,255,255,.3)"/>
      </svg>
      ${makeDots(h.grp,HY,true,hTi)}
      ${makeDots(a.grp,AY,false,aTi)}
    </div>
    ${h.bench.length||a.bench.length?`
      <div class="mc-lu-sec" style="margin-top:12px">Bench</div>
      ${h.bench.map(e=>benchRow(e,hTi,true)).join('')}
      ${a.bench.map(e=>benchRow(e,aTi,false)).join('')}
    `:''}
  `;
}

/* ── PLAYER DETAIL ──────────────────────────── */
const PLAYER_STAT_WANT = {
  totalGoals: 'Goals',
  goalAssists: 'Assists',
  totalShots: 'Shots',
  shotsOnTarget: 'On Target',
  saves: 'Saves',
  yellowCards: 'Yellow',
  redCards: 'Red',
  foulsCommitted: 'Fouls',
  offsides: 'Offsides',
};

function extractMatchStats(athleteId, data, ev) {
  if (!data || !ev) return [];
  for (const team of data?.rosters || []) {
    const p = (team.roster || []).find(e => String(e.athlete?.id) === String(athleteId));
    if (!p) continue;

    const statsMap = {};
    (p.stats || []).forEach(s => {
      if (s.value > 0) statsMap[s.name] = s.displayValue || String(s.value);
    });

    const out = [];
    for (const [key, label] of Object.entries(PLAYER_STAT_WANT)) {
      if (statsMap[key]) {
        out.push({ lbl: label, val: statsMap[key] });
      }
    }
    return out;
  }
  return [];
}

function openPlayerDetail(athleteId){
  const {entry,teamInfo}=_plLookup[athleteId]||{};
  if(!entry) return;
  const {ev,data}=mcState||{};
  const a=entry.athlete||{};
  const playerName=a.displayName||a.fullName||'—';
  gtag('event', 'player_opened', { player: playerName, athlete_id: String(athleteId) });
  const jersey=entry.jersey||a.jersey||'';
  const pos=entry.position?.displayName||entry.position?.abbreviation||'';
  // Roster data from ESPN summary includes headshot.href — use it when available
  const rosterHs=a.headshot?.href||_playerStats[String(athleteId)]?.headshot||'';
  const headshotUrl=rosterHs||`https://a.espncdn.com/i/headshots/soccer/players/full/${athleteId}.png`;

  if(mcCdInt){clearInterval(mcCdInt);mcCdInt=null;}
  document.querySelectorAll('.mc-tab-btn').forEach(b=>b.classList.remove('active'));

  const matchStats=ev&&data?extractMatchStats(athleteId,data,ev):[];
  const verdictHtml='';

  const statHtml=matchStats.length?`
    <div class="pl-sec">This Match</div>
    <div class="pl-sgrid">${matchStats.map(s=>`<div class="pl-sbox"><div class="pl-sval">${s.val}</div><div class="pl-slbl">${s.lbl}</div></div>`).join('')}</div>`:'';

  const body=document.getElementById('mcBody');
  if(!body) return;
  body.innerHTML=`
    <button class="pl-back" onclick="switchMCTab('lineups')">‹ Back to Lineups</button>
    <div class="pl-hero">
      <div class="pl-photo" id="plPhoto"><img src="${headshotUrl}" alt="${playerName}" onerror="this.parentElement.innerHTML='${flag(teamInfo.abbr)}'"></div>
      <div class="pl-meta">
        <div class="pl-pname">${playerName}</div>
        <div class="pl-psub">${[pos,teamInfo.name].filter(Boolean).join(' · ')}</div>
      </div>
      ${jersey?`<div class="pl-pnum">#${jersey}</div>`:''}
    </div>
    ${verdictHtml}
    ${statHtml}
    <div id="plProfile"><div class="lineup-loading">Loading profile…</div></div>
    <div id="plHighlights"></div>
    <div id="plNews"></div>`;

  fetchAndRenderPlayer(athleteId, playerName, teamInfo, ev);
}

async function fetchAndRenderPlayer(athleteId, playerName, teamInfo, ev){
  if(!playerCache[athleteId]){
    try{
      const[profR,newsR,genR]=await Promise.all([
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/athletes/${athleteId}`,{signal:AbortSignal.timeout(8000)}).catch(()=>null),
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/athletes/${athleteId}/news`,{signal:AbortSignal.timeout(8000)}).catch(()=>null),
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/athletes/${athleteId}`,{signal:AbortSignal.timeout(8000)}).catch(()=>null),
      ]);
      const prof=profR?.ok?await profR.json():{};
      const news=newsR?.ok?await newsR.json():{};
      const gen=genR?.ok?await genR.json():{};
      playerCache[athleteId]={prof,news,gen};
    }catch(e){playerCache[athleteId]={prof:{},news:{},gen:{}};}
  }
  const{prof,news,gen}=playerCache[athleteId];
  const ath=prof?.athlete||{};
  const genAth=gen?.athlete||{};

  // Enrich _playerClubs with club from general ESPN endpoint (browser can reach it even if pipeline couldn't)
  const pid=String(athleteId);
  if(!_playerClubs[pid]?.club){
    // During WC, ESPN sets primary team = national team; scan all entries to find the club
    const nationalName=(teamInfo.name||'').toLowerCase();
    let club='',clubLogo='';
    // genAth.teams can be [{team:{...},...}] or [{displayName:...}] depending on endpoint version
    const allTeams=[
      ...(Array.isArray(genAth.teams)?genAth.teams:[]),
      genAth.team?{team:genAth.team}:{},
    ];
    for(const entry of allTeams){
      const t=entry.team||entry;
      const tName=(t.displayName||t.name||'').trim();
      if(!tName||tName.toLowerCase()===nationalName) continue;
      // Skip obvious national team patterns
      if(/national\s+team|national\s+football/i.test(tName)) continue;
      club=tName;
      clubLogo=t.logos?.[0]?.href||t.logo||'';
      break;
    }
    if(club){
      if(_playerClubs[pid]){_playerClubs[pid].club=club;if(clubLogo)_playerClubs[pid].clubLogo=clubLogo;}
      else _playerClubs[pid]={name:playerName,club,clubLogo,teamName:teamInfo.name,teamAbbr:teamInfo.abbr,position:'',jersey:''};
    }
  }

  // Bio + tournament stats
  const profileEl=document.getElementById('plProfile');
  if(profileEl) profileEl.innerHTML=renderPlayerProfile(ath,genAth,pid);

  // News — combine athlete endpoint + match news, filter to articles mentioning this player
  const matchArticles=mcState?.data?.news?.articles||[];
  const allArticles=[...(news?.articles||[]),...matchArticles];
  const newsEl=document.getElementById('plNews');
  if(newsEl) newsEl.innerHTML=renderPlayerNews(allArticles, playerName);

  // Player highlight (async, fills #plHighlights when ready)
  fetchPlayerHighlight(athleteId, playerName, ev);
}

function renderPlayerProfile(ath,genAth={},knownId=''){
  const bio=[];
  const dob=ath.dateOfBirth||genAth.dateOfBirth;
  const directAge=ath.age||genAth.age;
  // Calculate age from DOB when ESPN doesn't return it directly
  const age=directAge||(dob?Math.floor((Date.now()-new Date(dob))/(365.25*24*3600*1000)):null);
  if(age) bio.push({k:'Age',v:String(age)});
  if(dob){
    const d=new Date(dob);
    bio.push({k:'Born',v:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})});
  }
  if(ath.displayHeight||genAth.displayHeight) bio.push({k:'Height',v:ath.displayHeight||genAth.displayHeight});
  if(ath.displayWeight||genAth.displayWeight) bio.push({k:'Weight',v:ath.displayWeight||genAth.displayWeight});
  const pid=String(ath.id||genAth.id||knownId||'');
  const ps=_playerStats[pid];
  const nat=ath.flag?.alt||ath.citizenship||genAth.flag?.alt||genAth.citizenship
    ||ps?.teamName||_playerClubs[pid]?.teamName||'';
  if(nat) bio.push({k:'Country',v:nat});
  const clubEntry=_playerClubs[pid];
  const nationalTeamName=ps?.teamName||clubEntry?.teamName||'';
  // Filter out national team name — ESPN returns it as primary team during WC
  const rawClub=clubEntry?.club||ath.team?.displayName||ath.team?.name||'';
  const club=(rawClub&&rawClub!==nationalTeamName)?rawClub:'';
  if(club){
    const logo=clubEntry?.clubLogo||'';
    const clubVal=logo?`<img src="${logo}" alt="" style="height:14px;vertical-align:middle;border-radius:2px;margin-right:5px;display:inline-block">${club}`:club;
    bio.push({k:'Club',v:clubVal});
  }

  // Primary stats source: pre-built tournament stats file (aggregated from all match summaries)
  let tournStats=[];
  if(ps){
    const PSMAP=[['appearances','Apps'],['goals','Goals'],['assists','Assists'],['minutesPlayed','Mins'],
      ['shots','Shots'],['saves','Saves']];
    tournStats=PSMAP.map(([k,l])=>{const v=ps[k];return(v!=null&&v>0)?{lbl:l,val:String(v)}:null;}).filter(Boolean);
    
    // Add yellow/red cards
    if (ps.yellowCards > 0) tournStats.push({ lbl: 'Yellow', val: String(ps.yellowCards) });
    if (ps.redCards > 0) tournStats.push({ lbl: 'Red', val: String(ps.redCards) });
  }
  // Fallback: ESPN athlete endpoint statistics (often empty for WC context)
  if(!tournStats.length){
    const allStats=[...(ath.statistics||[]),...(genAth.statistics||[])].flatMap(s=>s.splits?.categories||[]).flatMap(c=>c.stats||[]);
    const gv=name=>{const s=allStats.find(x=>x.name===name);return s?.displayValue??s?.value??null;};
    const KEYS=[['appearances','Apps'],['goals','Goals'],['assists','Assists'],['minutesPlayed','Mins'],
      ['shots','Shots'],['shotsOnTarget','On Target'],['saves','Saves'],['yellowCards','Yellow'],['redCards','Red']];
    tournStats=KEYS.map(([k,l])=>{const v=gv(k);return v!=null&&v!=='0'?{lbl:l,val:v}:null;}).filter(Boolean);
  }

  let h='';
  if(bio.length){
    h+=`<div class="pl-sec">Profile</div><div class="pl-info-grid">${bio.map(b=>`<div class="pl-info-row"><div class="pl-info-k">${b.k}</div><div class="pl-info-v">${b.v}</div></div>`).join('')}</div>`;
  }
  if(tournStats.length){
    h+=`<div class="pl-sec">Tournament Stats</div><div class="pl-sgrid">${tournStats.map(s=>`<div class="pl-sbox"><div class="pl-sval">${s.val}</div><div class="pl-slbl">${s.lbl}</div></div>`).join('')}</div>`;
  }
  return h;
}

function renderPlayerNews(articles, playerName){
  // Only show articles that actually mention this player by name
  const nameLow=(playerName||'').toLowerCase();
  const nameParts=nameLow.split(/\s+/).filter(w=>w.length>=4);
  const relevant=articles.filter(a=>{
    const hay=((a.headline||'')+' '+(a.description||'')+' '+(a.summary||'')).toLowerCase();
    return nameParts.some(p=>hay.includes(p));
  });
  // Deduplicate by headline
  const seen=new Set();
  const unique=relevant.filter(a=>{const k=a.headline||'';if(seen.has(k))return false;seen.add(k);return true;});
  if(!unique.length) return`<div class="pl-sec">News</div><div class="mc-news-empty">No news found for ${playerName}</div>`;
  const items=unique.slice(0,5).map(a=>{
    const url=a.links?.web?.href||'#';
    const img=a.images?.[0]?.url||'';
    const dt=a.lastModified||a.published||'';
    return`<a class="mc-news-item" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      ${img?`<img class="mc-news-img" src="${img}" alt="" loading="lazy">`:'<div class="mc-news-img"></div>'}
      <div class="mc-news-cnt">
        <div class="mc-news-ttl">${a.headline||'—'}</div>
        <div class="mc-news-meta">ESPN${dt?' · '+timeAgo(dt):''}</div>
      </div></a>`;
  }).join('');
  return`<div class="pl-sec">News</div>${items}`;
}

async function fetchPlayerHighlight(athleteId, playerName, ev){
  if(playerHlCache[athleteId]!==undefined){
    _renderPlayerHighlight(athleteId);
    return;
  }
  playerHlCache[athleteId]=null;
  try{
    const nameParts=playerName.toLowerCase().split(/\s+/);
    const lastName=nameParts[nameParts.length-1];
    const q=encodeURIComponent(`${playerName} FIFA World Cup 2026`);
    const r=await fetch(`/api/highlights?q=${q}`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    const scored=(d.items||[]).map(i=>{
      const t=i.snippet.title.toLowerCase();
      let s=0;
      if(t.includes(playerName.toLowerCase())) s+=3;
      else if(lastName.length>=4&&t.includes(lastName)) s+=2;
      if(t.includes('world cup')||t.includes('2026')) s+=2;
      if(t.includes('goal')||t.includes('highlight')||t.includes('skill')||t.includes('save')) s+=1;
      return{i,s};
    // Require score ≥5: player name (3) + WC/2026 (2) — filters pre-tournament/transfer content
    }).filter(x=>x.s>=5).sort((a,b)=>b.s-a.s);
    const hit=scored[0]?.i;
    if(hit) playerHlCache[athleteId]={videoId:hit.id.videoId,title:hit.snippet.title};
  }catch(e){}
  _renderPlayerHighlight(athleteId);
}

// ═══════════════════════════════════════════════════
//  COMPUTE GROUP STANDINGS FROM SCOREBOARD RESULTS
//  Primary source — uses the same endpoint as match
//  cards, so it works whenever match data works.
// ═══════════════════════════════════════════════════
async function computeStandingsFromScoreboard(){
  const now = new Date();
  // Cover the full group stage window (Jun 11 – Jul 2) plus a few days' buffer
  const dates = Array.from({length:25},(_,i)=>{
    const d=new Date(now); d.setDate(d.getDate()-15+i); return localDateStr(d);
  });

  const seen = new Set();
  const allEvents = [];
  await Promise.all(dates.map(async ds=>{
    try{
      const r=await fetch(`${ESPN_URL}?dates=${ds}`,{signal:AbortSignal.timeout(7000)});
      if(!r.ok) return;
      const data=await r.json();
      for(const raw of (data.events||[])){
        if(seen.has(raw.id)) continue;
        seen.add(raw.id);
        try{ allEvents.push(parseEvent(raw)); }catch(e){}
      }
    }catch(e){}
  }));

  // groupCalc[gId][teamDisplayName] = {p,w,d,l,gf,ga}
  const groupCalc = {};
  for(const ev of allEvents){
    if(ev.state!=='post') continue;
    const gm = (ev.group||'').match(/Group\s+([A-L])/i);
    if(!gm) continue;
    const gId = gm[1].toUpperCase();
    if(!groupCalc[gId]) groupCalc[gId]={};
    const gc = groupCalc[gId];
    const hn=ev.home.name, an=ev.away.name;
    const hg=ev.home.score, ag=ev.away.score;
    if(!gc[hn]) gc[hn]={p:0,w:0,d:0,l:0,gf:0,ga:0};
    if(!gc[an]) gc[an]={p:0,w:0,d:0,l:0,gf:0,ga:0};
    gc[hn].p++; gc[hn].gf+=hg; gc[hn].ga+=ag;
    gc[an].p++; gc[an].gf+=ag; gc[an].ga+=hg;
    if(hg>ag){gc[hn].w++;gc[an].l++;}
    else if(hg<ag){gc[an].w++;gc[hn].l++;}
    else{gc[hn].d++;gc[an].d++;}
  }

  let changed = false;
  GROUPS_DATA.forEach(g=>{
    const gc=groupCalc[g.id];
    if(!gc) return;
    g.teams.forEach(t=>{
      const key=Object.keys(gc).find(k=>favTeamMatch(k,t.n)||favTeamMatch(t.n,k));
      if(!key) return;
      const r=gc[key];
      t.p=r.p; t.w=r.w; t.d=r.d; t.l=r.l;
      t.gf=r.gf; t.ga=r.ga; t.gd=r.gf-r.ga; t.pts=r.w*3+r.d;
      changed=true;
    });
  });

  if(changed){
    renderGroups();
    refreshKnockoutBracket();
  }
}

// ═══════════════════════════════════════════════════
//  FETCH LIVE GROUP STANDINGS
// ═══════════════════════════════════════════════════
function getStat(stats, name){
  // Accept a single string or array of aliases; match name, abbreviation, displayName
  const names = Array.isArray(name) ? name : [name];
  const s = stats.find(x => names.some(n =>
    x.name===n || x.abbreviation===n || x.displayName===n || x.shortDisplayName===n
  ));
  return s ? Number(s.value ?? s.displayValue ?? 0) : 0;
}

async function fetchGroupStandings(){
  try {
    const r = await fetch(ESPN_STANDINGS, { signal: AbortSignal.timeout(8000) });
    if(!r.ok) return;
    const data = await r.json();

    // ESPN v2 standings: data.children[] is one child per group
    const groupMap = {};
    (data.children||[]).forEach(child => {
      const m = (child.name||'').match(/Group\s+([A-La-l])/i);
      if(!m) return;
      const gId = m[1].toUpperCase();
      groupMap[gId] = [];
      (child.standings?.entries||[]).forEach((entry, ei) => {
        const stats = entry.stats || [];
        // Log raw stat names once so we know exactly what ESPN sends
        if(gId==='A' && ei===0) console.log('[ESPN raw stats for first entry]', entry.team?.displayName, stats.map(s=>({name:s.name,abbr:s.abbreviation,val:s.value})));
        const abbr  = entry.team?.abbreviation || '';
        const name  = entry.team?.displayName   || entry.team?.name || '';
        const gf    = getStat(stats,['pointsFor','goalsFor','GF','gf']);
        const ga    = getStat(stats,['pointsAgainst','goalsAgainst','GA','ga']);
        const w     = getStat(stats,['wins','W','Wins']);
        const d     = getStat(stats,['ties','draws','D','Draws','Ties']);
        const l     = getStat(stats,['losses','L','Losses']);
        const pts   = getStat(stats,['points','PTS','Points','pts']);
        const noteText = [
          entry.note?.description,
          entry.note?.shortDescription,
          entry.note?.displayValue,
          typeof entry.note === 'string' ? entry.note : ''
        ].filter(Boolean).join(' ');
        const advancedStat     = getStat(stats, ['advanced','ADV','adv']);
        const advancedOfficial = advancedStat === 1;           // source of truth: ESPN sets this to 1 only when mathematically clinched
        const eliminated       = /eliminat/i.test(noteText);
        const bestEightAdvance = /best\s+8\s+advance/i.test(noteText);
        groupMap[gId].push({
          n: name, abbr,
          f:   FLAGS[abbr] || '🏳️',
          p:   w + d + l,
          w, d, l,
          gf, ga,
          gd:  gf - ga,
          pts,
          advancedOfficial,
          eliminated,
          bestEightAdvance,
          note: noteText,
        });
      });
    });

    if(!Object.keys(groupMap).length) return;

    GROUPS_DATA.forEach(g => {
      if(groupMap[g.id] && groupMap[g.id].length){
        g.teams = groupMap[g.id].sort((a,b) =>
          Number(b.pts??0)-Number(a.pts??0) ||
          Number(b.gd??0)-Number(a.gd??0)  ||
          Number(b.gf??0)-Number(a.gf??0)
        );
      }
    });
    renderGroups();
    document.querySelectorAll('.gcard').forEach((c,i)=>setTimeout(()=>c.classList.add('vis'),i*30));
    const officialAdvancedTeams = GROUPS_DATA.flatMap(g => g.teams.filter(t => t.advancedOfficial));
    console.log('[KO] Official advanced count:', officialAdvancedTeams.length, officialAdvancedTeams.map(t=>t.n));
    console.table(GROUPS_DATA.flatMap(g => g.teams.map(t => ({
      group: g.id, name: t.n, pts: t.pts, gd: t.gd, p: t.p,
      advancedOfficial: t.advancedOfficial, eliminated: t.eliminated, note: t.note
    }))));
    refreshKnockoutBracket();
  } catch(e){ console.error('[fetchGroupStandings error]', e); }
}

// ═══════════════════════════════════════════════════
//  LEADERBOARD (Player Stats — ESPN v4 statistics API)
// ═══════════════════════════════════════════════════
let lbCache = null;
let lbFetching = false;
let lbLastFetch = 0;
const LB_TTL = 5 * 60 * 1000;

// Map ESPN category display names → our internal keys + display config
const LB_CAT_MAP = {
  goals:       {keys:['scoring','goals','top scorer'],      valCls:'g', label:'Top Scorers',   statKey:'goals'},
  assists:     {keys:['assist'],                            valCls:'a', label:'Top Assists',    statKey:'assists'},
  yellow:      {keys:['yellow'],                            valCls:'y', label:'Yellow Cards',   statKey:'yellowCards'},
  red:         {keys:['red card','red-card','reds'],        valCls:'r', label:'Red Cards',      statKey:'redCards'},
  clean:       {keys:['clean sheet','clean-sheet','saves'], valCls:'c', label:'Clean Sheets',   statKey:'cleanSheets'},
};

function lbWatchScore(p){
  return (p.goals||0)*12 + (p.assists||0)*8 + (p.cleanSheets||0)*5 +
    ((p.teamPts||0) >= 7 ? 4 : (p.teamPts||0) >= 4 ? 2 : 0) +
    (p.yellowCards||0)*-1.5 + (p.redCards||0)*-10;
}

async function fetchLeaderboardData(){
  if(lbFetching) return;
  if(lbCache?.ts && Date.now() - lbLastFetch < LB_TTL) return;
  lbFetching = true;
  if($('tab-leaderboard')?.classList.contains('active')) renderLeaderboard();

  try {
    // ── Overview: match + goal counts from scoreboard ──
    let totalGoals = 0, matchCount = 0;
    const now = new Date();
    const dateStrs = [];
    for(let i = 0; i <= 14; i++){
      const dt = new Date(now); dt.setDate(dt.getDate()-i);
      dateStrs.push(toDateStr(dt));
    }
    await Promise.all(dateStrs.map(async ds => {
      try {
        const r = await fetch(`${ESPN_URL}?dates=${ds}&limit=50`, {signal:AbortSignal.timeout(7000)});
        if(!r.ok) return;
        const data = await r.json();
        (data.events||[]).forEach(ev => {
          const comp = ev.competitions?.[0];
          if(comp?.status?.type?.state !== 'post') return;
          matchCount++;
          (comp.competitors||[]).forEach(c => { totalGoals += parseInt(c.score)||0; });
        });
      } catch(e){}
    }));

    // ── Player stats: server-side aggregator (primary) → ESPN endpoints (fallback) ──
    const tables = {goals:[], assists:[], yellow:[], red:[], clean:[]};
    const playerMap = {};

    function matchCat(catName) {
      for(const [key,cfg] of Object.entries(LB_CAT_MAP)){
        if(cfg.keys.some(k=>catName.includes(k))) return [key,cfg];
      }
      return [null,null];
    }

    function toLeader(entry, idx) {
      const athlete = entry.athlete || entry;
      const abbr = athlete.team?.abbreviation||'';
      const name = athlete.displayName||'';
      const val  = parseFloat(entry.value??entry.displayValue)||0;
      return {rank:idx+1,id:String(athlete.id||''),name,teamName:athlete.team?.displayName||'',abbr,
              f:FLAGS[abbr]||'🏳️',displayVal:entry.displayValue||String(val),val};
    }

    function parseCats(cats) {
      let found = 0;
      cats.forEach(cat => {
        const [key,cfg] = matchCat((cat.displayName||cat.name||'').toLowerCase());
        if(!key) return;
        const entries = cat.leaders||cat.athletes||cat.stats||[];
        const leaders = entries.map(toLeader).filter(l=>l.name&&l.val>0);
        if(!leaders.length) return;
        tables[key] = leaders.slice(0,10);
        leaders.forEach(l => {
          const k = l.name+'||'+l.abbr;
          if(!playerMap[k]) playerMap[k]={id:l.id||'',name:l.name,teamName:l.teamName,teamAbbr:l.abbr,f:l.f,
            goals:0,assists:0,yellowCards:0,redCards:0,cleanSheets:0,teamPts:0};
          playerMap[k][cfg.statKey]=l.val;
        });
        found++;
      });
      return found;
    }

    // 1. Primary: our server-side match aggregator
    let statsLoaded = false;
    try {
      const r = await fetch('/api/playerstats', {signal:AbortSignal.timeout(9000)});
      if(r.ok){
        const data = await r.json();
        if(parseCats(data.categories||[])) {
          statsLoaded = true;
          // Use matchCount from aggregator for the overview if available
          if(data.matchCount) matchCount = data.matchCount;
        }
      }
    } catch(e){}

    // 2. Fallback: ESPN v4 via proxy
    if(!statsLoaded){
      try {
        const r = await fetch(ESPN_STATS, {signal:AbortSignal.timeout(8000)});
        if(r.ok){
          const data = await r.json();
          const n = parseCats(data.categories||data.leaders||[]);
          if(n) statsLoaded = true;
        }
      } catch(e){}
    }

    // 3. Fallback: ESPN v2 leaders
    if(!statsLoaded){
      try {
        const r = await fetch(`${ESPN_LEADERS}?season=2026`, {signal:AbortSignal.timeout(8000)});
        if(r.ok){
          const data = await r.json();
          parseCats(data.leaders||data.categories||[]);
        }
      } catch(e){}
    }

    // ── Team form from standings → enriches Watch algorithm ──
    try {
      const r = await fetch(ESPN_STANDINGS, {signal:AbortSignal.timeout(8000)});
      if(r.ok){
        const data = await r.json();
        const tPts = {};
        (data.children||[]).forEach(child => {
          (child.standings?.entries||[]).forEach(entry => {
            const abbr = entry.team?.abbreviation||'';
            if(abbr) tPts[abbr] = getStat(entry.stats||[], 'points');
          });
        });
        Object.values(playerMap).forEach(p => {
          if(tPts[p.teamAbbr] !== undefined) p.teamPts = tPts[p.teamAbbr];
        });
      }
    } catch(e){}

    lbCache = {
      tables,
      watchList: Object.values(playerMap)
        .map(p => ({...p, ws: Math.round(lbWatchScore(p)*10)/10}))
        .filter(p => p.ws > 0)
        .sort((a,b) => b.ws - a.ws)
        .slice(0, 10),
      meta: {matchCount, totalGoals, avgGoals: matchCount ? (totalGoals/matchCount).toFixed(1):'—'},
      ts: Date.now(), error: false,
    };
    lbLastFetch = Date.now();
  } catch(e){
    if(!lbCache) lbCache = {
      tables:{goals:[],assists:[],yellow:[],red:[],clean:[]}, watchList:[],
      meta:{matchCount:0,totalGoals:0,avgGoals:'—'}, ts:null, error:true,
    };
  }
  lbFetching = false;
  if($('tab-leaderboard')?.classList.contains('active')) renderLeaderboard();
}

  const body = rows.length
    ? rows.map((p,i) => {
        if(p.id) _lbPlayerData[p.id]={name:p.name,teamName:p.teamName,teamAbbr:p.abbr||''};

        const teamEsc = esc(p.teamName||'');

          <span class="lb-rank${i<3?' gold':''}">${i<3?syms[i]:i+1}</span>

}

let deferredInstallPrompt = null;

function dismissInstall(){
  const b = $('installBanner');
  if(b) b.classList.remove('show');
  sessionStorage.setItem('installDismissed','1');
}

(function initInstallBanner(){
  if(sessionStorage.getItem('installDismissed')) return;
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if(isInStandalone) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  if(isIOS){
    const txt = $('installTxt');
    if(txt) txt.textContent = '📲 Tap Share  then "Add to Home Screen" to install';
    const btn = $('installBtn');
    if(btn) btn.style.display = 'none';
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
    return;
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
  });

  const btn = $('installBtn');
  if(btn){
    btn.onclick = async () => {
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const {outcome} = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      if(outcome === 'accepted') dismissInstall();
    };
  }
})();

async function fetchMatchSpotlight(team, spotlightContainerId='tp2Spotlight'){
  const container = $(spotlightContainerId);
  if(!container) return;

  const now = new Date();
  const dates = Array.from({length:35},(_,i)=>{
    const d=new Date(now); d.setDate(d.getDate()-20+i); return localDateStr(d);
  });

  const seen = new Set();
  const allMatches = [];
  await Promise.all(dates.map(async ds=>{
    try{
      const r=await fetch(`${ESPN_URL}?dates=${ds}`,{signal:AbortSignal.timeout(7000)});
      if(!r.ok) return;
      const data=await r.json();
      for(const ev of (data.events||[]).map(parseEvent)){
        if(seen.has(ev.id)) continue;
        if(favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)){
          seen.add(ev.id); allMatches.push(ev); _tpEvMap[ev.id]=ev;
        }
      }
    }catch(e){}
  }));

  allMatches.sort((a,b)=>a.date-b.date);

  if(!allMatches.length){ container.innerHTML=''; return; }

  const live     = allMatches.find(ev=>ev.state==='in');
  const next     = allMatches.find(ev=>ev.state==='pre');
  const last     = [...allMatches].filter(ev=>ev.state==='post').pop();
  const spotlight = live||next||last;
  const others   = allMatches.filter(ev=>ev.id!==spotlight?.id);

  if(!spotlight){ container.innerHTML=''; return; }

  const isHome = favTeamMatch(spotlight.home.name,team.n);
  const myT = isHome?spotlight.home:spotlight.away;
  const oppT= isHome?spotlight.away:spotlight.home;
  const isPre=spotlight.state==='pre', isLive=spotlight.state==='in', isPost=spotlight.state==='post';

  const won=isPost&&myT.winner, lost=isPost&&oppT.winner;
  const lbl=isLive?'LIVE NOW':isPre?'NEXT MATCH':'LAST RESULT';
  const lblColor=isLive?'var(--red)':isPre?'var(--accent)':'var(--t2)';
  const myFlag=myT.abbr?flag(myT.abbr)||team.f:team.f;
  const oppFlag=flag(oppT.abbr)||'🏳';

  const centerHtml=(isPost||isLive)
    ?`<div class="tp2-spot-score${won?' win':lost?' loss':''}">${myT.score}–${oppT.score}</div>${isLive?'<div style="font-size:9px;color:var(--red);font-weight:800;letter-spacing:.8px;margin-top:2px">LIVE</div>':''}`
    :`<div class="tp2-spot-vs">vs</div>`;

  const meta=[];
  meta.push(spotlight.date.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}));
  if(isPre||isLive) meta.push(localTime(spotlight.date));
  if(isPost) meta.push('Full Time');
  if(spotlight.venue) meta.push(spotlight.venue);

  const spotEl=document.createElement('div');
  spotEl.className='tp2-spotlight';
  spotEl.innerHTML=`
    <div class="tp2-spot-label" style="color:${lblColor}">${lbl}</div>
    <div class="tp2-spot-teams">
      <div class="tp2-spot-team"><div class="tp2-spot-flag">${myFlag}</div><div class="tp2-spot-tname">${myT.name}</div></div>
      <div class="tp2-spot-center">${centerHtml}</div>
      <div class="tp2-spot-team"><div class="tp2-spot-flag">${oppFlag}</div><div class="tp2-spot-tname">${oppT.name}</div></div>
    </div>
    <div class="tp2-spot-meta">${meta.join(' · ')}</div>`;
  spotEl.addEventListener('click',()=>openMatchModal(spotlight));

  container.innerHTML='';
  container.appendChild(spotEl);

  if(others.length){
    const schedEl=document.createElement('div');
    schedEl.className='tp2-sched';
    schedEl.innerHTML=others.map(ev=>{
      const ih=favTeamMatch(ev.home.name,team.n);
      const ms=ih?ev.home:ev.away, os=ih?ev.away:ev.home;
      const isp=ev.state==='post', isl=ev.state==='in', isu=ev.state==='pre';
      const cls=isp?(ms.winner?'w':os.winner?'l':'d'):(isl?'d':'up');
      const scoreStr=(isp||isl)?`${ms.score}–${os.score}`:'';
      const dateTxt=ev.date.toLocaleDateString([],{month:'short',day:'numeric'});
      const timeTxt=isu?(' · '+localTime(ev.date)):isl?' · Live':'';
      return`<div class="tp2-sched-row" data-eid="${ev.id}">
        <div class="tp2-sched-dot ${cls}"></div>
        <div class="tp2-sched-opp">${flag(os.abbr)||'🏳'} ${os.name}</div>
        <div class="tp2-sched-date">${dateTxt}${timeTxt}</div>
        ${scoreStr?`<div class="tp2-sched-score${isp?(ms.winner?' w':os.winner?' l':''):''}">${scoreStr}</div>`:''}
      </div>`;
    }).join('');
    container.appendChild(schedEl);
    schedEl.querySelectorAll('.tp2-sched-row[data-eid]').forEach(row=>{
      const ev=_tpEvMap[row.dataset.eid]; if(ev) row.addEventListener('click',()=>openMatchModal(ev));
    });
  }
}

        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td>
        <td style="color:${t.gd>=0?'var(--accent)':'#ff5555'}">${t.gd>0?'+':''}${t.gd}</td>
        <td><b>${t.pts}</b></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function favTeamMatch(espnName, teamN){
  if(!espnName||!teamN) return false;
  const a = espnName.toLowerCase().trim();
  const b = teamN.toLowerCase().trim();
  if(a===b) return true;
  if(b==='usa' && a.includes('united states')) return true;
  if(b==='south korea' && (a.includes('korea rep')||a.includes('south korea'))) return true;
  if(b==='ivory coast' && (a.includes('ivory')||a.includes('ivoire')||a.includes('cote'))) return true;
  if(b==='czech republic' && (a.includes('czech')||a.includes('czechia'))) return true;
  if(b==='dr congo' && a.includes('congo')) return true;
  return a.includes(b)||b.includes(a);
}

async function fetchFavMatches(team){
  const container = $('favMatches');
  if(!container) return;

  const dates = [];
  const now = new Date();
  for(let d=-5;d<=5;d++){
    const dt = new Date(now);
    dt.setDate(now.getDate()+d);
    dates.push(localDateStr(dt));
  }

  const found = [];
  await Promise.all(dates.map(async dateStr => {
    try{
      const r = await fetch(`${ESPN_URL}?dates=${dateStr}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) return;
      const data = await r.json();
      (data.events||[]).map(parseEvent).forEach(ev => {
        if(favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)){
          if(!found.some(e=>e.id===ev.id)) found.push(ev);
        }
      });
    }catch(e){}
  }));

  found.sort((a,b)=>a.date-b.date);

  const el2 = $('favMatches');
  if(!el2) return;

  if(!found.length){
    el2.innerHTML='<div class="mc-news-empty">No matches in the coming days — check back soon</div>';
    return;
  }

  el2.innerHTML = found.map(ev=>{
    const isHome = favTeamMatch(ev.home.name,team.n);
    const myT  = isHome?ev.home:ev.away;
    const oppT = isHome?ev.away:ev.home;
    const isLive = ev.state==='in';
    const isFt   = ev.state==='post';
    const statusLbl = isLive?'LIVE':isFt?'FT':'UP';
    const myWin  = isFt&&myT.winner;
    const oppWin = isFt&&oppT.winner;
    return`<div class="fav-match">
      <div class="fav-match-teams">
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(myT.abbr)||team.f}</span>
          <span class="fav-match-team">${myT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${myWin?' win':oppWin?' loss':''}">${myT.score}</span>`:''}
        </div>
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(oppT.abbr)}</span>
          <span class="fav-match-team">${oppT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${oppWin?' win':myWin?' loss':''}">${oppT.score}</span>`:''}
        </div>
        <div class="fav-match-meta">${ev.date.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})} · ${localTime(ev.date)}${ev.group?' · '+ev.group:''}${ev.venue?' · '+ev.venue:''}</div>
      </div>
      <span class="fav-pill ${statusLbl.toLowerCase()}">${statusLbl}</span>
    </div>`;
  }).join('');
}

// ── SQUAD ────────────────────────────────────────────────────────────
function renderTeamSquad(container, team){
  if(!container) return;
  const squad = [];
  for(const [id, d] of Object.entries(_playerClubs)){
    if(favTeamMatch(d.teamName||'', team.n) || favTeamMatch(d.teamAbbr||'', team.n)){
      squad.push({id, ...d});
    }
  }
  if(!squad.length){
    container.innerHTML='<div class="mc-news-empty">Squad data coming soon</div>';
    return;
  }
  const POS_ORDER=['G','D','M','F'];
  const POS_LABELS={G:'Goalkeepers',D:'Defenders',M:'Midfielders',F:'Forwards'};
  const POS_SHORT={G:'GK',D:'DEF',M:'MID',F:'FWD'};
  const groups={};
  for(const p of squad){
    const pos=(p.position||'F').charAt(0).toUpperCase();
    const key=POS_ORDER.includes(pos)?pos:'F';
    (groups[key]=groups[key]||[]).push(p);
  }
  for(const pos of POS_ORDER) groups[pos]?.sort((a,b)=>(parseInt(a.jersey)||99)-(parseInt(b.jersey)||99));

  const pills=POS_ORDER.filter(p=>groups[p]?.length).map(p=>
    `<button class="squad-pill" data-pos="${p}" onclick="filterSquad('${p}',this)">${POS_SHORT[p]} ${groups[p].length}</button>`
  ).join('');

  const list=POS_ORDER.filter(pos=>groups[pos]?.length).map(pos=>`
    <div class="squad-pos-group" data-pos="${pos}">
      <div class="squad-pos-hdr">${POS_LABELS[pos]} (${groups[pos].length})</div>
      <div class="squad-grid">
        ${groups[pos].map(p=>`<div class="squad-card" onclick="openPlayerById('${p.id}')">
          <div class="squad-num">${p.jersey||'—'}</div>
          <div class="squad-info">
            <div class="squad-name">${esc(p.name)}</div>
            ${p.club?`<div class="squad-club">${esc(p.club)}</div>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');

  container.innerHTML=`
    <div class="squad-filter">
      <button class="squad-pill active" onclick="filterSquad('all',this)">All ${squad.length}</button>
      ${pills}
    </div>
    <div>${list}</div>`;
}

function filterSquad(pos, btn){
  document.querySelectorAll('.squad-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.squad-pos-group').forEach(g=>{
    g.style.display=(pos==='all'||g.dataset.pos===pos)?'':'none';
  });
}

function statBar(label, valStr, pct, neg=false){
  const w = Math.min(Math.max(pct||0,0),100).toFixed(1)+'%';
  return `<div class="tstat-bar-row">
    <div class="tstat-bar-lbl"><span>${label}</span><strong>${valStr}</strong></div>
    <div class="tstat-bar-track"><div class="tstat-bar-fill${neg?' ga':''}" style="width:0" data-w="${w}"></div></div>
  </div>`;
}

async function fetchTeamMatchStats(team, anchorId='tp2StatsAnchor', statsId='favStats'){
  // Scan back 25 days to cover the full group stage
  const now = new Date();
  const dates = Array.from({length:25},(_,i)=>{
    const d = new Date(now); d.setDate(d.getDate()-i); return localDateStr(d);
  });

  const seen = new Set();
  const completedMatches = [];
  await Promise.all(dates.map(async ds=>{
    try{
      const r = await fetch(`${ESPN_URL}?dates=${ds}`,{signal:AbortSignal.timeout(7000)});
      if(!r.ok) return;
      const data = await r.json();
      for(const ev of (data.events||[]).map(parseEvent)){
        if(ev.state!=='post'||seen.has(ev.id)) continue;
        if(favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)){
          seen.add(ev.id); completedMatches.push(ev);
        }
      }
    }catch(e){}
  }));

  if(!completedMatches.length) return; // nothing to show — stay invisible

  // Clean sheet count (not shown elsewhere)
  const cs = completedMatches.filter(ev=>{
    const isHome = favTeamMatch(ev.home.name,team.n);
    return (parseInt(isHome?ev.away.score:ev.home.score)||0)===0;
  }).length;

  // Fetch summaries for boxscore stats
  const acc = {poss:[],shots:[],onTgt:[],corners:[],fouls:[],passes:[]};
  await Promise.all(completedMatches.slice(0,5).map(async ev=>{
    try{
      const r = await fetch(`${ESPN_SUMMARY}?event=${ev.id}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) return;
      const data = await r.json();
      for(const ts of (data.boxscore?.teams||[])){
        if(!favTeamMatch(ts.team?.displayName||'',team.n)&&!favTeamMatch(ts.team?.abbreviation||'',team.n)) continue;
        const stats = ts.statistics||[];
        const get = (...names) => {
          for(const n of names){
            const s=stats.find(x=>(x.name||'').toLowerCase()===n.toLowerCase()||(x.label||'').toLowerCase().replace(/\s+/g,'')===n.toLowerCase().replace(/\s+/g,''));
            if(s){ const v=parseFloat(s.displayValue??s.value); if(!isNaN(v)) return v; }
          }
          return null;
        };
        const poss=get('possessionPct','possession','ballPossession');
        const shots=get('totalShots','shots','shotAttempts');
        const onTgt=get('shotsOnTarget','onTarget','targetedShots','shotsOnGoal');
        const corn=get('cornerKicks','corners','corner');
        const foul=get('fouls','foulsCommitted');
        const pass=get('passAccuracy','passesAccuracy','passingAccuracy');
        if(poss!==null) acc.poss.push(poss);
        if(shots!==null) acc.shots.push(shots);
        if(onTgt!==null) acc.onTgt.push(onTgt);
        if(corn!==null) acc.corners.push(corn);
        if(foul!==null) acc.fouls.push(foul);
        if(pass!==null) acc.passes.push(pass);
      }
    }catch(e){}
  }));

  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const avgPoss  = avg(acc.poss);
  const avgShots = avg(acc.shots);
  const avgOnTgt = avg(acc.onTgt);
  const avgCorners = avg(acc.corners);
  const avgFouls = avg(acc.fouls);
  const avgPasses = avg(acc.passes);
  const f1 = v => v!==null ? v.toFixed(1) : '—';
  const hasBoxscore = avgShots!==null||avgPoss!==null;

  // Only inject the section when we have something meaningful to show
  if(!hasBoxscore && cs===0) return;

  const anchor = $(anchorId);
  if(!anchor) return;

  anchor.innerHTML = `
    <div class="fav-sect">Match Stats</div>
    <div id="${statsId}">
      ${cs>0?`<div class="tstat-grid" style="grid-template-columns:1fr 1fr;margin-bottom:10px">
        <div class="tstat-card"><div class="tstat-val" style="color:var(--gold)">${cs}</div><div class="tstat-lbl">Clean Sheets</div></div>
        ${avgShots!==null?`<div class="tstat-card"><div class="tstat-val">${f1(avgShots)}</div><div class="tstat-lbl">Shots / game</div></div>`:''}
      </div>`:''}
      ${hasBoxscore?`<div class="tstat-bars">
        ${avgPoss!==null ? statBar('Possession',f1(avgPoss)+'%',avgPoss) : ''}
        ${avgShots!==null ? statBar('Shots / game',f1(avgShots),(avgShots/20)*100) : ''}
        ${avgOnTgt!==null&&avgShots ? statBar('On Target %',Math.round((avgOnTgt/(avgShots||1))*100)+'%',(avgOnTgt/(avgShots||1))*100) : ''}
        ${avgPasses!==null ? statBar('Pass Accuracy',f1(avgPasses)+'%',avgPasses) : ''}
        ${avgCorners!==null ? statBar('Corners / game',f1(avgCorners),(avgCorners/12)*100) : ''}
        ${avgFouls!==null ? statBar('Fouls / game',f1(avgFouls),(avgFouls/20)*100,true) : ''}
      </div>`:''}
    </div>`;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    anchor.querySelectorAll('.tstat-bar-fill').forEach(bar=>{ bar.style.width=bar.dataset.w; });
  }));
}

const RB_FILTERS = [
  {id:'all',   label:'All Rules'},
  {id:'new',   label:'New & Updated'},
  {id:'tech',  label:'VAR & Tech'},
  {id:'setpiece',label:'Set Pieces'},
  {id:'conduct',label:'Player Conduct'},
  {id:'subs',  label:'Substitutions'},
  {id:'match', label:'Match Format'},
  {id:'format',label:'Tournament'},
];

function renderRulebook(){
  const sec = $('tab-rulebook');
  if(sec.dataset.loaded) return;
  sec.dataset.loaded = '1';

  let activeFilter = 'all';

  function filteredRules(){
    if(activeFilter === 'all') return RULEBOOK_DATA;
    if(activeFilter === 'new') return RULEBOOK_DATA.filter(r=>r.badge==='new'||r.badge==='updated');
    return RULEBOOK_DATA.filter(r=>r.cat===activeFilter);
  }

  function buildCards(rules){
    if(!rules.length){
      return `<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">No rules in this category</div>`;
    }

    let html = '';
    if(activeFilter === 'all'){
      const newRules   = rules.filter(r=>r.badge==='new');
      const updated    = rules.filter(r=>r.badge==='updated');
      const core       = rules.filter(r=>r.badge==='core');
      if(newRules.length) html += `<div class="rb-sec-label">New for WC 2026</div>`  + newRules.map(cardHTML).join('');
      if(updated.length)  html += `<div class="rb-sec-label">Updated Rules</div>`    + updated.map(cardHTML).join('');
      if(core.length)     html += `<div class="rb-sec-label">Core Laws (Reference)</div>` + core.map(cardHTML).join('');
    } else {
      html = rules.map(cardHTML).join('');
    }
    return html;
  }

  function cardHTML(r){
    return `<div class="rb-card" id="rbc-${r.id}" onclick="toggleRBCard('${r.id}')">
      <div class="rb-card-head">
        <div class="rb-icon">${r.icon}</div>
        <div class="rb-card-body">
          <div><span class="rb-badge ${r.badge}">${r.label}</span></div>
          <div class="rb-card-title">${r.title}</div>
          <div class="rb-card-summary">${r.summary}</div>
        </div>
        <div class="rb-chevron">›</div>
      </div>
      <div class="rb-detail">${r.detail}</div>
    </div>`;
  }

  function render(){
    const rules = filteredRules();
    cardsEl.innerHTML = buildCards(rules);
  }

  sec.innerHTML = `<div class="inner rb-page">
    <div class="rb-hd">
      <div class="rb-hd-title">Laws of the Game</div>
      <div class="rb-hd-sub">Official referee rules for FIFA World Cup 2026 — including every change made for this tournament.</div>
    </div>
    <div class="rb-spotlight">
      <div class="rb-spot-eyebrow">What's New in 2026</div>
      <div class="rb-spot-title">48 Teams, New Tech, Stricter Conduct Rules</div>
      <div class="rb-spot-body">World Cup 2026 introduces the biggest format change in tournament history (48 teams, 12 groups), continues Semi-Automatic Offside Technology from 2022, and enforces new 2024-25 IFAB laws covering formal yellow/red cards for coaches and permanent concussion substitutes. Tap any rule below to read the full detail.</div>
    </div>
    <div class="rb-filter" id="rbFilter"></div>
    <div id="rbCards"></div>
  </div>`;

  const filterEl = $('rbFilter');
  const cardsEl  = $('rbCards');

  filterEl.innerHTML = RB_FILTERS.map(f=>
    `<button class="rb-pill${f.id===activeFilter?' active':''}" onclick="setRBFilter('${f.id}')">${f.label}</button>`
  ).join('');

  render();

  window.setRBFilter = function(id){
    activeFilter = id;
    filterEl.querySelectorAll('.rb-pill').forEach(p=>{
      p.classList.toggle('active', p.textContent === RB_FILTERS.find(f=>f.id===id).label);
    });
    render();
  };

  window.toggleRBCard = function(id){
    const card = document.getElementById('rbc-'+id);
    if(card) card.classList.toggle('open');
  };
}

function showGoalCelebration(ox, oy){
  ox = ox ?? window.innerWidth  / 2;
  oy = oy ?? window.innerHeight / 2;

  // Banner
  const banner = document.createElement('div');
  banner.className = 'goal-banner';
  banner.textContent = 'GOAL!';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 1900);

  // Particles — two waves for depth
  const waves = [
    { n:14, distMin:110, distMax:240, sizeMin:20, sizeMax:36, durMin:850, durMax:1100, delayMax:0   },
    { n:8,  distMin:60,  distMax:140, sizeMin:14, sizeMax:22, durMin:600, durMax:800,  delayMax:120 },
  ];
  waves.forEach(w => {
    for(let i=0;i<w.n;i++){
      const angle  = (360/w.n)*i + (Math.random()-.5)*25;
      const dist   = w.distMin + Math.random()*(w.distMax-w.distMin);
      const dur    = w.durMin  + Math.random()*(w.durMax-w.durMin);
      const delay  = Math.random()*w.delayMax;
      const size   = w.sizeMin + Math.random()*(w.sizeMax-w.sizeMin);
      const rad    = angle*Math.PI/180;
      const tx     = Math.cos(rad)*dist;
      const ty     = Math.sin(rad)*dist;
      const p      = document.createElement('div');
      p.className  = 'goal-particle';
      p.textContent= '⚽';
      p.style.cssText=`left:${ox}px;top:${oy}px;font-size:${size}px;`+
        `--tx:${tx}px;--ty:${ty}px;--dur:${dur}ms;--delay:${delay}ms;`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), dur+delay+100);
    }
  });
}
