async function fetchAndRenderPlayer(athleteId, playerName, teamInfo, ev){
  if(!playerCache[athleteId]){
    try{
      const[profR,newsR]=await Promise.all([
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/athletes/${athleteId}`,{signal:AbortSignal.timeout(8000)}).catch(()=>null),
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/athletes/${athleteId}/news`,{signal:AbortSignal.timeout(8000)}).catch(()=>null),
      ]);
      const prof=profR?.ok?await profR.json():{};
      const news=newsR?.ok?await newsR.json():{};
      playerCache[athleteId]={prof,news};
    }catch(e){playerCache[athleteId]={prof:{},news:{}};}
  }
  const{prof,news}=playerCache[athleteId];
  const ath=prof?.athlete||{};

  // Update photo with ESPN headshot if available
  const hs=ath.headshot?.href;
  if(hs){
    const photoEl=document.getElementById('plPhoto');
    if(photoEl) photoEl.innerHTML=`<img src="${hs}" alt="${playerName}" loading="lazy" onerror="this.parentElement.textContent='${flag(teamInfo.abbr)}'">`;
  }

  // Bio + tournament stats
  const profileEl=document.getElementById('plProfile');
  if(profileEl) profileEl.innerHTML=renderPlayerProfile(ath);

  // News — combine athlete endpoint + match news, filter to articles mentioning this player
  const matchArticles=mcState?.data?.news?.articles||[];
  const allArticles=[...(news?.articles||[]),...matchArticles];
  const newsEl=document.getElementById('plNews');
  if(newsEl) newsEl.innerHTML=renderPlayerNews(allArticles, playerName);

  // Player highlight (async, fills #plHighlights when ready)
  fetchPlayerHighlight(athleteId, playerName, ev);
}

function renderPlayerProfile(ath){
  const bio=[];
  if(ath.age)            bio.push({k:'Age',v:String(ath.age)});
  if(ath.displayHeight)  bio.push({k:'Height',v:ath.displayHeight});
  if(ath.displayWeight)  bio.push({k:'Weight',v:ath.displayWeight});
  const nat=ath.flag?.alt||ath.citizenship;
  if(nat)                bio.push({k:'Nationality',v:nat});
  const club=ath.team?.displayName||ath.team?.name;
  if(club)               bio.push({k:'Club',v:club});
  if(ath.dateOfBirth){
    const d=new Date(ath.dateOfBirth);
    bio.push({k:'Born',v:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})});
  }

  const allStats=(ath.statistics||[]).flatMap(s=>s.splits?.categories||[]).flatMap(c=>c.stats||[]);
  const gv=name=>{const s=allStats.find(x=>x.name===name);return s?.displayValue??s?.value??null;};
  const KEYS=[['appearances','Apps'],['goals','Goals'],['assists','Assists'],['minutesPlayed','Minutes'],
    ['shots','Shots'],['shotsOnTarget','On Target'],['saves','Saves'],['cleanSheets','Clean Sheets'],
    ['yellowCards','Yellow'],['redCards','Red']];
  const tournStats=KEYS.map(([k,l])=>{const v=gv(k);return v!=null&&v!=='0'?{lbl:l,val:v}:null;}).filter(Boolean);

  let h='';
  if(bio.length){
    h+=`<div class="pl-sec">Profile</div><div class="pl-info-grid">${bio.map(b=>`<div class="pl-info-row"><div class="pl-info-k">${b.k}</div><div class="pl-info-v">${b.v}</div></div>`).join('')}</div>`;
  }
  if(tournStats.length){
    h+=`<div class="pl-sec">Tournament Stats</div><div class="pl-sgrid">${tournStats.map(s=>`<div class="pl-sbox"><div class="pl-sval">${s.val}</div><div class="pl-slbl">${s.lbl}</div></div>`).join('')}</div>`;
  }
  return h;
}

function renderPlayerNews(articles, playerName){
  // Only show articles that actually mention this player by name
  const nameLow=(playerName||'').toLowerCase();
  const nameParts=nameLow.split(/\s+/).filter(w=>w.length>=4);
  const relevant=articles.filter(a=>{
    const hay=((a.headline||'')+' '+(a.description||'')+' '+(a.summary||'')).toLowerCase();
    return nameParts.some(p=>hay.includes(p));
  });
  // Deduplicate by headline
  const seen=new Set();
  const unique=relevant.filter(a=>{const k=a.headline||'';if(seen.has(k))return false;seen.add(k);return true;});
  if(!unique.length) return`<div class="pl-sec">News</div><div class="mc-news-empty">No news found for ${playerName}</div>`;
  const items=unique.slice(0,5).map(a=>{
    const url=a.links?.web?.href||'#';
    const img=a.images?.[0]?.url||'';
    const dt=a.lastModified||a.published||'';
    return`<a class="mc-news-item" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      ${img?`<img class="mc-news-img" src="${img}" alt="" loading="lazy">`:'<div class="mc-news-img"></div>'}
      <div class="mc-news-cnt">
        <div class="mc-news-ttl">${a.headline||'—'}</div>
        <div class="mc-news-meta">ESPN${dt?' · '+timeAgo(dt):''}</div>
      </div></a>`;
  }).join('');
  return`<div class="pl-sec">News</div>${items}`;
}

async function fetchPlayerHighlight(athleteId, playerName, ev){
  if(playerHlCache[athleteId]!==undefined){
    _renderPlayerHighlight(athleteId);
    return;
  }
  playerHlCache[athleteId]=null;
  try{
    const nameParts=playerName.toLowerCase().split(/\s+/);
    const lastName=nameParts[nameParts.length-1];
    const q=encodeURIComponent(`${playerName} FIFA World Cup 2026`);
    const r=await fetch(`${YT_SEARCH_URL}?part=snippet&q=${q}&type=video&order=relevance&maxResults=10&key=${YT_KEY}`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    const scored=(d.items||[]).map(i=>{
      const t=i.snippet.title.toLowerCase();
      let s=0;
      if(t.includes(playerName.toLowerCase())) s+=3;
      else if(lastName.length>=4&&t.includes(lastName)) s+=2;
      if(t.includes('world cup')||t.includes('2026')) s+=2;
      if(t.includes('goal')||t.includes('highlight')||t.includes('skill')||t.includes('save')) s+=1;
      return{i,s};
    // Require score ≥5: player name (3) + WC/2026 (2) — filters pre-tournament/transfer content
    }).filter(x=>x.s>=5).sort((a,b)=>b.s-a.s);
    const hit=scored[0]?.i;
    if(hit) playerHlCache[athleteId]={videoId:hit.id.videoId,title:hit.snippet.title};
  }catch(e){}
  _renderPlayerHighlight(athleteId);
}

function _renderPlayerHighlight(athleteId){
  const el=document.getElementById('plHighlights');
  if(!el) return;
  const hl=playerHlCache[athleteId];
  if(hl?.videoId){
    el.innerHTML=`<div class="pl-sec">Highlights</div><div class="mc-hl-tab">${buildThumb(hl.videoId,hl.title).outerHTML}</div>`;

}

function getStat(stats, name){
  const s = stats.find(x => x.name===name || x.shortDisplayName===name);
  return s ? (parseFloat(s.value)||0) : 0;
}

async function fetchGroupStandings(){
  try {
    const r = await fetch(ESPN_STANDINGS, { signal: AbortSignal.timeout(8000) });
    if(!r.ok) return;
    const data = await r.json();

    // ESPN v2 standings: data.children[] is one child per group
    const groupMap = {};
    (data.children||[]).forEach(child => {
      const m = (child.name||'').match(/Group\s+([A-La-l])/i);
      if(!m) return;
      const gId = m[1].toUpperCase();
      groupMap[gId] = [];
      (child.standings?.entries||[]).forEach(entry => {
        const stats = entry.stats || [];
        const abbr  = entry.team?.abbreviation || '';
        const name  = entry.team?.displayName   || entry.team?.name || '';
        const gf    = getStat(stats,'pointsFor');
        const ga    = getStat(stats,'pointsAgainst');
        const clinched = /advance|qualified/i.test(entry.note?.description || '');
        groupMap[gId].push({
          n: name, abbr,
          f:   FLAGS[abbr] || '🏳️',
          p:   getStat(stats,'gamesPlayed'),
          w:   getStat(stats,'wins'),
          d:   getStat(stats,'ties'),
          l:   getStat(stats,'losses'),
          gf, ga,
          gd:  gf - ga,
          pts: getStat(stats,'points'),
          clinched,
        });
      });
    });

    if(!Object.keys(groupMap).length) return;

    GROUPS_DATA.forEach(g => {
      if(groupMap[g.id] && groupMap[g.id].length){
        g.teams = groupMap[g.id].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
      }
    });
    renderGroups();
    document.querySelectorAll('.gcard').forEach((c,i)=>setTimeout(()=>c.classList.add('vis'),i*30));
    updateKnockoutQualifiers();
  } catch(e){ /* keep static data */ }
}

function updateKnockoutFromGroups(){
  GROUPS_DATA.forEach(g => {
    const teams = (g.teams||[]).slice().sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    if(teams.length < 3) return;
    const maxGames = 3;
    const groupDone = teams.every(t => t.p >= maxGames);
    const third = teams[2];
    const thirdMaxPts = third.pts + Math.max(0, maxGames - third.p) * 3;

    if(groupDone || teams[0].pts > thirdMaxPts){
      fillKOSlot('1'+g.id, teams[0]);
    }
    if(groupDone && teams[1]){
      fillKOSlot('2'+g.id, teams[1]);
    }
  });
}

function fillKOSlot(key, team){
  document.querySelectorAll(`#bracket [data-slot="${key}"]`).forEach(bt => {
    bt.className = 'bt';
    delete bt.dataset.slot;
    bt.innerHTML = `<span class="bf">${team.f}</span><span class="bn">${team.n}</span>`;
  });
}

// keep old name as alias for callers
function updateKnockoutQualifiers(){ updateKnockoutFromGroups(); }

function renderKnockoutDynamic(rounds){
  const sec = $('tab-knockout');
  sec.innerHTML = `
    <div class="ko-hd">Knockout Stage</div>
    <div class="ko-sub">Round of 32 · Round of 16 · Quarter-Finals · Semi-Finals · Final — MetLife Stadium, July 19</div>
    <div class="bscroll"><div class="bracket" id="bracket"></div></div>`;
  const b = $('bracket');

  const roundOrder = ['Round of 32','Round of 16','Quarter-Final','Semi-Final','Final'];
  const leftRounds  = roundOrder.slice(0, Math.ceil((roundOrder.length-1)/2));
  const rightRounds = [...roundOrder.slice(Math.ceil((roundOrder.length-1)/2), roundOrder.length-1)].reverse();

  function mkDynRound(label, matches){
    const r = el('div','brd');
    r.innerHTML = `<div class="brd-lbl">${label}</div>`;
    const bm = el('div','bmatches');
    matches.forEach(([t1,t2,state]) => {
      const m = el('div','bm');
      [t1,t2].forEach((t,i) => {
        if(i===1){ m.append(el('div','bsep')); }
        const isTBD = !t || t.n==='TBD';
        const isWin = t?.winner;
        const cls   = 'bt'+(isTBD?' tbd':isWin?' win':'');
        const bt    = el('div', cls);
        const scoreHtml = (!isTBD && t.score!==null && state!=='pre')
          ? `<span style="margin-left:auto;font-family:var(--mono);font-weight:700">${t.score}</span>` : '';
        bt.innerHTML = isTBD
          ? `<span class="bn">— TBD —</span>`
          : `<span class="bf">${t.f}</span><span class="bn">${t.n}</span>${scoreHtml}`;
        m.append(bt);
      });
      bm.append(m);
    });
    r.append(bm);
    return r;
  }

  function mkTBDRound(label, count){
    const r = el('div','brd');
    r.innerHTML = `<div class="brd-lbl">${label}</div>`;
    const bm = el('div','bmatches');
    for(let i=0;i<count;i++){
      const m = el('div','bm');
      m.innerHTML = `<div class="bt tbd"><span class="bn">— TBD —</span></div>
        <div class="bsep"></div><div class="bt tbd"><span class="bn">— TBD —</span></div>`;
      bm.append(m);
    }
    r.append(bm);
    return r;
  }

  const countFor = (lbl) => lbl==='Round of 32'?8:lbl==='Round of 16'?4:lbl==='Quarter-Final'?2:1;

  leftRounds.forEach(lbl  => b.append(rounds[lbl] ? mkDynRound(lbl,rounds[lbl]) : mkTBDRound(lbl,countFor(lbl))));

  const trophy = el('div','trophy');
  trophy.innerHTML = `<div class="trophy-i">🏆</div><div class="trophy-l">Final<br>Jul 19</div><div class="trophy-t">MetLife<br>Stadium</div>`;
  b.append(trophy);

  rightRounds.forEach(lbl => b.append(rounds[lbl] ? mkDynRound(lbl,rounds[lbl]) : mkTBDRound(lbl,countFor(lbl))));
}

let lbCache = null;
let lbFetching = false;
let lbLastFetch = 0;
const LB_TTL = 5 * 60 * 1000;

async function fetchLeaderboardData(){
  if(lbFetching) return;
  if(lbCache?.ts && Date.now() - lbLastFetch < LB_TTL) return;
  lbFetching = true;
  if($('tab-leaderboard')?.classList.contains('active')) renderLeaderboard();

  try {
    // Scoreboard: count completed matches + total goals
    let totalGoals = 0, matchCount = 0;
    const now = new Date();
    const dateStrs = [];
    for(let i = 0; i <= 30; i++){
      const dt = new Date(now); dt.setDate(dt.getDate() - i);
      dateStrs.push(toDateStr(dt));
    }
    await Promise.all(dateStrs.map(async ds => {
      try {
        const r = await fetch(`${ESPN_URL}?dates=${ds}&limit=50`, {signal: AbortSignal.timeout(7000)});
        if(!r.ok) return;
        const data = await r.json();
        (data.events || []).forEach(ev => {
          const comp = ev.competitions?.[0];
          if(comp?.status?.type?.state !== 'post') return;
          matchCount++;
          (comp.competitors || []).forEach(c => { totalGoals += parseInt(c.score) || 0; });
        });
      } catch(e){}
    }));

    // Standings: all 12 groups from ESPN standings API
    let standingsGroups = [];
    try {
      const r = await fetch(`${ESPN_STANDINGS}?season=2026`, {signal: AbortSignal.timeout(8000)});
      if(r.ok){
        const data = await r.json();
        standingsGroups = (data.children || []).map(child => {
          const m = (child.name || '').match(/Group\s+([A-La-l])/i);
          const gId = m ? m[1].toUpperCase() : child.name;
          const teams = (child.standings?.entries || []).map(entry => {
            const stats = entry.stats || [];
            const abbr  = entry.team?.abbreviation || '';
            const gf    = getStat(stats, 'pointsFor');
            const ga    = getStat(stats, 'pointsAgainst');
            return {
              n:   entry.team?.displayName || entry.team?.name || '',
              abbr,
              f:   FLAGS[abbr] || '🏳️',
              p:   getStat(stats, 'gamesPlayed'),
              w:   getStat(stats, 'wins'),
              d:   getStat(stats, 'ties'),
              l:   getStat(stats, 'losses'),
              gf, ga,
              gd:  gf - ga,
              pts: getStat(stats, 'points'),
              clinched: /advance|qualified/i.test(entry.note?.description || ''),
            };
          }).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
          return { id: gId, name: child.name || `Group ${gId}`, teams };
        }).filter(g => g.teams.length > 0).sort((a,b) => a.id.localeCompare(b.id));
      }
    } catch(e){}

    lbCache = {
      meta: { matchCount, totalGoals, avgGoals: matchCount ? (totalGoals/matchCount).toFixed(1) : '—' },
      standingsGroups,
      ts: Date.now(),
      error: false,
    };
    lbLastFetch = Date.now();
  } catch(e){
    if(!lbCache) lbCache = {
      meta: {matchCount:0, totalGoals:0, avgGoals:'—'},
      standingsGroups: [],
      ts: null, error: true,
    };
  }
  lbFetching = false;
  if($('tab-leaderboard')?.classList.contains('active')) renderLeaderboard();
}

function renderLeaderboard(){
  const sec = $('tab-leaderboard');
  if(!sec) return;

  if(!lbCache || lbFetching){
    sec.innerHTML = `<div class="inner lb-page">
      <div class="lb-hd">Standings</div>
      <div class="lb-meta"><span class="lb-ts">FIFA World Cup 2026</span></div>
      <div class="lineup-loading">Loading standings…</div>
    </div>`;
    if(!lbFetching) fetchLeaderboardData();
    return;
  }

  const m  = lbCache.meta || {};
  const ts = lbCache.ts ? timeAgo(new Date(lbCache.ts).toISOString()) : null;
  const groups = lbCache.standingsGroups || [];

  // Flatten + sort all teams for the top-teams leaderboard
  const allTeams = [];
  groups.forEach(g => g.teams.forEach(t => allTeams.push({...t, group: g.id})));
  allTeams.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

  const topTeamsHtml = allTeams.length ? `
    <div class="lb-section">Top Teams</div>
    <div class="lb-teams-box">
      <div class="lb-teams-hdr">
        <span>#</span><span>Team</span><span>Grp</span><span>P</span><span>GD</span><span>Pts</span>
      </div>
      ${allTeams.map((t,i) => {
        const gd  = t.gd > 0 ? `+${t.gd}` : String(t.gd);
        const gdC = t.gd > 0 ? 'pos' : t.gd < 0 ? 'neg' : '';
        return `<div class="lb-team-row">
          <span class="lb-tr-rank${i < 8 ? ' top' : ''}">${i+1}</span>
          <div class="lb-tr-team">
            <span class="lb-tr-flag">${t.f}</span>
            <span class="lb-tr-name">${t.n}</span>
          </div>
          <span class="lb-tr-grp">${t.group}</span>
          <span class="lb-tr-stat">${t.p}</span>
          <span class="lb-tr-stat ${gdC}">${gd}</span>
          <span class="lb-tr-pts">${t.pts}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  const groupsHtml = groups.length ? `
    <div class="lb-section">Group Standings</div>
    <div class="lb-grp-grid">
      ${groups.map(g => `
        <div class="lb-grp-card">
          <div class="lb-grp-hd">${g.name}</div>
          <table class="lb-grp-tbl">
            <thead><tr>
              <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
            </tr></thead>
            <tbody>${g.teams.map(t => {
              const gd  = t.gd > 0 ? `+${t.gd}` : String(t.gd);
              const gdC = t.gd > 0 ? 'lb-gd-pos' : t.gd < 0 ? 'lb-gd-neg' : '';
              return `<tr>
                <td><div class="lb-grp-team">
                  <span class="lb-grp-flag">${t.f}</span>
                  <span class="lb-grp-tname${t.clinched ? ' lb-qualified' : ''}">${t.n}</span>
                </div></td>
                <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
                <td class="${gdC}">${gd}</td>
                <td class="lb-pts">${t.pts}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`).join('')}
    </div>` : `
    <div class="lb-section">Group Standings</div>
    <div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;line-height:2">
      Standings will appear once group stage begins.
    </div>`;

  sec.innerHTML = `<div class="inner lb-page">
    <div class="lb-hd">Standings</div>
    <div class="lb-meta">
      <span class="lb-ts">FIFA World Cup 2026${ts ? ` · Updated ${ts}` : ''}</span>
      <button class="lb-refresh-btn" onclick="lbCache=null;lbLastFetch=0;renderLeaderboard()">Refresh</button>
    </div>
    <div class="lb-overview">
      <div class="lb-ov-cell">
        <div class="lb-ov-val">${m.matchCount || 0}</div>
        <div class="lb-ov-lbl">Matches</div>
      </div>
      <div class="lb-ov-cell">
        <div class="lb-ov-val" style="color:var(--accent)">${m.totalGoals || 0}</div>
        <div class="lb-ov-lbl">Goals</div>
      </div>
      <div class="lb-ov-cell">
        <div class="lb-ov-val" style="color:var(--gold)">${m.avgGoals || '—'}</div>
        <div class="lb-ov-lbl">Per Game</div>
      </div>
    </div>
    ${topTeamsHtml}
    ${groupsHtml}
  </div>`;

  if(Date.now() - lbLastFetch > LB_TTL) fetchLeaderboardData();
}

// Auto-refresh when tab is active
setInterval(() => {
  if($('tab-leaderboard')?.classList.contains('active')) fetchLeaderboardData();
}, LB_TTL);

      sizes:'any',type:'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  const link = document.createElement('link');

let deferredInstallPrompt = null;

function dismissInstall(){
  const b = $('installBanner');
  if(b) b.classList.remove('show');
  sessionStorage.setItem('installDismissed','1');
}

(function initInstallBanner(){
  if(sessionStorage.getItem('installDismissed')) return;
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if(isInStandalone) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  if(isIOS){
    const txt = $('installTxt');
    if(txt) txt.textContent = '📲 Tap Share  then "Add to Home Screen" to install';
    const btn = $('installBtn');
    if(btn) btn.style.display = 'none';
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
    return;
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
  });

  const btn = $('installBtn');
  if(btn){
    btn.onclick = async () => {
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const {outcome} = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      if(outcome === 'accepted') dismissInstall();
    };
  }
})();

function renderFavGroupTable(g, myTeam){

  return`<table class="fav-gtbl">
    <thead><tr>

        <td><b>${t.pts}</b></td>
      </tr>`;
    }).join('')}</tbody>

function favTeamMatch(espnName, teamN){
  if(!espnName||!teamN) return false;
  const a = espnName.toLowerCase().trim();
  const b = teamN.toLowerCase().trim();
  if(a===b) return true;
  if(b==='usa' && a.includes('united states')) return true;
  if(b==='south korea' && (a.includes('korea rep')||a.includes('south korea'))) return true;
  if(b==='ivory coast' && (a.includes('ivory')||a.includes('ivoire')||a.includes('cote'))) return true;
  if(b==='czech republic' && (a.includes('czech')||a.includes('czechia'))) return true;
  if(b==='dr congo' && a.includes('congo')) return true;
  return a.includes(b)||b.includes(a);
}

async function fetchFavMatches(team){
  const container = $('favMatches');
  if(!container) return;

  const dates = [];
  const now = new Date();
  for(let d=-5;d<=5;d++){
    const dt = new Date(now);
    dt.setDate(now.getDate()+d);
    dates.push(toDateStr(dt));
  }

  const found = [];
  await Promise.all(dates.map(async dateStr => {
    try{
      const r = await fetch(`${ESPN_URL}?dates=${dateStr}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) return;
      const data = await r.json();
      (data.events||[]).map(parseEvent).forEach(ev => {
        if(favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)){
          if(!found.some(e=>e.id===ev.id)) found.push(ev);
        }
      });
    }catch(e){}
  }));

  found.sort((a,b)=>a.date-b.date);

  const el2 = $('favMatches');
  if(!el2) return;

  if(!found.length){
    el2.innerHTML='<div class="mc-news-empty">No matches in the coming days — check back soon</div>';
    return;
  }

  el2.innerHTML = found.map(ev=>{
    const isHome = favTeamMatch(ev.home.name,team.n);
    const myT  = isHome?ev.home:ev.away;
    const oppT = isHome?ev.away:ev.home;
    const isLive = ev.state==='in';
    const isFt   = ev.state==='post';
    const statusLbl = isLive?'LIVE':isFt?'FT':'UP';
    const myWin  = isFt&&myT.winner;
    const oppWin = isFt&&oppT.winner;
    return`<div class="fav-match">
      <div class="fav-match-teams">
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(myT.abbr)||team.f}</span>
          <span class="fav-match-team">${myT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${myWin?' win':oppWin?' loss':''}">${myT.score}</span>`:''}
        </div>
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(oppT.abbr)}</span>
          <span class="fav-match-team">${oppT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${oppWin?' win':myWin?' loss':''}">${oppT.score}</span>`:''}
        </div>
        <div class="fav-match-meta">${ev.group||''}${ev.venue?' · '+ev.venue:''} · ${localTime(ev.date)}</div>
      </div>
      <span class="fav-pill ${statusLbl.toLowerCase()}">${statusLbl}</span>
    </div>`;
  }).join('');
}

async function fetchFavNews(team){
  const container = $('favNews');
  if(!container) return;

  const teamEv = (lastEvents||[]).find(ev =>
    favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)
  );

  if(teamEv){
    try{
      const r = await fetch(`${ESPN_SUMMARY}?event=${teamEv.id}`,{signal:AbortSignal.timeout(9000)});
      if(r.ok){
        const data = await r.json();
        const articles = data?.news?.articles||[];
        if(articles.length){
          const el2 = $('favNews');
          if(!el2) return;
          el2.innerHTML = articles.slice(0,5).map(a=>{
            const url = a.links?.web?.href||'#';
            const img = a.images?.[0]?.url||'';
            const dt  = a.lastModified||a.published||'';
            return`<a class="mc-news-item" href="${url}" target="_blank" rel="noopener">
              ${img?`<img class="mc-news-img" src="${img}" alt="" loading="lazy">`:'<div class="mc-news-img"></div>'}
              <div class="mc-news-cnt">
                <div class="mc-news-ttl">${a.headline||'—'}</div>
                <div class="mc-news-meta">ESPN${dt?' · '+timeAgo(dt):''}</div>
              </div></a>`;
          }).join('');
          return;
        }
      }
    }catch(e){}
  }

  const el2 = $('favNews');
  if(el2) el2.innerHTML='<div class="mc-news-empty">News will appear here on match days</div>';
}

const RB_FILTERS = [
  {id:'all',   label:'All Rules'},
  {id:'new',   label:'New & Updated'},
  {id:'tech',  label:'VAR & Tech'},
  {id:'setpiece',label:'Set Pieces'},
  {id:'conduct',label:'Player Conduct'},
  {id:'subs',  label:'Substitutions'},
  {id:'match', label:'Match Format'},
  {id:'format',label:'Tournament'},
];

function renderRulebook(){
  const sec = $('tab-rulebook');
  if(sec.dataset.loaded) return;
  sec.dataset.loaded = '1';

  let activeFilter = 'all';

  function filteredRules(){
    if(activeFilter === 'all') return RULEBOOK_DATA;
    if(activeFilter === 'new') return RULEBOOK_DATA.filter(r=>r.badge==='new'||r.badge==='updated');
    return RULEBOOK_DATA.filter(r=>r.cat===activeFilter);
  }

  function buildCards(rules){
    if(!rules.length){
      return `<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">No rules in this category</div>`;
    }

    let html = '';
    if(activeFilter === 'all'){
      const newRules   = rules.filter(r=>r.badge==='new');
      const updated    = rules.filter(r=>r.badge==='updated');
      const core       = rules.filter(r=>r.badge==='core');
      if(newRules.length) html += `<div class="rb-sec-label">New for WC 2026</div>`  + newRules.map(cardHTML).join('');
      if(updated.length)  html += `<div class="rb-sec-label">Updated Rules</div>`    + updated.map(cardHTML).join('');
      if(core.length)     html += `<div class="rb-sec-label">Core Laws (Reference)</div>` + core.map(cardHTML).join('');
    } else {
      html = rules.map(cardHTML).join('');
    }
    return html;
  }

  function cardHTML(r){
    return `<div class="rb-card" id="rbc-${r.id}" onclick="toggleRBCard('${r.id}')">
      <div class="rb-card-head">
        <div class="rb-icon">${r.icon}</div>
        <div class="rb-card-body">
          <div><span class="rb-badge ${r.badge}">${r.label}</span></div>
          <div class="rb-card-title">${r.title}</div>
          <div class="rb-card-summary">${r.summary}</div>
        </div>
        <div class="rb-chevron">›</div>
      </div>
      <div class="rb-detail">${r.detail}</div>
    </div>`;
  }

  function render(){
    const rules = filteredRules();
    cardsEl.innerHTML = buildCards(rules);
  }

  sec.innerHTML = `<div class="inner rb-page">
    <div class="rb-hd">
      <div class="rb-hd-title">Laws of the Game</div>
      <div class="rb-hd-sub">Official referee rules for FIFA World Cup 2026 — including every change made for this tournament.</div>
    </div>
    <div class="rb-spotlight">
      <div class="rb-spot-eyebrow">What's New in 2026</div>
      <div class="rb-spot-title">48 Teams, New Tech, Stricter Conduct Rules</div>
      <div class="rb-spot-body">World Cup 2026 introduces the biggest format change in tournament history (48 teams, 12 groups), continues Semi-Automatic Offside Technology from 2022, and enforces new 2024-25 IFAB laws covering formal yellow/red cards for coaches and permanent concussion substitutes. Tap any rule below to read the full detail.</div>
    </div>
    <div class="rb-filter" id="rbFilter"></div>
    <div id="rbCards"></div>
  </div>`;

  const filterEl = $('rbFilter');
  const cardsEl  = $('rbCards');

  filterEl.innerHTML = RB_FILTERS.map(f=>
    `<button class="rb-pill${f.id===activeFilter?' active':''}" onclick="setRBFilter('${f.id}')">${f.label}</button>`
  ).join('');

  render();

  window.setRBFilter = function(id){
    activeFilter = id;
    filterEl.querySelectorAll('.rb-pill').forEach(p=>{
      p.classList.toggle('active', p.textContent === RB_FILTERS.find(f=>f.id===id).label);
    });
    render();
  };

  window.toggleRBCard = function(id){
    const card = document.getElementById('rbc-'+id);
    if(card) card.classList.toggle('open');
  };
}

renderKnockout();
updateKnockoutQualifiers();

fetchGroupStandings();
fetchKnockoutData();
if(favTeam) renderMyTeam();
setTimeout(observeCards, 200);
setInterval(tick, 1000);
</script>
