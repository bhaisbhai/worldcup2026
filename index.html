<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Game Buddy">
<meta name="theme-color" content="#080808">
<title>Game Buddy — FIFA World Cup 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--card:#111;--card2:#141414;--border:#1f1f1f;
  --accent:#00FF87;--red:#FF3B3B;--gold:#FFD700;
  --text:#fff;--t2:#888;--t3:#3a3a3a;
  --r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(255,255,255,.01) 80px,rgba(255,255,255,.01) 81px);
}

/* ── HEADER ────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.hdr-in{
  max-width:1240px;margin:0 auto;padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;height:66px;gap:12px;
}
.wordmark{line-height:1.1}
.wordmark-name{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.wordmark-event{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.9px;text-transform:uppercase;margin-top:3px}
.sub{font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.2px}
.hdr-r{display:flex;align-items:center;gap:14px}

/* live pill */
.live-pill{
  display:flex;align-items:center;gap:6px;padding:5px 11px;
  background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.25);
  border-radius:100px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.8px;
  transition:opacity .3s;
}
.live-pill.hidden{opacity:0;pointer-events:none}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pDot 1.6s ease-in-out infinite}
@keyframes pDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,135,.7)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,255,135,0)}}

/* clock + refresh */
.hdr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.clock{font-family:var(--mono);font-size:13px;color:var(--t2);letter-spacing:.8px}
.refresh-label{
  font-size:10px;color:var(--t2);letter-spacing:.3px;height:12px;
  transition:opacity .3s;
}
.refresh-label.fetching{color:var(--accent)}

/* ── TABS ───────────────────────────────────── */
.tabs-bar{
  position:sticky;top:66px;z-index:90;
  background:rgba(8,8,8,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.tabs{max-width:1240px;margin:0 auto;padding:0 22px;display:flex}
.tbtn{
  background:none;border:none;color:var(--t2);font-family:var(--font);
  font-size:14px;font-weight:500;padding:15px 20px;cursor:pointer;
  position:relative;transition:color .2s;letter-spacing:.1px;
}
.tbtn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);transform:scaleX(0);transition:transform .22s ease;
  border-radius:2px 2px 0 0;
}
.tbtn.active{color:var(--text)}.tbtn.active::after{transform:scaleX(1)}
.tbtn:hover:not(.active){color:#ccc}

/* ── MAIN ───────────────────────────────────── */
.main{max-width:1240px;margin:0 auto;padding:26px 22px}
.tab{display:none;animation:fadeUp .2s ease}
.tab.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}


/* ── SECTION HEADER ─────────────────────────── */
.sec-hd{display:flex;align-items:center;gap:9px;margin:26px 0 13px}
.sec-hd:first-of-type{margin-top:0}
.sbadge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;
}
.sbadge.live{background:rgba(255,59,59,.12);color:var(--red);border:1px solid rgba(255,59,59,.28)}
.sbadge.live .rd{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blinkR 1.1s ease-in-out infinite}
@keyframes blinkR{0%,100%{opacity:1}50%{opacity:.2}}
.sbadge.ft{background:rgba(136,136,136,.1);color:var(--t2);border:1px solid rgba(136,136,136,.18)}
.sbadge.up{background:rgba(255,215,0,.07);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.sc-count{font-size:12px;color:var(--t2)}

/* ── MATCH GRID ─────────────────────────────── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px;margin-bottom:6px}

/* ── MATCH CARD ─────────────────────────────── */
.mc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:17px 19px;cursor:default;position:relative;overflow:hidden;
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
  /* scroll anim */
  opacity:0;transform:translateY(12px);
}
.mc.vis{opacity:1;transform:translateY(0);transition:opacity .38s ease,transform .38s ease}
.mc.vis:hover{transform:translateY(-2px);border-color:#272727;box-shadow:0 10px 32px rgba(0,0,0,.45)}
/* live border */
.mc.live{border-left:3px solid var(--accent)}
.mc.live::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);animation:gBar 2.2s ease-in-out infinite;
}
@keyframes gBar{0%,100%{box-shadow:0 0 8px rgba(0,255,135,.5)}50%{box-shadow:0 0 22px rgba(0,255,135,1)}}
.mc.ft.vis{opacity:.7}.mc.ft.vis:hover{opacity:1}

.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mc-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.mc-badge.live{background:rgba(0,255,135,.12);color:var(--accent);border:1px solid rgba(0,255,135,.25)}
.mc-badge.ft{background:rgba(255,255,255,.05);color:var(--t2)}
.mc-badge.up{background:rgba(255,215,0,.07);color:var(--gold)}
.mc-grp{font-size:11px;color:var(--t2);text-align:right;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.mc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:13px}
.tcol{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:0}
.tflag{font-size:28px;line-height:1}
.tname{font-size:12px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tname.winner{color:var(--accent)}

.scwrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sc{font-family:var(--mono);font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;min-width:24px;text-align:center}
.sc-sep{font-size:18px;color:var(--t3);font-weight:300}
.sc.vs{font-size:20px;color:var(--t2);font-weight:400}

.mc-foot{display:flex;align-items:center;justify-content:space-between}
.mc-min{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);
  background:rgba(0,255,135,.1);padding:2px 7px;border-radius:5px;letter-spacing:.4px;
}
.mc-min.ht{color:var(--gold);background:rgba(255,215,0,.1)}
.mc-ft-time{font-size:11px;color:var(--t2)}
.mc-venue{font-size:11px;color:var(--t2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.mc-cd{font-family:var(--mono);font-size:11px;color:var(--gold);font-weight:600}

/* ── SKELETON ───────────────────────────────── */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}
.skel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:17px 19px;height:148px;overflow:hidden;position:relative;
}
.skel::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.skel-line{background:rgba(255,255,255,.06);border-radius:4px;margin-bottom:8px}

/* ── ERROR ──────────────────────────────────── */
.err-card{
  background:var(--card);border:1px solid rgba(255,59,59,.25);border-radius:var(--r);
  padding:28px;text-align:center;display:none;
}
.err-card.show{display:block}
.err-icon{font-size:28px;margin-bottom:8px}
.err-title{font-size:16px;font-weight:600;margin-bottom:4px}
.err-sub{font-size:13px;color:var(--t2)}
.err-retry{
  margin-top:16px;background:none;border:1px solid var(--border);color:var(--text);
  font-family:var(--font);font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.err-retry:hover{border-color:#333;background:rgba(255,255,255,.04)}

/* ── EMPTY STATE ────────────────────────────── */
.empty{text-align:center;padding:40px 24px;color:var(--t2);font-size:14px}

/* ── BROADCAST BADGE ────────────────────────── */
.mc-tv{font-size:10px;color:var(--t2);letter-spacing:.3px}

/* ── HIGHLIGHTS THUMBNAIL ────────────────────── */
.mc-thumb{
  display:block;margin-top:12px;border-radius:8px;overflow:hidden;
  position:relative;text-decoration:none;aspect-ratio:16/9;background:#000;
  border:1px solid var(--border);
}
.mc-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .3s ease,opacity .3s;opacity:.88;
}
.mc-thumb:hover img{transform:scale(1.03);opacity:1}
.mc-thumb-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.15) 60%,transparent 100%);
}
.mc-thumb-play{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;flex-shrink:0;
}
.mc-thumb:hover .mc-thumb-play{transform:scale(1.1);background:rgba(255,0,0,1)}
.mc-thumb-play svg{width:18px;height:18px;fill:#fff;margin-left:3px}
.mc-thumb-lbl{
  font-size:10px;font-weight:700;letter-spacing:.6px;color:rgba(255,255,255,.85);
  text-transform:uppercase;
}
.mc-thumb-title{
  position:absolute;bottom:7px;left:10px;right:10px;
  font-size:10px;color:rgba(255,255,255,.7);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── GROUPS ─────────────────────────────────── */
.g-hd{font-size:21px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.g-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(355px,1fr));gap:14px}
.gcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;opacity:0;transform:translateY(12px);transition:border-color .2s;
}
.gcard.vis{opacity:1;transform:translateY(0);transition:opacity .38s ease,transform .38s ease}
.gcard:hover{border-color:#272727}
.gcard-hd{
  padding:10px 15px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.gcard-hd-l{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2)}
.gcard-hd-r{font-size:10px;color:var(--t3);font-family:var(--mono)}
.gtbl{width:100%;border-collapse:collapse}
.gtbl th{
  padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t3);text-align:center;background:rgba(255,255,255,.015);
  border-bottom:1px solid var(--border);
}
.gtbl th.tl{text-align:left;padding-left:14px}
.gtbl td{padding:9px 10px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.gtbl td.tl{text-align:left;padding-left:14px}
.gtbl tr:last-child td{border-bottom:none}
.gtbl tr.lead td{background:rgba(0,255,135,.04)}
.gtbl tr:hover td{background:rgba(255,255,255,.02)}
.gteam{display:flex;align-items:center;gap:7px}
.gflag{font-size:16px}
.gname{font-size:12px;font-weight:500}
.gpos{font-size:10px;color:var(--t3);font-family:var(--mono);margin-right:2px}
.gpts{font-weight:700;font-family:var(--mono)}.gpts.lead{color:var(--accent)}
.ggd{font-family:var(--mono);font-size:12px}
.qualify-line{height:2px;background:linear-gradient(90deg,rgba(0,255,135,.3),transparent)}

/* ── KNOCKOUT ───────────────────────────────── */
.ko-hd{font-size:21px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.ko-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.bscroll{overflow-x:auto;padding-bottom:20px}
.bracket{display:flex;align-items:stretch;min-width:1060px}
.brd{display:flex;flex-direction:column;flex:1}
.brd-lbl{
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t2);text-align:center;padding:11px 6px;border-bottom:1px solid var(--border);margin-bottom:10px;
}
.bmatches{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:0 5px 10px}
.bm{display:flex;flex-direction:column;gap:1px}
.bt{
  display:flex;align-items:center;gap:5px;padding:7px 8px;
  background:var(--card);border:1px solid var(--border);border-radius:5px;
  font-size:11px;font-weight:500;transition:border-color .18s;white-space:nowrap;overflow:hidden;
}
.bt:hover{border-color:#2a2a2a}
.bt.tbd{color:var(--t2);font-style:italic;font-size:10px}
.bt.win{border-color:rgba(0,255,135,.35);background:rgba(0,255,135,.04);color:var(--accent)}
.bf{font-size:13px;flex-shrink:0}
.bn{overflow:hidden;text-overflow:ellipsis}
.bsep{height:1px;background:rgba(255,255,255,.05);margin:1px 8px}
.trophy{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 12px;gap:6px;flex-shrink:0;width:76px}
.trophy-i{font-size:28px}
.trophy-l{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);text-align:center}
.trophy-t{font-size:10px;color:var(--t2);font-style:italic;text-align:center}

/* ── DAY NAV ────────────────────────────────── */
.day-nav{width:100%;margin-bottom:16px}
.dnav-row{display:flex;align-items:center;width:100%}
.dnav-btn{
  flex-shrink:0;background:none;border:1px solid var(--border);color:var(--t2);
  font-family:var(--font);font-size:20px;line-height:1;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;transition:border-color .18s,color .18s;
}
.dnav-btn:hover{border-color:#333;color:var(--text)}
.dnav-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.dnav-center{flex:1;text-align:center;padding:0 10px}
.dnav-date{font-size:16px;font-weight:700;letter-spacing:-.3px}
.dnav-sub{font-size:11px;color:var(--t2);margin-top:2px}
.dnav-back-row{text-align:center;margin-top:10px;display:none}
.dnav-back-row.show{display:block}
.dnav-today{
  font-size:11px;font-weight:700;letter-spacing:.6px;padding:5px 16px;
  background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.2);
  color:var(--accent);border-radius:100px;cursor:pointer;transition:background .18s;
}
.dnav-today:hover{background:rgba(0,255,135,.15)}
.mc{cursor:pointer}
.mc.vis:hover{transform:translateY(-2px);border-color:#272727;box-shadow:0 10px 32px rgba(0,0,0,.45)}

/* ── MISSION CONTROL MODAL ─────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{
  background:#111;border:1px solid #222;border-radius:16px;
  width:100%;max-width:840px;max-height:91vh;overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(18px);transition:transform .22s;
}
.modal-bg.open .modal{transform:translateY(0)}
.modal-close{
  background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;
  padding:2px 7px;border-radius:6px;flex-shrink:0;line-height:1;
  transition:color .15s,background .15s;
}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,.07)}
.lineup-loading{text-align:center;padding:30px 0;color:var(--t2);font-size:13px}

/* mc header */
.mc-hdr{padding:16px 20px 0;flex-shrink:0;position:relative}
.mc-close-wrap{position:absolute;top:11px;right:14px}
.mc-teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:2px 0 12px}
.mc-team-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.mc-flag{font-size:30px;line-height:1}
.mc-tname{font-size:12px;font-weight:700;text-align:center;line-height:1.3;padding:0 3px}
.mc-score-center{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.mc-snums{font-family:var(--mono);font-size:40px;font-weight:700;letter-spacing:-1px;line-height:1;display:flex;align-items:center;gap:9px}
.mc-snum{min-width:24px;text-align:center}
.mc-snum.win{color:var(--accent)}.mc-snum.lose{color:var(--t2)}
.mc-ssep{font-size:26px;color:var(--t3);font-weight:200;line-height:1}
.mc-vs{font-size:17px;color:var(--t2);font-weight:300}
.mc-spill{font-size:10px;font-weight:700;padding:3px 11px;border-radius:100px;letter-spacing:.7px;white-space:nowrap}
.mc-spill.live{background:rgba(255,59,59,.15);color:var(--red);border:1px solid rgba(255,59,59,.3);animation:sPulse 1.4s ease-in-out infinite}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:.5}}
.mc-spill.ft{background:rgba(136,136,136,.1);color:var(--t2);border:1px solid rgba(136,136,136,.2)}
.mc-spill.pre{background:rgba(255,215,0,.08);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.mc-ctx{padding:0 0 12px;font-size:11px;color:var(--t2);display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border)}
.mc-ctx-dot{color:var(--t3)}

/* tab bar */
.mc-tab-bar{display:flex;padding:0 20px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid var(--border)}
.mc-tab-bar::-webkit-scrollbar{display:none}
.mc-tab-btn{background:none;border:none;color:var(--t2);font-family:var(--font);font-size:10px;font-weight:700;padding:11px 13px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;position:relative;white-space:nowrap;transition:color .18s}
.mc-tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s;border-radius:2px 2px 0 0}
.mc-tab-btn.active{color:var(--text)}.mc-tab-btn.active::after{transform:scaleX(1)}
.mc-tab-btn:hover:not(.active){color:#ccc}
.mc-body{overflow-y:auto;flex:1;padding:18px 20px}

/* countdown */
.mc-cd{text-align:center;padding:12px 0 18px;border-bottom:1px solid var(--border);margin-bottom:16px}
.mc-cd-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.mc-cd-time{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--gold);letter-spacing:4px;font-variant-numeric:tabular-nums}
.mc-cd-sub{font-size:11px;color:var(--t2);margin-top:6px}

/* win probability */
.mc-prob{margin-bottom:14px}
.mc-prob-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.mc-prob-bar{height:7px;border-radius:4px;overflow:hidden;display:flex;gap:2px;margin-bottom:5px}
.mc-ph{background:var(--accent);transition:width .7s cubic-bezier(.4,0,.2,1);min-width:0}
.mc-pd{background:#444;min-width:0;transition:width .7s .1s cubic-bezier(.4,0,.2,1)}
.mc-pa{background:#ff5555;min-width:0;transition:width .7s .2s cubic-bezier(.4,0,.2,1)}
.mc-prob-nums{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono)}
.mc-phn{color:var(--accent);font-weight:700}.mc-pdn{color:var(--t2);text-align:center}.mc-pan{color:#ff7070;font-weight:700}

/* odds — redesigned */
.mc-odds-tbl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0 4px}
.mc-odds-cell{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:9px;padding:10px 8px;text-align:center}
.mc-odds-team{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.mc-odds-pct{font-family:var(--mono);font-size:16px;font-weight:700;margin-bottom:3px}
.mc-odds-dec{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--t1)}
.mc-odds-ml{font-size:9px;color:var(--t3);margin-top:2px}
.mc-odds-note{font-size:9px;color:var(--t3);text-align:right;margin-bottom:14px}
/* UK TV badge */
.mc-tv-uk{color:#60b8ff;font-weight:600}
/* lineup rating badge */
.mc-lu-rtg{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;margin-left:2px}
.mc-lu-rtg.hi{background:rgba(0,255,135,.15);color:var(--accent)}
.mc-lu-rtg.mid{background:rgba(255,215,0,.12);color:var(--gold)}
.mc-lu-rtg.lo{background:rgba(255,80,80,.10);color:#ff7070}

/* form guide */
.mc-form-row{display:flex;gap:12px;margin-bottom:16px}
.mc-form-side{flex:1;min-width:0}
.mc-form-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.mc-form-team{font-size:11px;font-weight:600;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-fdots{display:flex;gap:3px}
.mc-fdot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.mc-fdot.W{background:rgba(0,255,135,.18);color:var(--accent);border:1px solid rgba(0,255,135,.35)}
.mc-fdot.D{background:rgba(136,136,136,.12);color:var(--t2);border:1px solid rgba(136,136,136,.3)}
.mc-fdot.L{background:rgba(255,59,59,.12);color:#ff7070;border:1px solid rgba(255,59,59,.3)}

/* key players */
.mc-sect-hd{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.mc-leaders-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mc-lcard{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mc-lcard-flag{font-size:14px;margin-bottom:3px}
.mc-lcard-name{font-size:12px;font-weight:700;margin-bottom:2px}
.mc-lcard-cat{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.mc-lcard-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)}

/* info grid */
.mc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mc-ibox{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mc-ibox-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.mc-ibox-val{font-size:12px;font-weight:600;line-height:1.4}
.mc-ibox-sub{font-size:10px;color:var(--t2);margin-top:2px}

/* goal timeline */
.mc-tl{margin-bottom:18px}
.mc-tl-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.mc-tl-track{height:3px;background:rgba(255,255,255,.09);border-radius:2px;position:relative;margin:16px 0 5px}
.mc-tl-mins{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--t3)}
.mc-tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;cursor:help;transition:transform .15s}
.mc-tl-dot:hover{transform:translate(-50%,-50%) scale(1.5)}
.mc-tl-dot.home{background:var(--accent);box-shadow:0 0 8px rgba(0,255,135,.7)}
.mc-tl-dot.away{background:#ff5555;box-shadow:0 0 7px rgba(255,85,85,.7)}

/* scorers */
.mc-scorers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.mc-scol-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.mc-sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mc-sdot.home{background:var(--accent)}.mc-sdot.away{background:#ff5555}
.mc-srow{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.mc-srow:last-child{border-bottom:none}
.mc-smin{font-family:var(--mono);font-size:9px;color:var(--accent);font-weight:700;width:22px;flex-shrink:0}
.mc-sname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-stype{font-size:8px;color:var(--t2);padding:1px 4px;background:rgba(255,255,255,.05);border-radius:3px;flex-shrink:0}
.mc-no-goal{font-size:11px;color:var(--t3);font-style:italic;padding:4px 0}

/* quick snap */
.mc-snap{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:0}
.mc-snap-box{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mc-snap-val{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1}
.mc-snap-lbl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.mc-snap-sides{font-size:9px;color:var(--t3);margin-top:2px}

/* stats */
.mc-stat-hdr{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mc-stat-row{margin-bottom:11px}
.mc-stat-vals{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:4px;font-family:var(--mono)}
.mc-stat-lv{color:var(--accent);font-weight:700}.mc-stat-rv{color:#ff7070;font-weight:700}
.mc-stat-nm{color:var(--t2);font-size:9px;letter-spacing:.5px;text-transform:uppercase;text-align:center;flex:1}
.mc-stat-track{height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;display:flex;gap:2px}
.mc-stat-l{height:100%;background:var(--accent);border-radius:3px 0 0 3px;transition:width .65s cubic-bezier(.4,0,.2,1)}
.mc-stat-r{height:100%;background:#ff5555;border-radius:0 3px 3px 0;margin-left:auto;transition:width .65s .05s cubic-bezier(.4,0,.2,1)}
.mc-stat-na{text-align:center;padding:20px 0;color:var(--t2);font-size:13px}

/* lineups */
.mc-lu-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mc-lu-hd{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.mc-lu-flag{font-size:16px}
.mc-lu-sec{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:8px 0 3px}
.mc-lu-p{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.mc-lu-p:last-child{border-bottom:none}
.mc-lu-num{font-family:var(--mono);font-size:9px;color:var(--t3);width:14px;text-align:right;flex-shrink:0}
.mc-lu-pos{font-size:8px;color:var(--t2);padding:1px 4px;background:rgba(255,255,255,.05);border-radius:3px;flex-shrink:0;min-width:22px;text-align:center}
.mc-lu-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-lu-cap{font-size:9px;color:var(--gold);flex-shrink:0}
.mc-lu-na{font-size:12px;color:var(--t2);text-align:center;padding:16px 0}

/* news */
.mc-news-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:opacity .15s}
.mc-news-item:last-child{border-bottom:none}
.mc-news-item:hover{opacity:.8}
.mc-news-img{width:68px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06)}
.mc-news-cnt{flex:1;min-width:0}
.mc-news-ttl{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mc-news-meta{font-size:10px;color:var(--t2)}
.mc-news-empty{text-align:center;padding:20px 0;color:var(--t2);font-size:13px}

/* highlights tab */
.mc-hl-tab .mc-thumb{max-width:520px;margin:0 auto;display:block}

/* ── PLAYER DETAIL ───────────────────────── */
.mc-lu-p.clickable{cursor:pointer;border-radius:5px;transition:background .12s}
.mc-lu-p.clickable:hover{background:rgba(255,255,255,.05)}
.mc-lu-arrow{font-size:13px;color:var(--t3);margin-left:auto;flex-shrink:0;transition:color .12s}
.mc-lu-p.clickable:hover .mc-lu-arrow{color:var(--accent)}
.pl-back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:0 0 14px;display:flex;align-items:center;gap:5px;font-family:inherit;transition:color .12s}
.pl-back:hover{color:var(--accent)}
.pl-hero{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:4px}
.pl-photo{width:58px;height:58px;border-radius:50%;overflow:hidden;background:var(--card);flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px}
.pl-photo img{width:100%;height:100%;object-fit:cover;object-position:top center}
.pl-meta{flex:1;min-width:0}
.pl-pname{font-size:17px;font-weight:700;line-height:1.2}
.pl-psub{font-size:11px;color:var(--t2);margin-top:3px}
.pl-pnum{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--accent);flex-shrink:0}
.pl-sec{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin:16px 0 8px}
.pl-sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.pl-sbox{background:var(--card);border-radius:8px;padding:10px;text-align:center}
.pl-sval{font-family:var(--mono);font-size:20px;font-weight:700}
.pl-slbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.pl-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.pl-info-row{background:var(--card);border-radius:8px;padding:8px 10px}
.pl-info-k{color:var(--t2);font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pl-info-v{font-size:12px;font-weight:600}

@media(max-width:600px){
  .modal-bg{padding:0;align-items:flex-end}
  .modal{
    border-radius:16px 16px 0 0;
    max-height:88vh;        /* fallback for older browsers */
    max-height:88dvh;       /* dvh = excludes browser chrome — fixes iOS cut-off */
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  .modal::before{           /* drag handle indicator */
    content:'';display:block;width:36px;height:4px;border-radius:2px;
    background:#333;margin:10px auto 0;flex-shrink:0;
  }
  .mc-hdr{padding:10px 16px 0}
  .mc-teams-row{padding:4px 0 10px}
  .mc-flag{font-size:22px}
  .mc-snums{font-size:30px}
  .mc-tname{font-size:11px}
  .mc-close-wrap{top:6px;right:10px}
  .mc-body{padding:14px 16px}
  .mc-cd-time{font-size:28px;letter-spacing:2px}
  .mc-odds-tbl{gap:4px}
  .mc-odds-cell{padding:8px 6px}
  .mc-odds-pct{font-size:14px}
  .mc-odds-dec{font-size:11px}
  .mc-leaders-grid,.mc-lu-cols,.mc-scorers,.mc-info-grid{grid-template-columns:1fr}
  .mc-form-row{flex-direction:column}
}

/* ── RESPONSIVE ─────────────────────────────── */
@media(max-width:768px){
  .hdr-in{height:58px}.wordmark-name{font-size:15px}.clock{display:none}
  .main{padding:18px 14px}
  .mgrid,.ggrid{grid-template-columns:1fr}
  .sc{font-size:28px}.tflag{font-size:22px}
}
@media(max-width:480px){
  .tbtn{padding:13px 11px;font-size:13px}
  .mc-venue{display:none}
}

/* ── BRACKET MATCH INFO ─────────────────────────── */
.bm-info{font-size:9px;color:var(--t3);padding:2px 8px 5px;letter-spacing:.2px;line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt.lbl{color:var(--t2);font-size:10px}

/* ── INSTALL BANNER ─────────────────────────────── */
.install-banner{
  display:none;align-items:center;gap:10px;padding:9px 18px;
  background:rgba(0,255,135,.05);border-bottom:1px solid rgba(0,255,135,.12);
  font-size:12px;color:var(--t2);
}
.install-banner.show{display:flex}
.install-txt{flex:1}
.install-btn{
  background:var(--accent);color:#000;border:none;border-radius:8px;
  font-size:11px;font-weight:700;padding:5px 13px;cursor:pointer;flex-shrink:0;
  font-family:var(--font);letter-spacing:.3px;
}
.install-x{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}

/* ── LEADERBOARD ────────────────────────────────── */
.lb-page{max-width:720px;margin:0 auto}
.lb-hd{font-size:24px;font-weight:800;letter-spacing:-.5px;padding:24px 0 4px}
.lb-meta{font-size:12px;color:var(--t2);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.lb-ts{font-size:11px;color:var(--t3)}
.lb-refresh-btn{background:none;border:1px solid var(--border);color:var(--t3);font-family:var(--font);font-size:10px;padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.lb-refresh-btn:hover{border-color:#333;color:var(--text)}
.lb-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.lb-ov-cell{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center}
.lb-ov-val{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-.5px}
.lb-ov-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.lb-section{font-size:9px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);margin:24px 0 10px}
/* Top teams table */
.lb-teams-box{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.lb-teams-hdr{display:grid;grid-template-columns:28px 1fr 34px 22px 34px 36px;gap:2px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.lb-teams-hdr span{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);text-align:right}
.lb-teams-hdr span:nth-child(2){text-align:left}
.lb-team-row{display:grid;grid-template-columns:28px 1fr 34px 22px 34px 36px;gap:2px;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.lb-team-row:last-child{border-bottom:none}
.lb-team-row:nth-child(even){background:rgba(255,255,255,.012)}
.lb-tr-rank{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t3);text-align:center}
.lb-tr-rank.top{color:var(--accent)}
.lb-tr-team{display:flex;align-items:center;gap:7px;min-width:0}
.lb-tr-flag{font-size:15px;flex-shrink:0}
.lb-tr-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-tr-grp{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);text-align:right}
.lb-tr-stat{font-family:var(--mono);font-size:12px;font-weight:600;text-align:right;color:var(--t2)}
.lb-tr-stat.pos{color:#4cff9f}.lb-tr-stat.neg{color:var(--red)}
.lb-tr-pts{font-family:var(--mono);font-size:14px;font-weight:800;text-align:right;color:var(--accent)}
/* Group standings grid */
.lb-grp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
@media(max-width:540px){.lb-grp-grid{grid-template-columns:1fr}}
.lb-grp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.lb-grp-hd{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t2)}
.lb-grp-tbl{width:100%;border-collapse:collapse}
.lb-grp-tbl th{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);padding:6px 7px 5px;text-align:right}
.lb-grp-tbl th:first-child{text-align:left;padding-left:12px}
.lb-grp-tbl td{font-size:11px;padding:7px 7px;text-align:right;color:var(--t2);font-family:var(--mono)}
.lb-grp-tbl td:first-child{text-align:left;padding-left:12px;font-family:var(--font);color:var(--text)}
.lb-grp-tbl tr:nth-child(odd) td{background:rgba(255,255,255,.012)}
.lb-grp-tbl tr:first-child td{background:rgba(0,255,135,.035)}
.lb-grp-tbl .lb-gd-pos{color:#4cff9f}
.lb-grp-tbl .lb-gd-neg{color:var(--red)}
.lb-grp-tbl .lb-pts{font-weight:800;color:var(--text)}
.lb-grp-team{display:flex;align-items:center;gap:6px}
.lb-grp-flag{font-size:13px;flex-shrink:0}
.lb-grp-tname{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:88px}
.lb-qualified{color:var(--accent)!important;font-weight:700!important}

/* ── MY TEAM ────────────────────────────────────── */
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:14px}
.tp-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 8px;text-align:center;cursor:pointer;
  transition:border-color .15s,transform .15s;
}
.tp-card:hover{border-color:#333;transform:translateY(-2px)}
.tp-flag{font-size:24px;margin-bottom:4px}
.tp-name{font-size:10px;font-weight:600;line-height:1.3;color:var(--t2)}
.tp-grp{font-size:9px;color:var(--t3);margin-top:2px}

.fav-hero{display:flex;align-items:center;gap:16px;padding:0 0 20px;border-bottom:1px solid var(--border);margin-bottom:0}
.fav-flag-lg{font-size:54px;line-height:1;flex-shrink:0}
.fav-meta{min-width:0}
.fav-name{font-size:22px;font-weight:700;letter-spacing:-.4px}
.fav-sub{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.5}
.fav-change{background:none;border:1px solid var(--border);color:var(--t2);font-size:11px;
  padding:4px 11px;border-radius:8px;cursor:pointer;margin-top:10px;display:inline-block;
  font-family:var(--font);transition:border-color .15s;letter-spacing:.2px}
.fav-change:hover{border-color:#444;color:var(--text)}
.fav-sect{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t3);margin:22px 0 10px;padding-top:20px;border-top:1px solid var(--border)}
.fav-sect:first-of-type{border-top:none;padding-top:0;margin-top:20px}

.fav-match{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  margin-bottom:8px;transition:border-color .15s;
}
.fav-match:hover{border-color:#272727}
.fav-match-teams{flex:1;min-width:0}
.fav-match-row{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:2px}
.fav-match-row:last-child{margin-bottom:0}
.fav-match-flag{font-size:14px;flex-shrink:0}
.fav-match-team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-match-gs{font-family:var(--mono);font-size:13px;font-weight:700;min-width:14px;text-align:right}
.fav-match-gs.win{color:var(--accent)}.fav-match-gs.loss{color:#ff5555}
.fav-match-meta{font-size:10px;color:var(--t2);margin-top:5px}
.fav-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;letter-spacing:.4px;align-self:center}
.fav-pill.live{background:rgba(255,59,59,.12);color:var(--red)}
.fav-pill.ft{background:rgba(255,255,255,.06);color:var(--t2)}
.fav-pill.up{background:rgba(255,215,0,.08);color:var(--gold)}

.fav-gtbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.fav-gtbl th{padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--t3);text-align:center;border-bottom:1px solid var(--border)}
.fav-gtbl th.tl{text-align:left;padding-left:14px}
.fav-gtbl td{padding:9px 10px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.fav-gtbl td.tl{text-align:left;padding-left:14px}
.fav-gtbl tr:last-child td{border-bottom:none}
.fav-gtbl tr.me td{background:rgba(0,255,135,.04)}
.fav-gtbl .gteam{display:flex;align-items:center;gap:7px}

@media(max-width:768px){.tp-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}

/* ── RULEBOOK ───────────────────────────────────── */
.rb-page{max-width:680px;margin:0 auto}
.rb-hd{padding:24px 0 4px}
.rb-hd-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.rb-hd-sub{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.6}
.rb-spotlight{
  background:linear-gradient(135deg,rgba(0,255,135,.08) 0%,rgba(0,255,135,.03) 100%);
  border:1px solid rgba(0,255,135,.2);border-radius:14px;padding:16px 18px;margin:18px 0 22px;
}
.rb-spot-eyebrow{font-size:9px;font-weight:800;letter-spacing:1.2px;color:var(--accent);
  text-transform:uppercase;margin-bottom:8px}
.rb-spot-title{font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:5px}
.rb-spot-body{font-size:12px;color:var(--t2);line-height:1.75}
.rb-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.rb-filter::-webkit-scrollbar{display:none}
.rb-pill{
  flex-shrink:0;background:none;border:1px solid var(--border);color:var(--t2);
  font-family:var(--font);font-size:11px;font-weight:600;padding:6px 14px;
  border-radius:100px;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.rb-pill.active{background:rgba(0,255,135,.1);border-color:rgba(0,255,135,.35);color:var(--accent)}
.rb-pill:hover:not(.active){border-color:#333;color:var(--text)}
.rb-sec-label{font-size:9px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--t3);margin:24px 0 10px;padding-top:4px}
.rb-sec-label:first-of-type{margin-top:0}
.rb-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.rb-card:hover{border-color:#2a2a2a}
.rb-card.open{border-color:#303030}
.rb-card-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.rb-icon{font-size:22px;flex-shrink:0;line-height:1.2;width:28px;text-align:center}
.rb-card-body{flex:1;min-width:0}
.rb-badge{
  display:inline-block;font-size:8px;font-weight:800;letter-spacing:.9px;
  text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:5px;
}
.rb-badge.new{background:rgba(0,255,135,.15);color:var(--accent)}
.rb-badge.updated{background:rgba(255,215,0,.12);color:#ffd700}
.rb-badge.core{background:rgba(255,255,255,.06);color:var(--t3)}
.rb-card-title{font-size:14px;font-weight:700;letter-spacing:-.2px;line-height:1.3;margin-bottom:4px}
.rb-card-summary{font-size:12px;color:var(--t2);line-height:1.65}
.rb-chevron{flex-shrink:0;color:var(--t3);font-size:12px;align-self:center;
  transition:transform .2s;margin-left:4px;padding-top:2px}
.rb-card.open .rb-chevron{transform:rotate(90deg)}
.rb-detail{
  display:none;padding:0 16px 16px 56px;font-size:12px;color:var(--t2);
  line-height:1.8;border-top:1px solid rgba(255,255,255,.04);padding-top:12px;
}
.rb-card.open .rb-detail{display:block}
</style>

function parseMinute(displayClock){
  if(!displayClock || displayClock==='HT') return 45;
  const m = displayClock.replace(/'/g,'').split('+')[0].trim();
  return Math.max(0, parseInt(m)||0);
}

function countdown(dateObj){
  const diff = Math.max(0, dateObj - Date.now());
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  if(h>23) return 'Tomorrow';
  if(diff===0) return 'Starting…';
  return `${h>0?h+'h ':''}`+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s';
}

function localTime(dateObj){
  return dateObj.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function parseEvent(ev){
  const comp = ev.competitions[0];
  const status = comp.status;
  const state = status.type.state;
  const home = comp.competitors.find(c=>c.homeAway==='home') || comp.competitors[0];
  const away = comp.competitors.find(c=>c.homeAway==='away') || comp.competitors[1];
  const bcast = comp.broadcasts?.[0]?.names?.join(' · ') || '';
  const groupNote = comp.altGameNote || '';
  const groupMatch = groupNote.match(/Group ([A-Z])/);
  const groupLabel = groupMatch ? `Group ${groupMatch[1]}` : groupNote;

  return {
    id: ev.id,
    state,                         // "pre"|"in"|"post"
    isHT: status.type.name === 'STATUS_HALFTIME',
    displayClock: status.displayClock,
    detail: status.type.detail,    // "Tue, June 16th at 3:00 PM EDT"
    date: new Date(ev.date),
    home: {
      name: home.team.displayName,
      abbr: home.team.abbreviation,
      score: parseInt(home.score)||0,
      winner: home.winner||false,
    },
    away: {
      name: away.team.displayName,
      abbr: away.team.abbreviation,
      score: parseInt(away.score)||0,
      winner: away.winner||false,
    },
    venue: comp.venue?.fullName || ev.venue?.displayName || '',
    city: comp.venue?.address?.city || '',
    group: groupLabel,
    bcast,
  };
}

// One shared promise for the BBC catalog; fetched once per session, 2 pages = up to 100 videos
let _bbcCatalogPromise = null;
function getBBCCatalog(){
  if(_bbcCatalogPromise) return _bbcCatalogPromise;
  _bbcCatalogPromise = (async () => {
    const items = [];
    let pageToken = '';
    for(let page = 0; page < 2; page++){
      const url = `${YT_PLAYLIST_URL}?part=snippet&playlistId=${BBC_UPLOADS}&maxResults=50${pageToken?'&pageToken='+pageToken:''}&key=${YT_KEY}`;
      const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
      if(!r.ok) break;
      const d = await r.json();
      (d.items || []).forEach(it => items.push({
        videoId: it.snippet.resourceId?.videoId,
        title:   it.snippet.title,
      }));
      pageToken = d.nextPageToken || '';
      if(!pageToken) break;
    }
    return items.filter(v => v.videoId);
  })().catch(() => []);
  return _bbcCatalogPromise;
}

// ESPN ↔ BBC name mismatches
const TEAM_ALIASES = {
  'czechia':                      ['czech republic', 'czech'],
  'czech republic':               ['czechia', 'czech'],
  'korea republic':               ['south korea', 'korea'],
  'south korea':                  ['korea republic', 'korea'],
  'united states':                ['usa', 'usmnt', 'us men'],
  'usa':                          ['united states', 'usmnt'],
  'ivory coast':                  ["côte d'ivoire", "cote d'ivoire", 'ivory'],
  "côte d'ivoire":                ['ivory coast', 'ivory', 'cote'],
  'bosnia and herzegovina':       ['bosnia-herzegovina', 'bosnia & herzegovina', 'bosnia'],
  'bosnia-herzegovina':           ['bosnia and herzegovina', 'bosnia'],
  'dr congo':                     ['democratic republic of congo', 'congo dr', 'drc', 'congo'],
  'congo dr':                     ['dr congo', 'democratic republic of congo', 'congo'],
  'democratic republic of congo': ['dr congo', 'drc', 'congo'],
  'trinidad & tobago':            ['trinidad and tobago', 'trinidad'],
  'trinidad and tobago':          ['trinidad & tobago', 'trinidad'],
  'new zealand':                  ['all whites'],
  'saudi arabia':                 ['ksa', 'saudi'],
  'united arab emirates':         ['uae'],
  'north korea':                  ['dpr korea', 'korea dpr'],
  'dpr korea':                    ['north korea', 'korea dpr'],
};

function teamInTitle(title, name){
  const t = title.toLowerCase();
  const n = name.toLowerCase();
  if(t.includes(n)) return true;
  const aliases = TEAM_ALIASES[n] || [];
  if(aliases.some(a => t.includes(a))) return true;
  // Token fallback: any word 5+ chars from the team name found in title
  return n.split(/[\s\-]+/).filter(w => w.length >= 5).some(tok => t.includes(tok));
}

// All aliases for a team, for "v" pattern checking
function teamTokens(name){
  const n = name.toLowerCase();
  const base = [n, ...(TEAM_ALIASES[n] || [])];
  // Also add first significant word
  const sig = n.split(/[\s\-]+/).filter(w => w.length >= 4)[0];
  if(sig && !base.includes(sig)) base.push(sig);
  return base;
}

function hlScore(title, ev){
  const t = title.toLowerCase();
  if(!teamInTitle(t, ev.home.name) || !teamInTitle(t, ev.away.name)) return 0;
  let score = 1;
  // Bonus: BBC "X v Y" pattern using any alias combo
  const hToks = teamTokens(ev.home.name);
  const aToks = teamTokens(ev.away.name);
  const hasV = hToks.some(h => aToks.some(a => t.includes(`${h} v ${a}`) || t.includes(`${a} v ${h}`)));
  if(hasV) score += 1;
  if(t.includes('world cup') || t.includes('2026')) score += 1;
  return score;
}

async function fetchHighlight(ev){
  if(hlCache[ev.id] !== undefined) return;
  hlCache[ev.id] = null;
  try {
    // Use BBC's uploads playlist (real-time, no search index lag, 2 quota units for 100 videos)
    const catalog = await getBBCCatalog();
    const scored = catalog
      .map(v => ({ v, s: hlScore(v.title, ev) }))
      .filter(x => x.s >= 2)
      .sort((a, b) => b.s - a.s);
    const hit = scored[0]?.v;
    if(hit){
      hlCache[ev.id] = { videoId: hit.videoId, title: hit.title };
      document.querySelectorAll(`.mc-thumb-slot[data-hlid="${ev.id}"]`).forEach(slot => {
        slot.replaceWith(buildThumb(hit.videoId, hit.title));
      });
    }
  } catch(e){}
}

// ═══════════════════════════════════════════════════
function buildCard(ev){
  const isLive = ev.state==='in';
  const isFt   = ev.state==='post';
  const isUp   = ev.state==='pre';

  const card = el('div', `mc${isLive?' live':isFt?' ft':''}`);
  card.dataset.evId = ev.id;

  // badge
  let badge='', foot_l='', foot_r='';
  if(isLive){
    badge=`<div class="mc-badge live">● Live</div>`;
    const ht = ev.isHT;
    foot_l = ht
      ? `<div class="mc-min ht">HT</div>`
      : `<div class="mc-min" data-clockid="${ev.id}">${ev.displayClock}</div>`;
  } else if(isFt){
    badge=`<div class="mc-badge ft">FT</div>`;
    foot_l=`<div class="mc-ft-time">Full Time</div>`;
  } else {
    badge=`<div class="mc-badge up">Upcoming</div>`;
    foot_l=`<div class="mc-cd" data-cdid="${ev.id}" data-ts="${ev.date.getTime()}">${countdown(ev.date)}</div>`;
  }

  // score
  let scHtml;
  if(isUp){
    scHtml=`<div class="scwrap"><div class="sc vs">vs</div></div>`;
  } else {
    scHtml=`<div class="scwrap">
      <div class="sc">${ev.home.score}</div>
      <div class="sc-sep">:</div>
      <div class="sc">${ev.away.score}</div>
    </div>`;
  }

  // venue display
  const venueFull = [ev.venue, ev.city].filter(Boolean).join(' · ');
  foot_r = `<div class="mc-venue" title="${venueFull}">${venueFull || '—'}</div>`;

  const hlHtml = isFt ? `<div class="mc-thumb-slot" data-hlid="${ev.id}"></div>` : '';

  card.innerHTML = `
    <div class="mc-top">
      ${badge}
      <div class="mc-grp">${ev.group}<br><span class="mc-tv-uk">${getUKChannel(ev.home.abbr,ev.away.abbr)}</span></div>
    </div>
    <div class="mc-teams">
      <div class="tcol">
        <div class="tflag">${flag(ev.home.abbr)}</div>
        <div class="tname${ev.home.winner?' winner':''}">${ev.home.name}</div>
      </div>
      ${scHtml}
      <div class="tcol">
        <div class="tflag">${flag(ev.away.abbr)}</div>
        <div class="tname${ev.away.winner?' winner':''}">${ev.away.name}</div>
      </div>
    </div>
    <div class="mc-foot">${foot_l}${foot_r}</div>
    ${hlHtml}
  `;
  if(isFt){
    // If already cached, swap slot for thumbnail immediately
    const cached = hlCache[ev.id];
    if(cached?.videoId){
      card.querySelector('.mc-thumb-slot')?.replaceWith(buildThumb(cached.videoId, cached.title));
    } else {
      fetchHighlight(ev);
    }
  }
  return card;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WC_START = new Date('2026-06-11');

function fmtDate(d){
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function shiftDate(d, delta){
  const n = new Date(d); n.setDate(n.getDate()+delta); return n;
}
function isToday(d){
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function renderDayNav(d){
  let nav = $('day-nav');
  if(!nav){
    nav = el('div','day-nav'); nav.id='day-nav';
    $('today-content').prepend(nav);
  }
  const prev = shiftDate(d,-1);
  const next = shiftDate(d, 1);
  const isTod = isToday(d);
  nav.innerHTML = `
    <div class="dnav-row">
      <button class="dnav-btn" id="navPrev" title="${fmtDate(prev)}">‹</button>
      <div class="dnav-center">
        <div class="dnav-date">${fmtDate(d)}, ${d.getFullYear()}</div>
        <div class="dnav-sub">FIFA World Cup 2026 · Group Stage</div>
      </div>
      <button class="dnav-btn" id="navNext" title="${fmtDate(next)}"
        ${next > WC_END ? 'disabled' : ''}>›</button>
    </div>
    <div class="dnav-back-row${isTod?'':' show'}">
      <button class="dnav-today" id="navToday">Back to Today</button>
    </div>`;
  $('navPrev').onclick = () => goToDate(shiftDate(d,-1));
  $('navNext').onclick = () => goToDate(shiftDate(d, 1));
  const bt = $('navToday'); if(bt) bt.onclick = () => goToDate(null);
}

function goToDate(d){

  refreshIn = 30;
  showSkeleton(true);   // keep nav, clear cards

}

// ═══════════════════════════════════════════════════
//  PATCH CARD IN-PLACE (no-flash refresh)
// ═══════════════════════════════════════════════════
function patchCard(card, ev){
  const isLive = ev.state==='in';
  const isFt   = ev.state==='post';

  card.className = `mc${isLive?' live':isFt?' ft':''} vis`;

  const badge = card.querySelector('.mc-badge');
  if(badge){
    badge.className = `mc-badge ${isLive?'live':isFt?'ft':'up'}`;
    badge.textContent = isLive?'● Live':isFt?'FT':'Upcoming';
  }

  if(ev.state !== 'pre'){
    const scs = card.querySelectorAll('.sc:not(.vs)');
    if(scs[0]) scs[0].textContent = ev.home.score;
    if(scs[1]) scs[1].textContent = ev.away.score;
  }

  const tnames = card.querySelectorAll('.tname');
  if(tnames[0]) tnames[0].classList.toggle('winner', ev.home.winner);
  if(tnames[1]) tnames[1].classList.toggle('winner', ev.away.winner);

  const footL = card.querySelector('.mc-min,.mc-ft-time,.mc-cd');
  if(footL){
    if(isLive){
      footL.className = ev.isHT ? 'mc-min ht' : 'mc-min';
      delete footL.dataset.cdid;
      if(ev.isHT){ delete footL.dataset.clockid; footL.textContent='HT'; }
      else { footL.dataset.clockid=ev.id; footL.textContent=ev.displayClock; }
    } else if(isFt){
      footL.className='mc-ft-time'; delete footL.dataset.clockid; delete footL.dataset.cdid;
      footL.textContent='Full Time';
    } else {
      footL.className='mc-cd';
      footL.dataset.cdid=ev.id; footL.dataset.ts=ev.date.getTime();
      delete footL.dataset.clockid;
    }
  }

  // Add thumbnail when match finishes
  const existingThumb = card.querySelector('.mc-thumb,.mc-thumb-slot');
  if(isFt && !existingThumb){
    const cached = hlCache[ev.id];
    if(cached?.videoId){
      card.append(buildThumb(cached.videoId, cached.title));
    } else {
      const slot = document.createElement('div');
      slot.className = 'mc-thumb-slot';
      slot.dataset.hlid = ev.id;
      card.append(slot);
      fetchHighlight(ev);
    }
  } else if(!isFt && existingThumb){
    existingThumb.remove();
  }
}

// ═══════════════════════════════════════════════════
//  RENDER TODAY
// ═══════════════════════════════════════════════════
function renderToday(events, dayDate, patch){
  const wrap = $('today-content');
  const live     = events.filter(e=>e.state==='in');
  const finished = events.filter(e=>e.state==='post');
  const upcoming = events.filter(e=>e.state==='pre');

  $('livePill').classList.toggle('hidden', live.length===0);

  // Resolve the display date
  const dispDate = browseDate || (dayDate ? new Date(dayDate+'T12:00:00') : new Date());

  // --- patch mode: update existing cards without wiping the DOM ---
  if(patch){
    renderDayNav(dispDate);

    const existingIds = new Set([...wrap.querySelectorAll('.mc[data-ev-id]')].map(c=>c.dataset.evId));
    const newIds      = new Set(events.map(e=>e.id));

    // patch or add
    events.forEach(ev => {
      const card = wrap.querySelector(`.mc[data-ev-id="${ev.id}"]`);
      if(card){ patchCard(card, ev); }
      else {
        // new event appeared — full re-render is simpler; just rebuild
        patch = false;
      }
    });
    // remove disappeared events
    existingIds.forEach(id => {
      if(!newIds.has(id)){
        const c = wrap.querySelector(`.mc[data-ev-id="${id}"]`); if(c) c.remove();
      }
    });

    if(patch){
      live.forEach(ev => {
        if(!ev.isHT) liveClocks[ev.id] = { minute:parseMinute(ev.displayClock), fetchedAt:Date.now() };
      });
      return;
    }
  }

  // --- full render ---
  // preserve nav if it exists
  const navEl = $('day-nav');
  wrap.innerHTML = '';
  if(navEl) wrap.append(navEl);

  renderDayNav(dispDate);


  if(events.length===0){
    wrap.append(el('div','empty','No matches scheduled · Use the arrows to browse other days'));
    return;
  }

  function section(badge_html, list){
    if(!list.length) return;
    const hd = el('div','sec-hd');
    hd.innerHTML = badge_html+`<span class="sc-count">${list.length} match${list.length>1?'es':''}</span>`;
    wrap.append(hd);
    const g = el('div','mgrid');
    list.forEach((ev,i) => {
      const c = buildCard(ev);
      c.dataset.delay = i*50;
      c.onclick = () => openMatchModal(ev);
      g.append(c);
    });
    wrap.append(g);
  }

  section(`<div class="sbadge live"><div class="rd"></div>Live Now</div>`, live);
  section(`<div class="sbadge ft">✓ Finished</div>`, finished);
  section(`<div class="sbadge up">🕐 Upcoming</div>`, upcoming);

  live.forEach(ev => {
    if(!ev.isHT) liveClocks[ev.id] = { minute:parseMinute(ev.displayClock), fetchedAt:Date.now() };
  });

  setTimeout(observeCards, 30);
}

function showSkeleton(keepNav=false){
  const wrap = $('today-content');

async function fetchMatches(){
  setRefreshLabel('↻ Refreshing…', true);
  const isPatch = lastEvents.length > 0 && !document.querySelector('.skel-grid');
  const dateParam = browseDate ? '?dates='+toDateStr(browseDate) : '';
  try {
    const r = await fetch(ESPN_URL+dateParam, { signal: AbortSignal.timeout(8000) });
    if(!r.ok) throw new Error(`${r.status}`);
    const data = await r.json();
    const raw = data.events || [];
    const events = raw.map(parseEvent);
    lastEvents = events;
    const dayLabel = data.day?.date || '';
    renderToday(events, dayLabel, isPatch);
    hideErr();
  } catch(e){
    if(lastEvents.length === 0) showErr();
  }
  setRefreshLabel('Auto-refresh in 30s', false);
  refreshIn = 30;
}

function showErr(){
  const wrap = $('today-content');
  wrap.innerHTML = '';
  renderDayNav(new Date());
  const e = el('div','err-card show');
  e.innerHTML = `<div class="err-icon">📡</div>
    <div class="err-title">Live scores unavailable</div>
    <div class="err-sub">Could not connect to ESPN. Check back shortly.</div>
    <button class="err-retry" onclick="fetchMatches()">Try Again</button>`;
  wrap.append(e);
}

function hideErr(){
  const e = document.querySelector('.err-card');
  if(e) e.classList.remove('show');
}

let io;
function observeCards(){
  if(io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach((e,i) => {
      if(e.isIntersecting){
        const d = parseInt(e.target.dataset.delay||0);
        setTimeout(()=>e.target.classList.add('vis'), d);
        io.unobserve(e.target);
      }
    });
  },{threshold:.05, rootMargin:'0px 0px -10px 0px'});
  document.querySelectorAll('.mc:not(.vis),.gcard:not(.vis)').forEach(c=>io.observe(c));
}

function tick(){
  const now = Date.now();

  // Clock
  const d = new Date();
  $('clock').textContent = String(d.getHours()).padStart(2,'0')+':'+
    String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');

  // Live clock displays
  document.querySelectorAll('[data-clockid]').forEach(el => {
    const id = el.dataset.clockid;
    const state = liveClocks[id];
    if(state){
      const elapsed = Math.floor((now - state.fetchedAt)/1000);
      const cur = Math.min(state.minute + elapsed, 90);
      el.textContent = cur+"'";
    }
  });

  // Countdown timers
  document.querySelectorAll('[data-cdid]').forEach(el => {
    const ts = parseInt(el.dataset.ts);
    el.textContent = countdown(new Date(ts));
  });

  // Refresh countdown
  refreshIn = Math.max(0, refreshIn-1);
  if(refreshIn===0){
    fetchMatches();
  } else {
    setRefreshLabel(`Auto-refresh in ${refreshIn}s`, false);
  }
}

function mlToProb(ml){
  ml = parseFloat(ml);
  if(!ml || isNaN(ml)) return null;
  return ml < 0 ? (-ml)/(-ml+100) : 100/(ml+100);
}
function fmtML(ml){
  ml = parseFloat(ml);
  if(!ml || isNaN(ml)) return '—';
  return ml > 0 ? '+'+Math.round(ml) : String(Math.round(ml));
}
function decOdds(ml){ ml=parseFloat(ml); if(!ml||isNaN(ml)) return'—'; return(ml<0?100/(-ml)+1:ml/100+1).toFixed(2); }
function computeRating(stats){
  if(!stats?.length) return null;
  const get=n=>stats.find(s=>s.name===n)?.value||0;
  let r=6.0;
  r+=get('totalGoals')*2.0; r+=get('goalAssists')*1.2; r+=get('shotsOnTarget')*0.15;
  r-=get('yellowCards')*0.5; r-=get('redCards')*2.0;
  r-=Math.max(0,get('foulsCommitted')-2)*0.08;
  const faced=get('shotsFaced');
  if(faced>0){ r+=get('saves')*0.25; if(get('goalsConceded')===0) r+=0.5; }
  return Math.max(4.0,Math.min(10.0,r)).toFixed(1);
}
function timeAgo(iso){
  const d = Date.now() - new Date(iso).getTime();
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
  if(h>24) return `${Math.floor(h/24)}d ago`;
  if(h>0)  return `${h}h ago`;
  return `${m}m ago`;
}

async function fetchMCSummary(eventId){
  if(mcCache[eventId]) return mcCache[eventId];
  try {
    const r = await fetch(`${ESPN_SUMMARY}?event=${eventId}`, { signal: AbortSignal.timeout(9000) });
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    mcCache[eventId] = d;
    return d;
  } catch(e){ return {}; }
}

}

function mcPreOverview(ev,data){
  let html='';
  // Countdown
  const diff=ev.date-Date.now();
  const h=Math.max(0,Math.floor(diff/3600000)),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  const cdTxt=diff>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:'Now!';
  const d=new Date(ev.date);
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  html+=`<div class="mc-cd">
    <div class="mc-cd-lbl">Kick off in</div>
    <div class="mc-cd-time" id="mcCdTime">${cdTxt}</div>
    <div class="mc-cd-sub">${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} · ${localTime(ev.date)} local</div>
  </div>`;

  // Win probability
  const odds=(data?.odds||[])[0];
  if(odds){
    const hp=mlToProb(odds.homeTeamOdds?.moneyLine);
    const ap=mlToProb(odds.awayTeamOdds?.moneyLine);
    const rawDraw=typeof odds.drawOdds==='number'?odds.drawOdds:odds.drawOdds?.moneyLine;
    const dp=mlToProb(rawDraw);
    if(hp!=null&&ap!=null&&dp!=null){
      const tot=hp+dp+ap||1;
      const hPct=Math.round((hp/tot)*100), aPct=Math.round((ap/tot)*100), dPct=100-hPct-aPct;
      const hN=ev.home.name.split(' ').slice(-1)[0], aN=ev.away.name.split(' ').slice(-1)[0];
      html+=`<div class="mc-prob">
        <div class="mc-prob-lbl">Win probability (implied from odds)</div>
        <div class="mc-prob-bar">
          <div class="mc-ph" style="width:${hPct}%"></div>
          <div class="mc-pd" style="width:${dPct}%"></div>
          <div class="mc-pa" style="width:${aPct}%"></div>
        </div>
        <div class="mc-prob-nums">
          <div class="mc-phn">${hPct}% ${hN}</div>
          <div class="mc-pdn">${dPct}% Draw</div>
          <div class="mc-pan">${aN} ${aPct}%</div>

          <div class="mc-odds-dec">${decOdds(odds.homeTeamOdds?.moneyLine)}</div>
          <div class="mc-odds-ml">${fmtML(odds.homeTeamOdds?.moneyLine)}</div>
        </div>
        <div class="mc-odds-cell">
          <div class="mc-odds-team">Draw</div>
          <div class="mc-odds-pct" style="color:var(--t2)">${dPct}%</div>
          <div class="mc-odds-dec">${decOdds(rawDraw)}</div>
          <div class="mc-odds-ml">${fmtML(rawDraw)}</div>
        </div>
        <div class="mc-odds-cell">
          <div class="mc-odds-team">${aN}</div>
          <div class="mc-odds-pct" style="color:#ff7070">${aPct}%</div>
          <div class="mc-odds-dec">${decOdds(odds.awayTeamOdds?.moneyLine)}</div>
          <div class="mc-odds-ml">${fmtML(odds.awayTeamOdds?.moneyLine)}</div>
        </div>
      </div>
      <div class="mc-odds-note">O/U ${odds.overUnder||'—'} · Spread: ${odds.details||'—'}</div>`;

  // Form guide
  const l5=data?.lastFiveGames||[];

    html+=`<div style="margin-bottom:16px">
      <div class="mc-sect-hd">Recent form <span style="font-weight:400;color:var(--t3);letter-spacing:0;text-transform:none;font-size:9px">(last 5 intl. results — all competitions)</span></div>
      <div class="mc-form-row">`;

      const dots=(team.events||[]).slice(0,5).map(e=>`<div class="mc-fdot ${e.gameResult}" title="${e.gameResult} vs ${e.opponent?.displayName||''}">${e.gameResult}</div>`).join('');

        <div class="mc-fdots">${dots}</div>
      </div>`;

    html+=`</div></div>`;

/* ── LIVE / FT OVERVIEW ─────────────────────── */
function mcMatchOverview(ev,data){
  let html='';
  const comp=data?.header?.competitions?.[0];
  const hComp=comp?.competitors?.find(c=>c.homeAway==='home');
  const aComp=comp?.competitors?.find(c=>c.homeAway==='away');
  const homeId=hComp?.id, awayId=aComp?.id;

  // Goal timeline
  const plays=data?.plays||[];
  const goals=plays.filter(p=>p.scoringPlay===true||(p.type?.text||'').toLowerCase().includes('goal'));
  if(goals.length>0){
    html+=`<div class="mc-tl">
      <div class="mc-tl-lbl">⚽ Goal timeline</div>
      <div class="mc-tl-track">
        ${goals.map(p=>{
          const min=parseInt(p.clock?.displayValue)||0;
          const pct=Math.min(97,(min/90)*100);
          const isHome=p.team?.id===homeId;
          const scorer=p.participants?.find(pp=>pp.type==='scorer')?.athlete?.displayName||p.text||'';
          return `<div class="mc-tl-dot ${isHome?'home':'away'}" style="left:${pct}%" title="${min}' ${scorer}"></div>`;
        }).join('')}
      </div>
      <div class="mc-tl-mins"><span>0'</span><span>45'</span><span>90'</span></div>
    </div>`;
  }

  // Scorers
  const hGoals=goals.filter(p=>p.team?.id===homeId);
  const aGoals=goals.filter(p=>p.team?.id===awayId);
  const scorerRows=(gs)=> gs.length===0
    ? '<div class="mc-no-goal">No goals</div>'
    : gs.map(p=>{
        const min=parseInt(p.clock?.displayValue)||0;
        const name=p.participants?.find(pp=>pp.type==='scorer')?.athlete?.displayName||'';
        const typeTxt=(p.type?.text||'').toLowerCase().includes('pen')?'PEN':(p.type?.text||'').toLowerCase().includes('own')?'OG':'';
        return `<div class="mc-srow">
          <div class="mc-smin">${min}'</div>
          <div class="mc-sname">${name}</div>
          ${typeTxt?`<div class="mc-stype">${typeTxt}`:''}</div>`;
      }).join('');

  html+=`<div class="mc-scorers">
    <div><div class="mc-scol-lbl"><div class="mc-sdot home"></div>${ev.home.name}</div>${scorerRows(hGoals)}</div>
    <div><div class="mc-scol-lbl"><div class="mc-sdot away"></div>${ev.away.name}</div>${scorerRows(aGoals)}</div>
  </div>`;

  // Quick stats
  const bsTeams=data?.boxscore?.teams||[];
  const hStats=bsTeams.find(t=>t.team?.id===homeId)?.statistics||bsTeams[0]?.statistics||[];
  const aStats=bsTeams.find(t=>t.team?.id===awayId)?.statistics||bsTeams[1]?.statistics||[];
  const gs=(stats,...keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s) return s.displayValue||String(s.value||'—');}return'—';};
  const pos_h=gs(hStats,'possessionPct','possession'),pos_a=gs(aStats,'possessionPct','possession');
  const sho_h=gs(hStats,'totalShots','shots'),sho_a=gs(aStats,'totalShots','shots');
  const sot_h=gs(hStats,'shotsOnTarget','shotsOnGoal'),sot_a=gs(aStats,'shotsOnTarget','shotsOnGoal');
  if(pos_h!=='—'||sho_h!=='—'){
    html+=`<div class="mc-snap">
      <div class="mc-snap-box"><div class="mc-snap-val">${pos_h}</div><div class="mc-snap-lbl">Possession</div><div class="mc-snap-sides">${pos_h} · ${pos_a}</div></div>
      <div class="mc-snap-box"><div class="mc-snap-val" style="color:var(--accent)">${sho_h}</div><div class="mc-snap-lbl">Shots</div><div class="mc-snap-sides">${sho_h} · ${sho_a}</div></div>
      <div class="mc-snap-box"><div class="mc-snap-val" style="color:var(--gold)">${sot_h}</div><div class="mc-snap-lbl">On Target</div><div class="mc-snap-sides">${sot_h} · ${sot_a}</div></div>
    </div>`;
  }
  return html;
}

function mcStats(ev,data){
  const comp=data?.header?.competitions?.[0];
  const homeId=comp?.competitors?.find(c=>c.homeAway==='home')?.id;
  const awayId=comp?.competitors?.find(c=>c.homeAway==='away')?.id;
  const bsTeams=data?.boxscore?.teams||[];
  const hStats=bsTeams.find(t=>t.team?.id===homeId)?.statistics||bsTeams[0]?.statistics||[];
  const aStats=bsTeams.find(t=>t.team?.id===awayId)?.statistics||bsTeams[1]?.statistics||[];

  if(ev.state==='pre'){
    // Pre-match: show last-5 form comparison
    const l5=data?.lastFiveGames||[];
    if(l5.length<2) return`<div class="mc-stat-na">Stats will be available once the match starts</div>`;
    const rec=(evs)=>evs.reduce((a,e)=>{
      if(e.gameResult==='W')a.w++;else if(e.gameResult==='D')a.d++;else a.l++;
      return a;
    },{w:0,d:0,l:0});
    const r1=rec(l5[0]?.events||[]),r2=rec(l5[1]?.events||[]);
    const rows=[{name:'Wins',h:r1.w,a:r2.w},{name:'Draws',h:r1.d,a:r2.d},{name:'Losses',h:r1.l,a:r2.l}];
    return `<div class="mc-stat-hdr"><span style="color:var(--accent)">${ev.home.name}</span><span>Last 5 games</span><span style="color:#ff7070">${ev.away.name}</span></div>`
      +rows.map(r=>{const t=(r.h+r.a)||1,hp=Math.round((r.h/t)*100),ap=100-hp;return`<div class="mc-stat-row">
        <div class="mc-stat-vals"><div class="mc-stat-lv">${r.h}</div><div class="mc-stat-nm">${r.name}</div><div class="mc-stat-rv">${r.a}</div></div>
        <div class="mc-stat-track"><div class="mc-stat-l" data-w="${hp}" style="width:0"></div><div class="mc-stat-r" data-w="${ap}" style="width:0"></div></div>
      </div>`;}).join('');
  }

  const STATS=[
    {name:'Possession %',keys:['possessionPct','possession']},
    {name:'Total Shots',keys:['totalShots','shots']},
    {name:'On Target',keys:['shotsOnTarget','shotsOnGoal']},
    {name:'Corners',keys:['corners','cornerKicks']},
    {name:'Fouls',keys:['fouls','totalFouls']},
    {name:'Yellow Cards',keys:['yellowCards']},
    {name:'Saves',keys:['saves','goalkeepSaves']},
    {name:'Offsides',keys:['offsides']},
    {name:'Pass Acc %',keys:['passingAccuracy','passAccuracy']},
  ];
  const gv=(stats,keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s)return parseFloat(s.displayValue?.replace('%','')||s.value)||0;}return null;};
  const rows=STATS.map(s=>{
    const hv=gv(hStats,s.keys),av=gv(aStats,s.keys);
    if(hv==null&&av==null) return null;
    const h=hv||0,a=av||0,tot=(h+a)||1;
    return{name:s.name,hv:h,av:a,hp:Math.round((h/tot)*100),ap:Math.round((a/tot)*100)};
  }).filter(Boolean);
  if(!rows.length) return`<div class="mc-stat-na">Stats not yet available</div>`;
  return `<div class="mc-stat-hdr"><span style="color:var(--accent)">${ev.home.name}</span><span>Match stats</span><span style="color:#ff7070">${ev.away.name}</span></div>`
    +rows.map(r=>`<div class="mc-stat-row">
      <div class="mc-stat-vals"><div class="mc-stat-lv">${r.hv}</div><div class="mc-stat-nm">${r.name}</div><div class="mc-stat-rv">${r.av}</div></div>
      <div class="mc-stat-track"><div class="mc-stat-l" data-w="${r.hp}" style="width:0"></div><div class="mc-stat-r" data-w="${r.ap}" style="width:0"></div></div>
    </div>`).join('');
}

function mcLineups(ev,data){
  const rosters=data?.rosters||[];
  if(!rosters.length) return`<div class="mc-lu-na">Lineups not yet confirmed</div>`;
  const POS={GK:0,G:0,CB:1,LB:1,RB:1,LWB:1,RWB:1,D:1,CM:2,DM:2,AM:2,LM:2,RM:2,M:2,LW:3,RW:3,CF:3,ST:3,F:3};
  const pRow=(e,ti)=>{
    const a=e.athlete||{};
    const id=a.id||'';
    if(id) _plLookup[id]={entry:e,teamInfo:ti};
    let rtgHtml='';
    if(ev.state==='post'){
      const rtg=computeRating(e.stats||[]);
      if(rtg){const cls=parseFloat(rtg)>=7.5?'hi':parseFloat(rtg)>=6?'mid':'lo';rtgHtml=`<span class="mc-lu-rtg ${cls}">${rtg}</span>`;}
    }
    return`<div class="mc-lu-p${id?' clickable':''}" ${id?`onclick="openPlayerDetail('${id}')" role="button" tabindex="0"`:''}>
      <span class="mc-lu-num">${e.jersey||a.jersey||''}</span>
      <span class="mc-lu-pos">${e.position?.abbreviation||''}</span>
      <span class="mc-lu-name">${a.displayName||a.fullName||'—'}</span>
      ${rtgHtml}
      ${e.captain?'<span class="mc-lu-cap">©</span>':''}
      ${id?'<span class="mc-lu-arrow">›</span>':''}
    </div>`;
  };
  const side=(r,ti)=>{
    if(!r) return`<div class="mc-lu-na">No data</div>`;
    const starters=(r.roster||r.entries||[]).filter(e=>e.starter);
    const bench=(r.roster||r.entries||[]).filter(e=>!e.starter);
    const grp={GK:[],DEF:[],MID:[],FWD:[]};
    starters.forEach(e=>{
      const p=POS[e.position?.abbreviation]??POS[e.position?.abbreviation?.charAt(0)]??2;
      [grp.GK,grp.DEF,grp.MID,grp.FWD][p]?.push(e);
    });
    let h='';
    if(grp.GK.length)  h+=`<div class="mc-lu-sec">GK</div>${grp.GK.map(e=>pRow(e,ti)).join('')}`;
    if(grp.DEF.length) h+=`<div class="mc-lu-sec">Defence</div>${grp.DEF.map(e=>pRow(e,ti)).join('')}`;
    if(grp.MID.length) h+=`<div class="mc-lu-sec">Midfield</div>${grp.MID.map(e=>pRow(e,ti)).join('')}`;
    if(grp.FWD.length) h+=`<div class="mc-lu-sec">Attack</div>${grp.FWD.map(e=>pRow(e,ti)).join('')}`;
    if(bench.length)   h+=`<div class="mc-lu-sec">Bench</div>${bench.map(e=>pRow(e,ti)).join('')}`;
    return h||`<div class="mc-lu-na">No lineup data</div>`;
  };
  const hR=rosters.find(r=>r.homeAway==='home')||rosters[0];
  const aR=rosters.find(r=>r.homeAway==='away')||rosters[1];
  const hTi={name:ev.home.name,abbr:ev.home.abbr};
  const aTi={name:ev.away.name,abbr:ev.away.abbr};
  return`<div class="mc-lu-cols">
    <div><div class="mc-lu-hd"><span class="mc-lu-flag">${flag(ev.home.abbr)}</span>${ev.home.name}</div>${side(hR,hTi)}</div>
    <div><div class="mc-lu-hd"><span class="mc-lu-flag">${flag(ev.away.abbr)}</span>${ev.away.name}</div>${side(aR,aTi)}</div>
  </div>`;
}

// Stats live on rosters[].roster[].stats[] — not on boxscore.players
const PLAYER_STAT_WANT={
  totalGoals:'Goals', goalAssists:'Assists', totalShots:'Shots', shotsOnTarget:'On Target',
  goalsConceded:'Conceded', shotsFaced:'Shots Faced',
  yellowCards:'Yellow', redCards:'Red', foulsCommitted:'Fouls', offsides:'Offsides',
};
function extractMatchStats(athleteId, data){
  for(const team of data?.rosters||[]){
    const p=(team.roster||[]).find(e=>String(e.athlete?.id)===String(athleteId));
    if(!p) continue;
    return (p.stats||[])
      .filter(s=>PLAYER_STAT_WANT[s.name]&&s.value>0)
      .map(s=>({lbl:PLAYER_STAT_WANT[s.name],val:s.displayValue||String(s.value)}));
  }
  return[];
}
