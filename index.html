const LB_TTL = 5 * 60 * 1000; // 5 minutes

// ── Watch-list algorithm weights ────────────────────
function calcWatchScore(p){
  return (
    (p.goals       || 0) * 12  +
    (p.assists     || 0) * 8   +
    (p.shotsOnTarget || 0) * 2.5 +
    (p.shots       || 0) * 0.8 +
    (p.keyPasses   || 0) * 3   +
    (p.tackles     || 0) * 1.8 +
    (p.interceptions || 0) * 2.2 +
    (p.clearances  || 0) * 1   +
    (p.saves       || 0) * 2   +
    ((p.passAcc||0) >= 88 ? 4 : (p.passAcc||0) >= 80 ? 2 : 0) +
    ((p.teamPts||0) >= 7 ? 3 : (p.teamPts||0) >= 4 ? 1.5 : 0) +
    (p.yellowCards || 0) * -1.5 +
    (p.redCards    || 0) * -10
  );
}

function mergePlayerList(existing, additions, statKey){
  additions.forEach(entry => {
    const name = entry.athlete?.displayName || entry.athlete?.shortName || '';
    const flag = entry.athlete?.flag?.href ? '' : (entry.athlete?.team?.displayName || '');
    const teamName = entry.athlete?.team?.displayName || entry.athlete?.team?.name || '';
    const teamAbbr = entry.athlete?.team?.abbreviation || '';
    const val = parseFloat(entry.value) || 0;
    const f = FLAGS[teamAbbr] || '🏳️';
    let found = existing.find(p => p.name === name);
    if(!found){
      found = { name, teamName, teamAbbr, f };
      existing.push(found);
    }
    found[statKey] = val;
  });
}

async function fetchLeaderboardData(){
  if(lbFetching) return;
  if(lbCache && Date.now() - lbLastFetch < LB_TTL) return;
  lbFetching = true;

  try {
    const r = await fetch(ESPN_LEADERS, { signal: AbortSignal.timeout(9000) });
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    const categories = data.leaders || data.categories || [];

    const allPlayers = [];
    const tables = { goals:[], assists:[], yellow:[], red:[], shots:[], saves:[] };

    categories.forEach(cat => {
      const key = (cat.name||cat.abbreviation||'').toLowerCase();
      const leaders = cat.leaders || cat.athletes || [];

      let tableKey = null;
      let statKey  = null;
      if(/goal/i.test(key))       { tableKey='goals';   statKey='goals'; }
      else if(/assist/i.test(key)){ tableKey='assists';  statKey='assists'; }
      else if(/yellow/i.test(key)){ tableKey='yellow';   statKey='yellowCards'; }
      else if(/red/i.test(key))   { tableKey='red';      statKey='redCards'; }
      else if(/shot.*on/i.test(key)){ statKey='shotsOnTarget'; }
      else if(/shot/i.test(key))  { tableKey='shots';   statKey='shots'; }
      else if(/save/i.test(key))  { tableKey='saves';   statKey='saves'; }
      else if(/tackle/i.test(key)){ statKey='tackles'; }
      else if(/interc/i.test(key)){ statKey='interceptions'; }
      else if(/pass.*acc/i.test(key)){ statKey='passAcc'; }
      else if(/key.*pass/i.test(key)){ statKey='keyPasses'; }

      if(statKey) mergePlayerList(allPlayers, leaders, statKey);
      if(tableKey){
        tables[tableKey] = leaders.slice(0, 10).map((entry, i) => ({
          rank:     i + 1,
          name:     entry.athlete?.displayName || entry.athlete?.shortName || '—',
          teamName: entry.athlete?.team?.displayName || '',
          teamAbbr: entry.athlete?.team?.abbreviation || '',
          f:        FLAGS[entry.athlete?.team?.abbreviation||''] || '🏳️',
          val:      entry.displayValue || String(parseFloat(entry.value)||0),
        }));
      }
    });

    // Enrich players with team points from GROUPS_DATA
    allPlayers.forEach(p => {
      const g = GROUPS_DATA.find(g => g.teams.some(t =>
        t.n === p.teamName || t.n.toLowerCase().includes(p.teamName.toLowerCase()) ||
        p.teamName.toLowerCase().includes(t.n.toLowerCase())
      ));
      if(g){
        const t = g.teams.find(t => t.n === p.teamName || t.n.toLowerCase().includes(p.teamName.toLowerCase()) || p.teamName.toLowerCase().includes(t.n.toLowerCase()));
        if(t) p.teamPts = t.pts;
      }
    });

    // Build watch list — score every player and take top 10
    const watchList = allPlayers
      .map(p => ({ ...p, watchScore: Math.round(calcWatchScore(p) * 10) / 10 }))
      .filter(p => p.watchScore > 0)
      .sort((a, b) => b.watchScore - a.watchScore)
      .slice(0, 10);

    lbCache = { tables, watchList, ts: Date.now() };
    lbLastFetch = Date.now();
  } catch(e) {
    // Build a fallback watch list from GROUPS_DATA alone
    if(!lbCache) buildFallbackWatchList();
  }
  lbFetching = false;
  if($('tab-leaderboard')?.classList.contains('active')) renderLeaderboard();
}

function buildFallbackWatchList(){
  // Curated list of tournament favourites when no live stats are available yet
  const seeds = [
    {name:'Kylian Mbappé',     teamName:'France',      teamAbbr:'FRA', goals:2, assists:1, shotsOnTarget:4},
    {name:'Erling Haaland',    teamName:'Norway',      teamAbbr:'NOR', goals:3, assists:0, shotsOnTarget:5},
    {name:'Lamine Yamal',      teamName:'Spain',       teamAbbr:'ESP', goals:1, assists:2, shotsOnTarget:3, keyPasses:4},
    {name:'Vinicius Jr.',      teamName:'Brazil',      teamAbbr:'BRA', goals:1, assists:1, shotsOnTarget:3, keyPasses:3},
    {name:'Lionel Messi',      teamName:'Argentina',   teamAbbr:'ARG', goals:1, assists:2, shots:4, keyPasses:5},
    {name:'Jude Bellingham',   teamName:'England',     teamAbbr:'ENG', goals:1, assists:1, tackles:3, keyPasses:3},
    {name:'Bukayo Saka',       teamName:'England',     teamAbbr:'ENG', goals:1, assists:2, shotsOnTarget:2, keyPasses:3},
    {name:'Pedri',             teamName:'Spain',       teamAbbr:'ESP', goals:0, assists:1, passAcc:91, keyPasses:5, tackles:2},
    {name:'Florian Wirtz',     teamName:'Germany',     teamAbbr:'GER', goals:1, assists:1, shotsOnTarget:2, keyPasses:4},
    {name:'Rafael Leão',       teamName:'Portugal',    teamAbbr:'POR', goals:2, assists:0, shotsOnTarget:3, keyPasses:2},
  ];

  seeds.forEach(p => {
    p.f = FLAGS[p.teamAbbr] || '🏳️';
    const g = GROUPS_DATA.find(gr => gr.teams.some(t => t.n === p.teamName));
    if(g){ const t = g.teams.find(t => t.n === p.teamName); if(t) p.teamPts = t.pts; }
    p.watchScore = Math.round(calcWatchScore(p) * 10) / 10;
  });

  lbCache = {
    tables: { goals:[], assists:[], yellow:[], red:[], shots:[], saves:[] },
    watchList: seeds.sort((a,b) => b.watchScore - a.watchScore),
    ts: null,
    fallback: true,
  };
}

// Inject a manifest so Chrome/Android fires beforeinstallprompt
(function injectManifest(){
  const m = {
    name:'FIFA World Cup 2026',short_name:'WC 2026',
    start_url:'./',display:'standalone',
    background_color:'#080808',theme_color:'#080808',
    description:'Live scores, standings & knockout bracket for FIFA World Cup 2026',
    icons:[{
      src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#080808"/><text y="82" x="8" font-size="85">⚽</text></svg>'),
      sizes:'any',type:'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  const link = document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

let deferredInstallPrompt = null;

function dismissInstall(){
  const b = $('installBanner');
  if(b) b.classList.remove('show');
  sessionStorage.setItem('installDismissed','1');
}

(function initInstallBanner(){
  if(sessionStorage.getItem('installDismissed')) return;
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if(isInStandalone) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  if(isIOS){
    const txt = $('installTxt');
    if(txt) txt.textContent = '📲 Tap Share  then "Add to Home Screen" to install';
    const btn = $('installBtn');
    if(btn) btn.style.display = 'none';
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
    return;
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const banner = $('installBanner');
    if(banner) banner.classList.add('show');
  });

  const btn = $('installBtn');
  if(btn){
    btn.onclick = async () => {
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const {outcome} = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      if(outcome === 'accepted') dismissInstall();
    };
  }
})();

function favTeamMatch(espnName, teamN){
  if(!espnName||!teamN) return false;
  const a = espnName.toLowerCase().trim();
  const b = teamN.toLowerCase().trim();
  if(a===b) return true;
  if(b==='usa' && a.includes('united states')) return true;
  if(b==='south korea' && (a.includes('korea rep')||a.includes('south korea'))) return true;
  if(b==='ivory coast' && (a.includes('ivory')||a.includes('ivoire')||a.includes('cote'))) return true;
  if(b==='czech republic' && (a.includes('czech')||a.includes('czechia'))) return true;
  if(b==='dr congo' && a.includes('congo')) return true;
  return a.includes(b)||b.includes(a);
}

async function fetchFavMatches(team){
  const container = $('favMatches');
  if(!container) return;

  const dates = [];
  const now = new Date();
  for(let d=-5;d<=5;d++){
    const dt = new Date(now);
    dt.setDate(now.getDate()+d);
    dates.push(toDateStr(dt));
  }

  const found = [];
  await Promise.all(dates.map(async dateStr => {
    try{
      const r = await fetch(`${ESPN_URL}?dates=${dateStr}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) return;
      const data = await r.json();
      (data.events||[]).map(parseEvent).forEach(ev => {
        if(favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)){
          if(!found.some(e=>e.id===ev.id)) found.push(ev);
        }
      });
    }catch(e){}
  }));

  found.sort((a,b)=>a.date-b.date);

  const el2 = $('favMatches');
  if(!el2) return;

  if(!found.length){
    el2.innerHTML='<div class="mc-news-empty">No matches in the coming days — check back soon</div>';
    return;
  }

  el2.innerHTML = found.map(ev=>{
    const isHome = favTeamMatch(ev.home.name,team.n);
    const myT  = isHome?ev.home:ev.away;
    const oppT = isHome?ev.away:ev.home;
    const isLive = ev.state==='in';
    const isFt   = ev.state==='post';
    const statusLbl = isLive?'LIVE':isFt?'FT':'UP';
    const myWin  = isFt&&myT.winner;
    const oppWin = isFt&&oppT.winner;
    return`<div class="fav-match">
      <div class="fav-match-teams">
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(myT.abbr)||team.f}</span>
          <span class="fav-match-team">${myT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${myWin?' win':oppWin?' loss':''}">${myT.score}</span>`:''}
        </div>
        <div class="fav-match-row">
          <span class="fav-match-flag">${flag(oppT.abbr)}</span>
          <span class="fav-match-team">${oppT.name}</span>
          ${isFt||isLive?`<span class="fav-match-gs${oppWin?' win':myWin?' loss':''}">${oppT.score}</span>`:''}
        </div>
        <div class="fav-match-meta">${ev.group||''}${ev.venue?' · '+ev.venue:''} · ${localTime(ev.date)}</div>
      </div>
      <span class="fav-pill ${statusLbl.toLowerCase()}">${statusLbl}</span>
    </div>`;
  }).join('');
}

async function fetchFavNews(team){
  const container = $('favNews');
  if(!container) return;

  const teamEv = (lastEvents||[]).find(ev =>
    favTeamMatch(ev.home.name,team.n)||favTeamMatch(ev.away.name,team.n)
  );

  if(teamEv){
    try{
      const r = await fetch(`${ESPN_SUMMARY}?event=${teamEv.id}`,{signal:AbortSignal.timeout(9000)});
      if(r.ok){
        const data = await r.json();
        const articles = data?.news?.articles||[];
        if(articles.length){
          const el2 = $('favNews');
          if(!el2) return;
          el2.innerHTML = articles.slice(0,5).map(a=>{
            const url = a.links?.web?.href||'#';
            const img = a.images?.[0]?.url||'';
            const dt  = a.lastModified||a.published||'';
            return`<a class="mc-news-item" href="${url}" target="_blank" rel="noopener">
              ${img?`<img class="mc-news-img" src="${img}" alt="" loading="lazy">`:'<div class="mc-news-img"></div>'}
              <div class="mc-news-cnt">
                <div class="mc-news-ttl">${a.headline||'—'}</div>
                <div class="mc-news-meta">ESPN${dt?' · '+timeAgo(dt):''}</div>
              </div></a>`;
          }).join('');
          return;
        }
      }
    }catch(e){}
  }

  const el2 = $('favNews');
  if(el2) el2.innerHTML='<div class="mc-news-empty">News will appear here on match days</div>';
}
