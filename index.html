<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Buddy - FIFA World Cup 2026 Pundit's Briefing</title>
  <meta name="description" content="Get unvarnished, fact-grounded classic British football punditry for the World Cup 2026.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="bg-[#0b0f19] text-[#f3f4f6] min-h-screen flex flex-col antialiased">
  
  <!-- Header -->
  <header class="sticky top-0 z-40 w-full border-b border-gray-800/80 bg-[#0b0f19]/80 backdrop-blur-md">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <i data-lucide="trophy" class="w-6 h-6 text-amber-500"></i>
        <span class="font-mono text-xl font-bold tracking-wider uppercase text-white">Game Buddy</span>
      </div>
      <div class="flex items-center space-x-1 border border-gray-800 rounded-lg p-0.5 bg-gray-950 font-mono text-xs">
        <button id="tab-today" class="tab-btn px-4 py-1.5 rounded-md font-semibold text-white bg-gray-800 transition-all flex items-center gap-1.5" data-tab="today">
          <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Today
        </button>
        <button id="tab-matches" class="tab-btn px-4 py-1.5 rounded-md font-semibold text-gray-400 hover:text-white transition-all flex items-center gap-1.5" data-tab="matches">
          <i data-lucide="swords" class="w-3.5 h-3.5"></i> Matches
        </button>
        <button id="tab-teams" class="tab-btn px-4 py-1.5 rounded-md font-semibold text-gray-400 hover:text-white transition-all flex items-center gap-1.5" data-tab="teams">
          <i data-lucide="users" class="w-3.5 h-3.5"></i> Teams
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Container -->
  <main class="flex-1 container mx-auto px-4 py-6 max-w-5xl">
    
    <!-- Tab: Today -->
    <section id="content-today" class="tab-content space-y-6">
      
      <!-- Pundit Briefing Card -->
      <div id="pundit-briefing-card" class="glass-panel rounded-xl border border-gray-800 p-6 shadow-xl relative overflow-hidden transition-all duration-300">
        <!-- Background light effect -->
        <div class="absolute -top-24 -left-24 w-48 h-48 rounded-full bg-amber-500/10 blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 rounded-full bg-emerald-500/5 blur-3xl"></div>

        <!-- Badge row -->
        <div class="relative z-10 flex items-center justify-between mb-4">
          <div id="briefing-badge">
            <!-- Injected dynamically -->
          </div>
          <span id="briefing-date" class="font-mono text-xs text-gray-500">June 20, 2026</span>
        </div>
        
        <!-- Content row -->
        <div id="briefing-main-content" class="relative z-10 space-y-4">
          <!-- Injected dynamically -->
        </div>
      </div>

      <!-- Quick Matches List & Standings -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Live / Recent Match Box Scores -->
        <div class="md:col-span-2 space-y-4">
          <h2 class="font-mono text-xs uppercase tracking-widest text-gray-500 font-bold flex items-center gap-2">
            <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i> Matchday Scoreboard
          </h2>
          <div id="today-scoreboard" class="space-y-3">
            <!-- Match scorecards injected dynamically -->
          </div>
        </div>
        
        <!-- Standings Summary -->
        <div class="space-y-4">
          <h2 class="font-mono text-xs uppercase tracking-widest text-gray-500 font-bold flex items-center gap-2">
            <i data-lucide="list-ordered" class="w-4 h-4 text-emerald-500"></i> Group Standings
          </h2>
          <div id="today-standings" class="glass-panel border border-gray-800 rounded-xl p-4 space-y-3">
            <!-- Standings list injected dynamically -->
          </div>
        </div>
      </div>
      
    </section>

    <!-- Tab: Matches -->
    <section id="content-matches" class="tab-content hidden space-y-6">
      <h2 class="font-mono text-xs uppercase tracking-widest text-gray-500 font-bold flex items-center gap-2">
        <i data-lucide="calendar-days" class="w-4 h-4 text-amber-500"></i> Tournament Fixtures
      </h2>
      <div id="matches-list" class="space-y-6">
        <!-- Matches grouped by date injected dynamically -->
      </div>
    </section>

    <!-- Tab: Teams -->
    <section id="content-teams" class="tab-content hidden space-y-6">
      <h2 class="font-mono text-xs uppercase tracking-widest text-gray-500 font-bold flex items-center gap-2">
        <i data-lucide="shield" class="w-4 h-4 text-emerald-500"></i> Participating Teams
      </h2>
      <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <!-- Teams grid injected dynamically -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-900 bg-gray-950 py-6 font-mono text-xs text-center text-gray-500 mt-12">
    <div class="container mx-auto px-4">
      <p>Game Buddy &copy; 2026. Powered by Gemini 3.5 Flash & ESPN Scoreboard Proxy Feed.</p>
      <p class="mt-1 text-gray-600">All pundit quotes are satirical and grounded directly in official statistics.</p>
    </div>
  </footer>

  <!-- Match Details Modal -->
  <div id="match-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="glass-panel w-full max-w-2xl rounded-xl border border-gray-800 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <!-- Header -->
      <div class="border-b border-gray-800 px-6 py-4 flex items-center justify-between bg-gray-950">
        <span class="font-mono text-xs uppercase tracking-wider text-amber-500 font-bold flex items-center gap-1.5">
          <i data-lucide="swords" class="w-3.5 h-3.5"></i> Match Analysis
        </span>
        <button id="close-match-modal" class="text-gray-400 hover:text-white transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <!-- Body -->
      <div id="match-modal-content" class="p-6 overflow-y-auto space-y-6">
        <!-- Injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Team Details Modal -->
  <div id="team-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="glass-panel w-full max-w-lg rounded-xl border border-gray-800 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <!-- Header -->
      <div class="border-b border-gray-800 px-6 py-4 flex items-center justify-between bg-gray-950">
        <span class="font-mono text-xs uppercase tracking-wider text-emerald-500 font-bold flex items-center gap-1.5">
          <i data-lucide="shield" class="w-3.5 h-3.5"></i> Team Profile
        </span>
        <button id="close-team-modal" class="text-gray-400 hover:text-white transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <!-- Body -->
      <div id="team-modal-content" class="p-6 overflow-y-auto space-y-6">
        <!-- Injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Script entry -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
