<script>
(function(){
  var VAPID_PUBLIC_KEY = 'BPUf1P3B-5GMBEIs7WZVxy-0PhoASlUFKJslWF39BoW3Fy3BnMUXv7DmLGVOuH7uxiqfjPO1ILZWYY25VOnykrY';

  function urlBase64ToUint8Array(b) {
    var p = (b + '='.repeat((4 - b.length % 4) % 4)).replace(/-/g,'+').replace(/_/g,'/');
    var raw = atob(p);
    var arr = new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
    return arr;
  }

  async function subscribe() {
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      // Must request permission first, before any other awaits, or Android
      // loses the user-gesture context and silently drops the prompt.
      var perm = await Notification.requestPermission();
      if(perm !== 'granted') return;
      var reg = await navigator.serviceWorker.register('/sw.js');
      await navigator.serviceWorker.ready;
      var sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      await fetch('/api/subscribe', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(sub)
      });
      localStorage.setItem('push_subscribed','1');
      hideBanner();
    } catch(e) { console.warn('Push subscribe failed', e); }
  }

  function hideBanner() {
    var b = document.getElementById('push-banner');
    if(b) b.remove();
  }

  function showBanner() {
    if(localStorage.getItem('push_subscribed') || localStorage.getItem('push_dismissed')) return;
    if(!('Notification' in window) || Notification.permission === 'denied') return;
    var b = document.createElement('div');
    b.id = 'push-banner';
    b.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:9999;max-width:340px;width:calc(100% - 32px);box-shadow:0 4px 24px rgba(0,0,0,.4);font-family:inherit';

    document.body.appendChild(b);
  }

  window._pushSubscribe = subscribe;
  window._pushDismiss = function() {
    localStorage.setItem('push_dismissed','1');
    hideBanner();
  };

  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(showBanner, 8000); });
  } else {
    setTimeout(showBanner, 8000);
  }
})();

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--card:#111;--card2:#141414;--border:#1f1f1f;
  --accent:#00FF87;--red:#FF3B3B;--gold:#FFD700;
  --text:#fff;--t2:#999;--t3:#6b6b6b;
  --r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(255,255,255,.01) 80px,rgba(255,255,255,.01) 81px);
}

/* ── HEADER ────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.hdr-in{
  max-width:1240px;margin:0 auto;padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;height:66px;gap:12px;
}
.wordmark{line-height:1.1}
.wordmark-name{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.wordmark-event{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.9px;text-transform:uppercase;margin-top:3px}
.sub{font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.2px}
.hdr-r{display:flex;align-items:center;gap:14px}

/* live pill */
.live-pill{
  display:flex;align-items:center;gap:6px;padding:5px 11px;
  background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.25);
  border-radius:100px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.8px;
  transition:opacity .3s;
}
.live-pill.hidden{opacity:0;pointer-events:none}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pDot 1.6s ease-in-out infinite}
@keyframes pDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,135,.7)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,255,135,0)}}

/* clock + refresh */
.hdr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.clock{font-family:var(--mono);font-size:13px;color:var(--t2);letter-spacing:.8px}
.refresh-label{
  font-size:10px;color:var(--t2);letter-spacing:.3px;height:12px;
  transition:color .3s;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.refresh-label.fetching{color:var(--accent)}
.refresh-label.fetching .rl-icon{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ───────────────────────────────────── */
.tabs-bar{
  position:sticky;top:66px;z-index:90;
  background:rgba(8,8,8,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.tabs{max-width:1240px;margin:0 auto;padding:0 22px;display:flex}
.tbtn{
  background:none;border:none;color:var(--t2);font-family:var(--font);
  font-size:14px;font-weight:500;padding:15px 20px;cursor:pointer;
  position:relative;transition:color .2s;letter-spacing:.1px;
}
.tbtn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);transform:scaleX(0);transition:transform .22s ease;
  border-radius:2px 2px 0 0;
}
.tbtn.active{color:var(--text)}.tbtn.active::after{transform:scaleX(1)}
.tbtn:hover:not(.active){color:#ccc}
.tbtn-icon{padding:15px 16px;display:flex;align-items:center;justify-content:center}
.tbtn-icon svg{transition:fill .2s,stroke .2s}
.tbtn-icon.active svg{fill:var(--accent);stroke:var(--accent)}

/* ── MAIN ───────────────────────────────────── */
.main{max-width:1240px;margin:0 auto;padding:26px 22px}
.tab{display:none;animation:fadeUp .2s ease}
.tab.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}


/* ── SECTION HEADER ─────────────────────────── */
.sec-hd{display:flex;align-items:center;gap:9px;margin:26px 0 13px}
.sec-hd:first-of-type{margin-top:0}
.sbadge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;
}
.sbadge.live{background:rgba(255,59,59,.12);color:var(--red);border:1px solid rgba(255,59,59,.28)}
.sbadge.live .rd{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blinkR 1.1s ease-in-out infinite}
@keyframes blinkR{0%,100%{opacity:1}50%{opacity:.2}}
.sbadge.ft{background:rgba(136,136,136,.1);color:var(--t2);border:1px solid rgba(136,136,136,.18)}
.sbadge.up{background:rgba(255,215,0,.07);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.sc-count{font-size:12px;color:var(--t2)}

/* ── MATCH GRID ─────────────────────────────── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px;margin-bottom:6px}

/* ── MATCH CARD ─────────────────────────────── */
.mc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:17px 19px;cursor:default;position:relative;overflow:hidden;
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
  /* scroll anim */
  opacity:0;transform:translateY(12px);
}
.mc.vis{opacity:1;transform:translateY(0);transition:opacity .38s ease,transform .38s ease}
.mc.vis:hover{transform:translateY(-2px);border-color:#272727;box-shadow:0 10px 32px rgba(0,0,0,.45)}
/* live border */
.mc.live{border-left:3px solid var(--accent)}
.mc.live::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);animation:gBar 2.2s ease-in-out infinite;
}
@keyframes gBar{0%,100%{box-shadow:0 0 8px rgba(0,255,135,.5)}50%{box-shadow:0 0 22px rgba(0,255,135,1)}}
.mc.ft.vis{opacity:.7}.mc.ft.vis:hover{opacity:1}

.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mc-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.mc-badge.live{background:rgba(0,255,135,.12);color:var(--accent);border:1px solid rgba(0,255,135,.25)}
.mc-badge.ft{background:rgba(255,255,255,.05);color:var(--t2)}
.mc-badge.up{background:rgba(255,215,0,.07);color:var(--gold)}
.mc-grp{font-size:11px;color:var(--t2);text-align:right;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.mc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:13px}
.tcol{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:0}
.tflag{font-size:28px;line-height:1}
.tname{font-size:12px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tname.winner{color:var(--accent)}
.mc-qualified{text-align:center;font-size:11px;font-weight:600;color:var(--accent);padding:2px 8px 6px;letter-spacing:.03em}
.mc-pens{color:var(--t2);font-weight:400}

.scwrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sc{font-family:var(--mono);font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;min-width:24px;text-align:center}
.sc-sep{font-size:18px;color:var(--t3);font-weight:300}
.sc.vs{font-size:20px;color:var(--t2);font-weight:400}

.mc-foot{display:flex;align-items:center;justify-content:space-between}
.mc-min{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);
  background:rgba(0,255,135,.1);padding:2px 7px;border-radius:5px;letter-spacing:.4px;
}
.mc-min.ht{color:var(--gold);background:rgba(255,215,0,.1)}
.mc-ft-time{font-size:11px;color:var(--t2)}
.mc-venue{font-size:11px;color:var(--t2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.mc-cd{font-family:var(--mono);font-size:11px;color:var(--gold);font-weight:600}
.mc-kickoff{display:flex;flex-direction:column;gap:1px}
.mc-kickoff-time{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1.1}
.mc-cd-sm{font-family:var(--mono);font-size:10px;color:var(--t2);font-weight:500}

/* ── STAKES STRIP ───────────────────────────── */

/* ── UPCOMING CARD COMPACT LAYOUT ───────────── */
.mc.up{padding:12px 15px}
.mc-up-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-up-grp{font-size:10px;color:var(--t2);font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.mc-up-tv{font-size:10px;color:var(--t3)}
.mc-up-teams{display:flex;align-items:center;gap:4px}
.mc-up-side{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.mc-up-side-r{justify-content:flex-end}
.mc-up-flag{font-size:22px;flex-shrink:0;line-height:1}
.mc-up-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .15s}
.mc-up-name:hover{color:var(--accent)}
.mc-up-sep{font-size:11px;color:var(--t3);flex-shrink:0;padding:0 6px;letter-spacing:.5px}
.mc-up-foot{display:flex;align-items:baseline;justify-content:space-between;margin-top:9px}
.mc-up-time{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.mc-up-cd{font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:500;margin-left:7px}
.mc-up-venue{font-size:10px;color:var(--t3);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:45%}

/* ── SKELETON ───────────────────────────────── */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}
.skel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:17px 19px;height:148px;overflow:hidden;position:relative;
}
.skel::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.skel-line{background:rgba(255,255,255,.06);border-radius:4px;margin-bottom:8px}

/* ── ERROR ──────────────────────────────────── */
.err-card{
  background:var(--card);border:1px solid rgba(255,59,59,.25);border-radius:var(--r);
  padding:28px;text-align:center;display:none;
}
.err-card.show{display:block}
.err-icon{font-size:28px;margin-bottom:8px}
.err-title{font-size:16px;font-weight:600;margin-bottom:4px}
.err-sub{font-size:13px;color:var(--t2)}
.err-retry{
  margin-top:16px;background:none;border:1px solid var(--border);color:var(--text);
  font-family:var(--font);font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.err-retry:hover{border-color:#333;background:rgba(255,255,255,.04)}

/* ── EMPTY STATE ────────────────────────────── */
.empty{text-align:center;padding:40px 24px;color:var(--t2);font-size:14px}

/* ── BROADCAST BADGE ────────────────────────── */
.mc-tv{font-size:10px;color:var(--t2);letter-spacing:.3px}

/* ── HIGHLIGHTS THUMBNAIL ────────────────────── */
.mc-thumb{
  display:block;margin-top:12px;border-radius:8px;overflow:hidden;
  position:relative;text-decoration:none;aspect-ratio:16/9;background:#000;
  border:1px solid var(--border);
}
.mc-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .3s ease,opacity .3s;opacity:.88;
}
.mc-thumb:hover img{transform:scale(1.03);opacity:1}
.mc-thumb-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.15) 60%,transparent 100%);
}
.mc-thumb-play{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;flex-shrink:0;
}
.mc-thumb:hover .mc-thumb-play{transform:scale(1.1);background:rgba(255,0,0,1)}
.mc-thumb-play svg{width:18px;height:18px;fill:#fff;margin-left:3px}
.mc-thumb-lbl{
  font-size:10px;font-weight:700;letter-spacing:.6px;color:rgba(255,255,255,.85);
  text-transform:uppercase;
}
.mc-thumb-title{
  position:absolute;bottom:7px;left:10px;right:10px;
  font-size:10px;color:rgba(255,255,255,.7);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── GROUPS ─────────────────────────────────── */
.g-hd{font-size:21px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.g-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(355px,1fr));gap:14px}
.gcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;opacity:0;transform:translateY(12px);transition:border-color .2s,box-shadow .2s;
}
.gcard.vis{opacity:1;transform:translateY(0);transition:opacity .38s ease,transform .38s ease,border-color .2s,box-shadow .2s}
.gcard:hover{border-color:#272727}
.gcard--today{border-color:rgba(0,255,135,.28)!important;box-shadow:0 0 0 1px rgba(0,255,135,.07)}
.gcard--today .gcard-hd{background:rgba(0,255,135,.04)}
.gtoday-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:7px;vertical-align:middle;animation:pDot 1.6s ease-in-out infinite}
.gcard-hd{
  padding:10px 15px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.gcard-hd-l{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2)}
.gcard-hd-r{font-size:10px;color:var(--t2);font-family:var(--mono)}
.gtbl{width:100%;border-collapse:collapse}
.gtbl th{
  padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t2);text-align:center;background:rgba(255,255,255,.015);
  border-bottom:1px solid var(--border);
}
.gtbl th.tl{text-align:left;padding-left:14px}
.gtbl td{padding:9px 10px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.gtbl td.tl{text-align:left;padding-left:14px}
.gtbl tr:last-child td{border-bottom:none}
.gtbl tr.lead td{background:rgba(0,255,135,.04)}
.gtbl tr:hover td{background:rgba(255,255,255,.02)}
.gtbl tr.g-clickable{cursor:pointer}
.gtbl tr.g-clickable:hover td{background:rgba(255,255,255,.04)}
.gtbl tr.g-clickable:hover .gname{color:var(--accent)}
.gteam{display:flex;align-items:center;gap:7px}
.gflag{font-size:16px}
.gname{font-size:12px;font-weight:500;transition:color .12s}
/* clickable team/player name links */
.tname.t-link,.mc-tname.t-link{cursor:pointer;transition:color .12s}
.tname.t-link:hover,.mc-tname.t-link:hover{color:var(--accent)}
.gpos{font-size:10px;color:var(--t2);font-family:var(--mono);margin-right:2px}
.gpts{font-weight:700;font-family:var(--mono)}.gpts.lead{color:var(--accent)}
.ggd{font-family:var(--mono);font-size:12px}
.qualify-line{height:2px;background:linear-gradient(90deg,rgba(0,255,135,.3),transparent)}
/* 3rd place ranking */
.tpr-hd{display:flex;align-items:baseline;gap:10px;margin:28px 0 10px}
.tpr-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tpr-sub{font-size:12px;color:var(--t2)}
.gtbl tr.tpr-adv td{background:rgba(0,255,135,.03)}
.tpr-cut-row td{padding:0}
.tpr-cutoff{height:2px;background:linear-gradient(90deg,rgba(255,200,0,.4),transparent);margin:0}

/* ── KNOCKOUT ───────────────────────────────── */
.ko-hd{font-size:21px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.ko-sub{font-size:13px;color:var(--t2);margin-bottom:14px}
.ko-header-controls{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;align-items:center}
#ko-circular-container{margin:0 -22px;width:calc(100% + 44px);overflow:hidden;position:relative}
.radial-zoom-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}
.radial-zoom-controls button {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(17, 17, 17, 0.85);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  user-select: none;
}
.radial-zoom-controls button:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(1.05);
}
.radial-zoom-controls button:active {
  transform: scale(0.95);
}
.ko-view-toggle{display:inline-flex;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:100px;padding:3px;position:relative;z-index:10}
.ko-side-toggle{display:flex;gap:6px;background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:100px;padding:3px;position:relative;z-index:10}
.ko-side-btn{background:none;border:none;color:var(--t2);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .15s ease}
.ko-side-btn.active{background:rgba(0,255,135,.1);color:var(--accent);border:1px solid rgba(0,255,135,.15)}
.ko-toggle-btn{background:none;border:none;color:var(--t2);font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:8px 18px;border-radius:100px;cursor:pointer;transition:all .2s cubic-bezier(0.4,0,0.2,1)}
.ko-toggle-btn.active{background:rgba(0,255,135,.1);color:var(--accent);border:1px solid rgba(0,255,135,.2)}
.ko-round-nav{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 14px;justify-content:flex-start;max-width:100%}
.ko-round-nav::-webkit-scrollbar{display:none}
.ko-pill{background:var(--card);border:1px solid var(--border);color:var(--t2);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:6px 14px;border-radius:100px;cursor:pointer;white-space:nowrap;transition:all .2s ease}
.ko-pill:hover{border-color:#333;color:var(--text)}
.ko-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:800;box-shadow:0 0 12px rgba(0,255,135,.35)}
.ko-help-hint{display:none;font-size:10px;color:var(--t3);text-align:center;margin-top:-12px;margin-bottom:16px;letter-spacing:.5px}
@media(max-width:768px){.ko-help-hint{display:block}.ko-round-nav{justify-content:flex-start}}
.bscroll{position:relative;overflow-x:auto;padding:15px 0 35px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.bracket{display:flex;align-items:stretch;position:relative;min-width:720px;padding:10px 5px;margin:0 auto}
.bracket.side-left,.bracket.side-right{min-width:720px;justify-content:space-between}
.bracket.side-final{min-width:580px;max-width:720px;justify-content:space-around;align-items:center;padding:24px 10px}
.bracket-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.bracket-path{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2px;transition:stroke .25s ease,stroke-width .25s ease,filter .25s ease}
.bracket-path.highlight-line{stroke:var(--accent);stroke-width:3.5px;filter:drop-shadow(0 0 5px rgba(0,255,135,.6))}
.brd{display:flex;flex-direction:column;flex:1;z-index:2;position:relative}
.brd-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);text-align:center;padding:11px 6px;border-bottom:1px solid var(--border);margin-bottom:18px}
.bmatches{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:0 10px 10px}
.bm{display:flex;flex-direction:column;background:rgba(17,17,17,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:10px;padding:10px 12px;width:165px;position:relative;z-index:2;cursor:pointer;transition:border-color .22s ease,box-shadow .22s ease,transform .18s cubic-bezier(0.2,0.8,0.2,1);box-shadow:0 4px 16px rgba(0,0,0,.35);user-select:none}
.bm:hover{border-color:rgba(0,255,135,.45);box-shadow:0 0 16px rgba(0,255,135,.2),0 6px 20px rgba(0,0,0,.45);transform:scale(1.03)}
.bm.highlight-path{border-color:var(--accent);box-shadow:0 0 18px rgba(0,255,135,.3)}
.bt{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:11px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;transition:color .2s ease}
.bt.tbd{color:var(--t3);font-style:italic;font-size:10px;font-weight:500}
.bt.win{color:var(--accent);font-weight:700}
.bsep{height:1px;background:rgba(255,255,255,.05);margin:2px 0}
.bt-score{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:11px;color:var(--t2);padding-left:6px}
.bt.win .bt-score{color:var(--accent)}
.bt-pens{font-size:9px;color:var(--t3);margin-left:4px}
.bt.win .bt-pens{color:var(--accent);opacity:.8}
.bf{font-size:14px;flex-shrink:0}
.bn{overflow:hidden;text-overflow:ellipsis}
.bm-info{font-size:8px;color:var(--t3);margin-top:6px;border-top:1px solid rgba(255,255,255,.04);padding-top:5px;display:flex;justify-content:space-between;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trophy{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 10px;gap:8px;flex-shrink:0;width:105px;align-self:center;position:relative;z-index:3;text-align:center;border:1px dashed rgba(255,215,0,.28);background:rgba(255,215,0,.02);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:all .25s ease}
.trophy:hover{border-color:rgba(255,215,0,.55);background:rgba(255,215,0,.05);box-shadow:0 0 20px rgba(255,215,0,.15),0 4px 24px rgba(0,0,0,.5);transform:scale(1.02)}
.trophy-i{font-size:32px;animation:floatTrophy 3s ease-in-out infinite}
@keyframes floatTrophy{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.trophy-l{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold)}
.trophy-t{font-size:9px;color:var(--t2);line-height:1.3}
.ko-list-view{display:none;max-width:600px;margin:0 auto;flex-direction:column;gap:12px;padding:10px 4px 40px}
.ko-list-view.active{display:flex}
.ko-list-match{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.ko-list-match:hover{border-color:rgba(255,255,255,.15);box-shadow:0 6px 20px rgba(0,0,0,.35);transform:translateY(-1px)}
.ko-list-match:active{transform:scale(.99)}
.ko-lm-header{display:flex;justify-content:space-between;font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2)}
.ko-lm-tv{color:#60b8ff}
.ko-lm-teams{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ko-lm-team{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex:1}
.ko-lm-team.away{justify-content:flex-end}
.ko-lm-score-wrap{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:22px;font-weight:700;user-select:none}
.ko-lm-score{min-width:20px;text-align:center;color:var(--t2)}
.ko-lm-score.win{color:var(--accent)}
.ko-lm-score-sep{color:var(--t3);font-weight:300}
.ko-lm-footer{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);border-top:1px solid rgba(255,255,255,.04);padding-top:8px}

/* ── DAY NAV ────────────────────────────────── */
.day-nav{width:100%;margin-bottom:16px}
.dnav-row{display:flex;align-items:center;width:100%}
.dnav-btn{
  flex-shrink:0;background:none;border:1px solid var(--border);color:var(--t2);
  font-family:var(--font);font-size:20px;line-height:1;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;transition:border-color .18s,color .18s;
}
.dnav-btn:hover{border-color:#333;color:var(--text)}
.dnav-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.dnav-center{flex:1;text-align:center;padding:0 10px}
.dnav-date{font-size:16px;font-weight:700;letter-spacing:-.3px}
.dnav-sub{font-size:11px;color:var(--t2);margin-top:2px}
.dnav-back-row{text-align:center;margin-top:10px;display:none}
.dnav-back-row.show{display:block}
.dnav-today{
  font-size:11px;font-weight:700;letter-spacing:.6px;padding:5px 16px;
  background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.2);
  color:var(--accent);border-radius:100px;cursor:pointer;transition:background .18s;
}
.dnav-today:hover{background:rgba(0,255,135,.15)}
.mc{cursor:pointer}
.mc.vis:hover{transform:translateY(-2px);border-color:#272727;box-shadow:0 10px 32px rgba(0,0,0,.45)}

/* ── MISSION CONTROL MODAL ─────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{
  background:#111;border:1px solid #222;border-radius:16px;
  width:100%;max-width:840px;max-height:91vh;overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(18px);transition:transform .22s;
}
.modal-bg.open .modal{transform:translateY(0)}
.modal-close{
  background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;
  padding:2px 7px;border-radius:6px;flex-shrink:0;line-height:1;
  transition:color .15s,background .15s;
}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,.07)}
.lineup-loading{text-align:center;padding:30px 0;color:var(--t2);font-size:13px}

/* mc header */
.mc-hdr{padding:16px 20px 0;flex-shrink:0;position:relative}
.mc-close-wrap{position:absolute;top:11px;right:14px}
.mc-teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:2px 0 12px}
.mc-team-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.mc-flag{font-size:30px;line-height:1}
.mc-tname{font-size:12px;font-weight:700;text-align:center;line-height:1.3;padding:0 3px}
.mc-score-center{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.mc-snums{font-family:var(--mono);font-size:40px;font-weight:700;letter-spacing:-1px;line-height:1;display:flex;align-items:center;gap:9px}
.mc-snum{min-width:24px;text-align:center}
.mc-snum.win{color:var(--accent)}.mc-snum.lose{color:var(--t2)}
.mc-ssep{font-size:26px;color:var(--t3);font-weight:200;line-height:1}
.mc-vs{font-size:17px;color:var(--t2);font-weight:300}
.mc-spill{font-size:10px;font-weight:700;padding:3px 11px;border-radius:100px;letter-spacing:.7px;white-space:nowrap}
.mc-spill.live{background:rgba(255,59,59,.15);color:var(--red);border:1px solid rgba(255,59,59,.3);animation:sPulse 1.4s ease-in-out infinite}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:.5}}
.mc-spill.ft{background:rgba(136,136,136,.1);color:var(--t2);border:1px solid rgba(136,136,136,.2)}
.mc-spill.pre{background:rgba(255,215,0,.08);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.mc-ctx{padding:0 0 12px;font-size:11px;color:var(--t2);display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border)}
.mc-ctx-dot{color:var(--t3)}

/* tab bar */
.mc-tab-bar{display:flex;padding:0 20px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid var(--border)}
.mc-tab-bar::-webkit-scrollbar{display:none}
.mc-tab-btn{background:none;border:none;color:var(--t2);font-family:var(--font);font-size:10px;font-weight:700;padding:11px 13px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;position:relative;white-space:nowrap;transition:color .18s}
.mc-tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s;border-radius:2px 2px 0 0}
.mc-tab-btn.active{color:var(--text)}.mc-tab-btn.active::after{transform:scaleX(1)}
.mc-tab-btn:hover:not(.active){color:#ccc}
.mc-body{overflow-y:auto;flex:1;padding:18px 20px}

/* countdown */
.mc-cd{text-align:center;padding:12px 0 18px;border-bottom:1px solid var(--border);margin-bottom:16px}
.mc-cd-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.mc-cd-time{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--gold);letter-spacing:4px;font-variant-numeric:tabular-nums}
.mc-cd-sub{font-size:11px;color:var(--t2);margin-top:6px}

/* win probability */
.mc-prob{margin-bottom:14px}
.mc-prob-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.mc-prob-bar{height:7px;border-radius:4px;overflow:hidden;display:flex;gap:2px;margin-bottom:5px}
.mc-ph{background:var(--accent);transition:width .7s cubic-bezier(.4,0,.2,1);min-width:0}
.mc-pd{background:#444;min-width:0;transition:width .7s .1s cubic-bezier(.4,0,.2,1)}
.mc-pa{background:#ff5555;min-width:0;transition:width .7s .2s cubic-bezier(.4,0,.2,1)}
.mc-prob-nums{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono)}
.mc-phn{color:var(--accent);font-weight:700}.mc-pdn{color:var(--t2);text-align:center}.mc-pan{color:#ff7070;font-weight:700}

/* odds — redesigned */
.mc-odds-tbl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0 4px}
.mc-odds-cell{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:9px;padding:10px 8px;text-align:center}
.mc-odds-team{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.mc-odds-pct{font-family:var(--mono);font-size:16px;font-weight:700;margin-bottom:3px}
.mc-odds-dec{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--t1)}
.mc-odds-ml{font-size:9px;color:var(--t2);margin-top:2px}
.mc-odds-note{font-size:9px;color:var(--t2);text-align:right;margin-bottom:14px}
/* UK TV badge */
.mc-tv-uk{color:#60b8ff;font-weight:600}
/* lineup rating badge */
.mc-lu-rtg{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;margin-left:2px}
.mc-lu-rtg.hi{background:rgba(0,255,135,.15);color:var(--accent)}
.mc-lu-rtg.mid{background:rgba(255,215,0,.12);color:var(--gold)}
.mc-lu-rtg.lo{background:rgba(255,80,80,.10);color:#ff7070}

/* form guide */
.mc-form-row{display:flex;gap:12px;margin-bottom:16px}
.mc-form-side{flex:1;min-width:0}
.mc-form-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:5px}
.mc-form-team{font-size:11px;font-weight:600;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-fdots{display:flex;gap:3px}
.mc-fdot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.mc-fdot.W{background:rgba(0,255,135,.18);color:var(--accent);border:1px solid rgba(0,255,135,.35)}
.mc-fdot.D{background:rgba(136,136,136,.12);color:var(--t2);border:1px solid rgba(136,136,136,.3)}
.mc-fdot.L{background:rgba(255,59,59,.12);color:#ff7070;border:1px solid rgba(255,59,59,.3)}

/* key players */
.mc-sect-hd{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:8px}
.mc-leaders-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mc-lcard{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mc-lcard-flag{font-size:14px;margin-bottom:3px}
.mc-lcard-name{font-size:12px;font-weight:700;margin-bottom:2px}
.mc-lcard-cat{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.mc-lcard-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)}

/* info grid */
.mc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mc-ibox{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mc-ibox-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.mc-ibox-val{font-size:12px;font-weight:600;line-height:1.4}
.mc-ibox-sub{font-size:10px;color:var(--t2);margin-top:2px}

/* goal timeline */
.mc-tl{margin-bottom:18px}
.mc-tl-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:10px}
.mc-tl-track{height:3px;background:rgba(255,255,255,.09);border-radius:2px;position:relative;margin:16px 0 5px}
.mc-tl-mins{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--t2)}
.mc-tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;cursor:help;transition:transform .15s}
.mc-tl-dot:hover{transform:translate(-50%,-50%) scale(1.5)}
.mc-tl-dot.home{background:var(--accent);box-shadow:0 0 8px rgba(0,255,135,.7)}
.mc-tl-dot.away{background:#ff5555;box-shadow:0 0 7px rgba(255,85,85,.7)}

/* scorers */
.mc-scorers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.mc-scol-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.mc-sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mc-sdot.home{background:var(--accent)}.mc-sdot.away{background:#ff5555}
.mc-srow{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.mc-srow:last-child{border-bottom:none}
.mc-smin{font-family:var(--mono);font-size:9px;color:var(--accent);font-weight:700;width:22px;flex-shrink:0}
.mc-sname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-stype{font-size:8px;color:var(--t2);padding:1px 4px;background:rgba(255,255,255,.05);border-radius:3px;flex-shrink:0}
.mc-no-goal{font-size:11px;color:var(--t3);font-style:italic;padding:4px 0}

/* quick snap */
.mc-snap{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:0}
.mc-snap-box{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mc-snap-val{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1}
.mc-snap-lbl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.mc-snap-sides{font-size:9px;color:var(--t3);margin-top:2px}

/* stats */
.mc-stat-hdr{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mc-stat-row{margin-bottom:11px}
.mc-stat-vals{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:4px;font-family:var(--mono)}
.mc-stat-lv{color:var(--accent);font-weight:700}.mc-stat-rv{color:#ff7070;font-weight:700}
.mc-stat-nm{color:var(--t2);font-size:9px;letter-spacing:.5px;text-transform:uppercase;text-align:center;flex:1}
.mc-stat-track{height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;display:flex;gap:2px}
.mc-stat-l{height:100%;background:var(--accent);border-radius:3px 0 0 3px;transition:width .65s cubic-bezier(.4,0,.2,1)}
.mc-stat-r{height:100%;background:#ff5555;border-radius:0 3px 3px 0;margin-left:auto;transition:width .65s .05s cubic-bezier(.4,0,.2,1)}
.mc-stat-na{text-align:center;padding:20px 0;color:var(--t2);font-size:13px}

/* ── LIVE TAB ─────────────────────────────────── */
.mc.live .mc-min{font-size:15px;font-weight:700;color:#f97316}
.live-tl-hdr{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin:0 0 6px}
.live-tl{margin-bottom:4px}
.live-tl-row{display:grid;grid-template-columns:30px 26px 1fr;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.live-tl-row:last-child{border-bottom:none}
.live-tl-min{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.live-tl-row.is-home .live-tl-min{color:var(--accent)}
.live-tl-row.is-away .live-tl-min{color:#ff7070}
.live-tl-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px}
.live-tl-icon.goal{background:rgba(245,158,11,.1);border-radius:50%}
.live-tl-icon.sub{background:rgba(100,200,100,.1);border-radius:50%;font-size:10px;font-weight:700;color:#6c6}
.live-tl-icon.var{background:rgba(100,150,255,.1);border-radius:3px;font-size:8px;font-weight:700;color:#7af}
.live-tl-txt{font-size:12px;color:var(--text);line-height:1.3;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-tl-team{color:var(--t2);font-size:10px;margin-left:4px}
.live-refresh{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);margin-top:14px;justify-content:flex-end}
.live-refresh-dot{width:6px;height:6px;border-radius:50%;background:#f97316;animation:blinkR 1.2s infinite;flex-shrink:0}

/* lineups */
.mc-lu-sec{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin:8px 0 3px}
.mc-lu-p{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.mc-lu-p:last-child{border-bottom:none}
.mc-lu-num{font-family:var(--mono);font-size:9px;color:var(--t2);width:14px;text-align:right;flex-shrink:0}
.mc-lu-pos{font-size:8px;color:var(--t2);padding:1px 4px;background:rgba(255,255,255,.05);border-radius:3px;flex-shrink:0;min-width:22px;text-align:center}
.mc-lu-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-lu-na{font-size:12px;color:var(--t2);text-align:center;padding:16px 0}

/* formation pitch */
.fp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.fp-team-lbl{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.fp-team-lbl.home{color:var(--accent)}
.fp-team-lbl.away{color:#ff6b6b}
.fp-form-badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;background:rgba(255,255,255,.08);color:var(--t2);letter-spacing:.5px}
.fp-wrap{position:relative;width:100%;padding-bottom:143%;background:linear-gradient(175deg,#1c5032 0%,#1e5a37 30%,#195030 50%,#1e5a37 70%,#1c5032 100%);border-radius:10px;overflow:hidden;margin-bottom:6px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.fp-lines{position:absolute;inset:0;width:100%;height:100%}
.fp-dot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;z-index:2;-webkit-tap-highlight-color:transparent}
.fp-click{cursor:pointer}
.fp-click:active .fp-circle{transform:scale(.88)}
.fp-circle{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--mono);transition:transform .1s}
.fp-dot.home .fp-circle{background:var(--accent);color:#000;box-shadow:0 2px 8px rgba(0,255,135,.45)}
.fp-dot.away .fp-circle{background:#e05252;color:#fff;box-shadow:0 2px 8px rgba(224,82,82,.45)}
.fp-lbl{font-size:7px;color:#fff;text-align:center;margin-top:1px;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.95);letter-spacing:.1px;line-height:1.1}
.fp-rtg{font-size:7px;font-weight:700;padding:1px 3px;border-radius:3px;margin-top:1px;line-height:1.3}
.fp-rtg.hi{background:var(--accent);color:#000}
.fp-rtg.mid{background:var(--gold);color:#000}
.fp-rtg.lo{background:#ff5555;color:#fff}
.fp-bench-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fp-bench-dot.home{background:var(--accent)}
.fp-bench-dot.away{background:#e05252}

/* news */
.mc-news-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:opacity .15s}
.mc-news-item:last-child{border-bottom:none}
.mc-news-item:hover{opacity:.8}
.mc-news-img{width:68px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06)}
.mc-news-cnt{flex:1;min-width:0}
.mc-news-ttl{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mc-news-meta{font-size:10px;color:var(--t2)}
.mc-news-empty{text-align:center;padding:20px 0;color:var(--t2);font-size:13px}

/* highlights tab */
.mc-hl-tab .mc-thumb{max-width:520px;margin:0 auto;display:block}

/* ── PLAYER DETAIL ───────────────────────── */
.mc-lu-p.clickable{cursor:pointer;border-radius:5px;transition:background .12s}
.mc-lu-p.clickable:hover{background:rgba(255,255,255,.05)}
.mc-lu-arrow{font-size:13px;color:var(--t3);margin-left:auto;flex-shrink:0;transition:color .12s}
.mc-lu-p.clickable:hover .mc-lu-arrow{color:var(--accent)}
.pl-back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:0 0 14px;display:flex;align-items:center;gap:5px;font-family:inherit;transition:color .12s}
.pl-back:hover{color:var(--accent)}
.pl-hero{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:4px}
.pl-photo{width:58px;height:58px;border-radius:50%;overflow:hidden;background:var(--card);flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px}
.pl-photo img{width:100%;height:100%;object-fit:cover;object-position:top center}
.pl-meta{flex:1;min-width:0}
.pl-pname{font-size:17px;font-weight:700;line-height:1.2}
.pl-psub{font-size:11px;color:var(--t2);margin-top:3px}
.pl-pnum{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--accent);flex-shrink:0}
.pl-sec{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin:16px 0 8px}
.pl-sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.pl-sbox{background:var(--card);border-radius:8px;padding:10px;text-align:center}
.pl-sval{font-family:var(--mono);font-size:20px;font-weight:700}
.pl-slbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.pl-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.pl-info-row{background:var(--card);border-radius:8px;padding:8px 10px}
.pl-info-k{color:var(--t2);font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pl-info-v{font-size:12px;font-weight:600}

@media(max-width:600px){
  .modal-bg{padding:16px 12px env(safe-area-inset-bottom,16px);align-items:center}
  .modal{
    border-radius:16px;
    max-height:88vh;
    max-height:88dvh;
  }
  .mc-hdr{padding:10px 16px 0}
  .mc-teams-row{padding:4px 0 10px}
  .mc-flag{font-size:22px}
  .mc-snums{font-size:30px}
  .mc-tname{font-size:11px}
  .mc-close-wrap{top:6px;right:10px}
  .mc-body{padding:14px 16px}
  .mc-cd-time{font-size:28px;letter-spacing:2px}
  .mc-odds-tbl{gap:4px}
  .mc-odds-cell{padding:8px 6px}
  .mc-odds-pct{font-size:14px}
  .mc-odds-dec{font-size:11px}
  .mc-leaders-grid,.mc-lu-cols,.mc-scorers,.mc-info-grid{grid-template-columns:1fr}
  .mc-form-row{flex-direction:column}
}

/* ── SEARCH ──────────────────────────────────── */
.srch-btn{background:none;border:none;color:rgba(255,255,255,.45);padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .15s;flex-shrink:0}
.play-btn{display:flex;align-items:center;gap:4px;background:var(--accent);color:#000;border:none;border-radius:20px;padding:5px 10px 5px 7px;font-size:11px;font-weight:800;letter-spacing:.5px;cursor:pointer;-webkit-tap-highlight-color:transparent;line-height:1;flex-shrink:0;font-family:var(--mono)}
.game-ov{position:fixed;inset:0;z-index:500;background:#050716;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding-top:max(10px,env(safe-area-inset-top));touch-action:none;transition:opacity .15s}
.game-ov.game-ov-hidden{opacity:0;pointer-events:none}
.game-ov-close{flex-shrink:0;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 18px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.5px;font-family:var(--mono)}
#game{display:block;width:min(100vw,calc((100dvh - 48px) * 270/480));aspect-ratio:270/480;max-width:100vw;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;touch-action:none;flex-shrink:1}
.srch-btn:active{color:var(--accent)}
.srch-overlay{position:fixed;inset:0;z-index:300;background:rgba(8,8,8,.98);display:flex;flex-direction:column}
.srch-overlay.hidden{display:none}
.srch-bar{display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);height:66px;flex-shrink:0}
.srch-icon{color:rgba(255,255,255,.55);flex-shrink:0}
.srch-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;font-family:inherit}
.srch-input::placeholder{color:rgba(255,255,255,.45)}
.srch-close{background:none;border:none;color:rgba(255,255,255,.35);font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0;line-height:1}
.srch-results{flex:1;overflow-y:auto;padding-bottom:24px}
.srch-section-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);padding:14px 16px 5px}
.srch-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);-webkit-tap-highlight-color:transparent}
.srch-item:active{background:rgba(255,255,255,.04)}
.srch-item-flag{font-size:24px;flex-shrink:0;width:32px;text-align:center}
.srch-item-logo{width:32px;height:32px;object-fit:contain;flex-shrink:0;border-radius:3px}
.srch-item-photo{width:38px;height:38px;object-fit:cover;flex-shrink:0;border-radius:50%;background:var(--card);border:1px solid var(--border)}
.srch-item-info{flex:1;min-width:0}
.srch-item-name{font-size:14px;font-weight:600;color:var(--text)}
.srch-item-sub{font-size:11px;color:rgba(255,255,255,.58);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srch-arrow{color:rgba(255,255,255,.35);font-size:15px;flex-shrink:0}
.srch-empty{text-align:center;color:rgba(255,255,255,.5);font-size:13px;padding:48px 24px;line-height:1.7}
.srch-hint{text-align:center;color:rgba(255,255,255,.45);font-size:12px;padding:40px 24px;line-height:1.8}

/* ── RESPONSIVE ─────────────────────────────── */
@media(max-width:768px){
  .hdr-in{height:58px}.wordmark-name{font-size:15px}.clock{display:none}
  .main{padding:18px 14px}
  .mgrid,.ggrid{grid-template-columns:1fr}
  .sc{font-size:28px}.tflag{font-size:22px}
}
@media(max-width:480px){
  .tbtn{padding:13px 11px;font-size:13px}
  .mc-venue{display:none}
}

/* ── BRACKET MATCH INFO ─────────────────────────── */
.bm-info{font-size:10px;color:rgba(255,255,255,.55);padding:4px 10px 7px;letter-spacing:.2px;line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.1)}
.bt.lbl{color:rgba(255,255,255,.4);font-size:11px}
.bt.projected{opacity:.7}
.ko-proj{font-size:9px;color:var(--t2);margin-left:auto;font-style:italic}

/* ── INSTALL BANNER ─────────────────────────────── */
.install-banner{
  display:none;align-items:center;gap:10px;padding:9px 18px;
  background:rgba(0,255,135,.05);border-bottom:1px solid rgba(0,255,135,.12);
  font-size:12px;color:var(--t2);
}
.install-banner.show{display:flex}
.install-txt{flex:1}
.install-btn{
  background:var(--accent);color:#000;border:none;border-radius:8px;
  font-size:11px;font-weight:700;padding:5px 13px;cursor:pointer;flex-shrink:0;
  font-family:var(--font);letter-spacing:.3px;
}
.install-x{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}


/* ── LEADERBOARD ────────────────────────────────── */
.lb-page{max-width:680px;margin:0 auto}
.lb-hd{font-size:24px;font-weight:800;letter-spacing:-.5px;padding:24px 0 4px}
.lb-meta{font-size:12px;color:var(--t2);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.lb-ts{font-size:11px;color:var(--t2)}
.lb-refresh-btn{background:none;border:1px solid var(--border);color:var(--t2);font-family:var(--font);font-size:10px;padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.lb-refresh-btn:hover{border-color:#333;color:var(--text)}
.lb-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.lb-ov-cell{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center}
.lb-ov-val{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-.5px}
.lb-ov-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.lb-section{font-size:9px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--t2);margin:24px 0 10px}
.lb-box{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.lb-box-hd{padding:10px 16px;border-bottom:1px solid var(--border)}
.lb-box-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2)}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s}
.lb-row:last-child{border-bottom:none}
.lb-row.clickable{cursor:pointer}
.lb-row.clickable:hover{background:rgba(255,255,255,.04)}
.lb-row.clickable:hover .lb-name{color:var(--accent)}
.lb-rank{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t2);min-width:20px;text-align:center;flex-shrink:0}
.lb-rank.gold{color:var(--gold)}
.lb-flag{font-size:18px;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .12s}
.lb-team{font-size:10px;color:var(--t2);margin-top:2px}
.lb-val{font-size:20px;font-weight:800;font-family:var(--mono);min-width:24px;text-align:right;flex-shrink:0}
.lb-val.g{color:var(--accent)}.lb-val.a{color:#64c8ff}.lb-val.y{color:var(--gold)}.lb-val.r{color:var(--red)}.lb-val.c{color:#a78bfa}
.lb-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lb-empty{padding:20px 16px;font-size:12px;color:var(--t2);line-height:1.7;text-align:center}
/* Players to Watch */
.watch-hd{font-size:9px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--t2);margin:24px 0 6px}
.watch-algo{font-size:10px;color:var(--t2);margin-bottom:12px;line-height:1.75;padding:9px 13px;background:rgba(255,255,255,.025);border-radius:8px;border:1px solid var(--border)}
.watch-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.watch-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .12s;cursor:pointer}
.watch-card:hover{border-color:#2a2a2a;background:#131313}
.watch-card:hover .watch-name{color:var(--accent)}
.watch-pos{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--t2);min-width:20px;text-align:center;flex-shrink:0}
.watch-pos.top3{color:var(--gold)}
.watch-flag{font-size:26px;flex-shrink:0;line-height:1}
.watch-info{flex:1;min-width:0}
.watch-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.watch-team{font-size:10px;color:var(--t2);margin-top:1px}
.watch-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.watch-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px}
.watch-pill.g{background:rgba(0,255,135,.1);color:var(--accent)}
.watch-pill.a{background:rgba(100,200,255,.1);color:#64c8ff}
.watch-pill.c{background:rgba(167,139,250,.1);color:#a78bfa}
.watch-pill.d{background:rgba(255,215,0,.1);color:var(--gold)}
.watch-score{text-align:right;flex-shrink:0}
.watch-score-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--accent)}
.watch-score-lbl{font-size:8px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

/* ── MY TEAM ────────────────────────────────────── */
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:14px}
.tp-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 8px;text-align:center;cursor:pointer;
  transition:border-color .15s,transform .15s;
}
.tp-card:hover{border-color:#333;transform:translateY(-2px)}
.tp-flag{font-size:24px;margin-bottom:4px}
.tp-name{font-size:10px;font-weight:600;line-height:1.3;color:var(--t2)}
.tp-grp{font-size:9px;color:var(--t2);margin-top:2px}

.fav-hero{display:flex;align-items:center;gap:16px;padding:0 0 20px;border-bottom:1px solid var(--border);margin-bottom:0}
.fav-flag-lg{font-size:54px;line-height:1;flex-shrink:0}
.fav-meta{min-width:0}
.fav-name{font-size:22px;font-weight:700;letter-spacing:-.4px}
.fav-sub{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.5}
.fav-change{background:none;border:1px solid var(--border);color:var(--t2);font-size:11px;
  padding:4px 11px;border-radius:8px;cursor:pointer;margin-top:10px;display:inline-block;
  font-family:var(--font);transition:border-color .15s;letter-spacing:.2px}
.fav-change:hover{border-color:#444;color:var(--text)}
.fav-sect{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t3);margin:22px 0 10px;padding-top:20px;border-top:1px solid var(--border)}
.fav-sect:first-of-type{border-top:none;padding-top:0;margin-top:20px}

.fav-match{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  margin-bottom:8px;transition:border-color .15s;
}
.fav-match:hover{border-color:#272727}
.fav-match-teams{flex:1;min-width:0}
.fav-match-row{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:2px}
.fav-match-row:last-child{margin-bottom:0}
.fav-match-flag{font-size:14px;flex-shrink:0}
.fav-match-team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-match-gs{font-family:var(--mono);font-size:13px;font-weight:700;min-width:14px;text-align:right}
.fav-match-gs.win{color:var(--accent)}.fav-match-gs.loss{color:#ff5555}
.fav-match-meta{font-size:10px;color:var(--t2);margin-top:5px}
.fav-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;letter-spacing:.4px;align-self:center}
.fav-pill.live{background:rgba(255,59,59,.12);color:var(--red)}
.fav-pill.ft{background:rgba(255,255,255,.06);color:var(--t2)}
.fav-pill.up{background:rgba(255,215,0,.08);color:var(--gold)}

.fav-gtbl{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.fav-gtbl th{padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--t3);text-align:center;border-bottom:1px solid var(--border)}
.fav-gtbl th.tl{text-align:left;padding-left:14px}
.fav-gtbl td{padding:9px 10px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.fav-gtbl td.tl{text-align:left;padding-left:14px}
.fav-gtbl tr:last-child td{border-bottom:none}
.fav-gtbl tr.me td{background:rgba(0,255,135,.04)}
.fav-gtbl tr.g-clickable{cursor:pointer}
.fav-gtbl tr.g-clickable:hover td{background:rgba(255,255,255,.04)}
.fav-gtbl tr.g-clickable:hover .gname{color:var(--accent)}
.fav-gtbl .gteam{display:flex;align-items:center;gap:7px}

/* ── SQUAD ───────────────────────────────────────────────────────── */
.squad-pos-group{margin-bottom:20px}
.squad-pos-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);margin-bottom:8px}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.squad-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s,background .15s}
.squad-card:hover{border-color:#333;background:rgba(255,255,255,.02)}
.squad-card:hover .squad-name{color:var(--accent)}
.squad-num{font-family:var(--mono);font-size:17px;font-weight:800;color:var(--accent);min-width:24px;text-align:center;flex-shrink:0;line-height:1}
.squad-info{min-width:0}
.squad-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.squad-club{font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}

/* ── TEAM STATS ──────────────────────────────────────────────────── */
.wdl-row{display:flex;gap:8px;margin-bottom:12px}
.wdl-seg{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center}
.wdl-num{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1}
.wdl-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);margin-top:4px}
.wdl-seg.w .wdl-num{color:var(--accent)}.wdl-seg.d .wdl-num{color:var(--gold)}.wdl-seg.l .wdl-num{color:#ff5555}
.tstat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.tstat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center}
.tstat-val{font-size:28px;font-weight:800;font-family:var(--mono);line-height:1}
.tstat-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);margin-top:4px}
.tstat-bars{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:6px}
.tstat-bar-row{margin-bottom:12px}
.tstat-bar-row:last-child{margin-bottom:0}
.tstat-bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:5px}
.tstat-bar-lbl strong{color:var(--text);font-weight:600}
.tstat-bar-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.tstat-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0}
.tstat-bar-fill.ga{background:#ff5555}
.tstat-gms{font-size:10px;color:var(--t2);text-align:right;margin-top:4px}

/* ── SQUAD FILTER PILLS ──────────────────────────────────────────── */
.squad-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.squad-pill{background:var(--card);border:1px solid var(--border);color:var(--t2);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.squad-pill.active{background:var(--accent);border-color:var(--accent);color:#000}
.squad-pill:hover:not(.active){border-color:#444;color:var(--text)}

/* ── TEAM PAGE V2 ────────────────────────────────────────────────── */
.tp2-hero,.tm-hero{display:flex;align-items:center;gap:12px;padding-bottom:14px}
.tm-hero{padding-right:44px}
.tp2-flag{font-size:38px;line-height:1;flex-shrink:0}
.tp2-info{flex:1;min-width:0}
.tp2-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.tp2-sub{font-size:11px;color:var(--t2);margin-top:3px}
.tp2-record{font-size:11px;color:var(--t2);margin-top:3px;letter-spacing:.1px}
.tp2-change{background:none;border:1px solid var(--border);color:var(--t2);font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.tp2-change:hover{border-color:#444;color:var(--text)}
/* spotlight card */
.tp2-spotlight{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 16px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.tp2-spotlight:hover{border-color:#333}
.tp2-spot-label{font-size:9px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:12px}
.tp2-spot-teams{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.tp2-spot-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.tp2-spot-flag{font-size:26px;line-height:1}
.tp2-spot-tname{font-size:12px;font-weight:700;text-align:center;line-height:1.2}
.tp2-spot-center{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;min-width:52px}
.tp2-spot-score{font-size:30px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}
.tp2-spot-score.win{color:var(--accent)}.tp2-spot-score.loss{color:#ff5555}
.tp2-spot-vs{font-size:13px;color:var(--t2);font-weight:600}
.tp2-spot-meta{font-size:10px;color:var(--t2);text-align:center;line-height:1.5}
/* schedule strip */
.tp2-sched{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
.tp2-sched-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .12s}
.tp2-sched-row:last-child{border-bottom:none}
.tp2-sched-row:hover{background:rgba(255,255,255,.03)}
.tp2-sched-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tp2-sched-dot.w{background:var(--accent)}.tp2-sched-dot.d{background:var(--gold)}.tp2-sched-dot.l{background:#ff5555}.tp2-sched-dot.up{background:rgba(255,255,255,.15)}
.tp2-sched-opp{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp2-sched-date{font-size:10px;color:var(--t2);flex-shrink:0}
.tp2-sched-score{font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;min-width:30px;text-align:right}
.tp2-sched-score.w{color:var(--accent)}.tp2-sched-score.l{color:#ff5555}
/* quick stats strip */
.tp2-qs-strip{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
.tp2-qs-cell{flex:1;padding:10px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.04)}
.tp2-qs-cell:last-child{border-right:none}
.tp2-qs-val{font-size:18px;font-weight:800;font-family:var(--mono);line-height:1}
.tp2-qs-lbl{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2);margin-top:3px}
/* compact standings */
.tp2-standings{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.tp2-stand-hdr{display:flex;align-items:center;padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.04)}
.tp2-sh-name{flex:1}.tp2-sh-p{width:20px;text-align:center}.tp2-sh-gd{width:30px;text-align:right}.tp2-sh-pts{width:26px;text-align:right}
.tp2-stand-row{display:flex;align-items:center;padding:8px 12px;gap:7px;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;transition:background .12s}
.tp2-stand-row:last-child{border-bottom:none}
.tp2-stand-row:hover{background:rgba(255,255,255,.03)}
.tp2-stand-row.me{background:rgba(0,255,135,.03)}
.tp2-stand-row:hover .tp2-stand-name{color:var(--accent)}
.tp2-stand-pos{font-size:11px;color:var(--t2);font-weight:600;width:12px;flex-shrink:0;text-align:center}
.tp2-stand-flag{font-size:14px;flex-shrink:0}
.tp2-stand-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;transition:color .12s}
.tp2-stand-you{font-size:8px;font-weight:700;color:var(--accent);letter-spacing:.4px;text-transform:uppercase;flex-shrink:0;min-width:20px}
.tp2-stand-p{font-size:11px;font-family:var(--mono);width:20px;text-align:center;flex-shrink:0;color:var(--t2)}
.tp2-stand-pts{font-size:12px;font-weight:700;font-family:var(--mono);width:26px;text-align:right;flex-shrink:0}
.tp2-stand-gd{font-size:11px;font-family:var(--mono);width:30px;text-align:right;flex-shrink:0}
.tp2-stand-footer{padding:5px 12px;font-size:9px;color:var(--t3,#555);text-align:center;border-top:1px solid rgba(255,255,255,.03)}

@media(max-width:768px){.tp-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}

/* ── RULEBOOK ───────────────────────────────────── */
.rb-page{max-width:680px;margin:0 auto}
.rb-hd{padding:24px 0 4px}
.rb-hd-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.rb-hd-sub{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.6}
.rb-spotlight{
  background:linear-gradient(135deg,rgba(0,255,135,.08) 0%,rgba(0,255,135,.03) 100%);
  border:1px solid rgba(0,255,135,.2);border-radius:14px;padding:16px 18px;margin:18px 0 22px;
}
.rb-spot-eyebrow{font-size:9px;font-weight:800;letter-spacing:1.2px;color:var(--accent);
  text-transform:uppercase;margin-bottom:8px}
.rb-spot-title{font-size:15px;font-weight:700;letter-spacing:-.2px;margin-bottom:5px}
.rb-spot-body{font-size:12px;color:var(--t2);line-height:1.75}
.rb-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.rb-filter::-webkit-scrollbar{display:none}
.rb-pill{
  flex-shrink:0;background:none;border:1px solid var(--border);color:var(--t2);
  font-family:var(--font);font-size:11px;font-weight:600;padding:6px 14px;
  border-radius:100px;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.rb-pill.active{background:rgba(0,255,135,.1);border-color:rgba(0,255,135,.35);color:var(--accent)}
.rb-pill:hover:not(.active){border-color:#333;color:var(--text)}
.rb-sec-label{font-size:9px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--t3);margin:24px 0 10px;padding-top:4px}
.rb-sec-label:first-of-type{margin-top:0}
.rb-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.rb-card:hover{border-color:#2a2a2a}
.rb-card.open{border-color:#303030}
.rb-card-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.rb-icon{font-size:22px;flex-shrink:0;line-height:1.2;width:28px;text-align:center}
.rb-card-body{flex:1;min-width:0}
.rb-badge{
  display:inline-block;font-size:8px;font-weight:800;letter-spacing:.9px;
  text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:5px;
}
.rb-badge.new{background:rgba(0,255,135,.15);color:var(--accent)}
.rb-badge.updated{background:rgba(255,215,0,.12);color:#ffd700}
.rb-badge.core{background:rgba(255,255,255,.06);color:var(--t3)}
.rb-card-title{font-size:14px;font-weight:700;letter-spacing:-.2px;line-height:1.3;margin-bottom:4px}
.rb-card-summary{font-size:12px;color:var(--t2);line-height:1.65}
.rb-chevron{flex-shrink:0;color:var(--t3);font-size:12px;align-self:center;
  transition:transform .2s;margin-left:4px;padding-top:2px}
.rb-card.open .rb-chevron{transform:rotate(90deg)}
.rb-detail{
  display:none;padding:0 16px 16px 56px;font-size:12px;color:var(--t2);
  line-height:1.8;border-top:1px solid rgba(255,255,255,.04);padding-top:12px;
}
.rb-card.open .rb-detail{display:block}

/* ── DAILY RECAP CARD ──────────────────── */
.recap-card{
  display:flex;flex-direction:column;
  margin:0 0 12px;
  border-radius:10px;
  background:rgba(0,255,135,.04);
  border:1px solid rgba(0,255,135,.12);
  overflow:hidden;
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.recap-card:active{background:rgba(0,255,135,.07)}
.recap-hdr{display:flex;align-items:center;gap:9px;padding:10px 13px}
.recap-pill{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--accent);background:rgba(0,255,135,.1);border:1px solid rgba(0,255,135,.2);
  padding:2px 7px;border-radius:4px;flex-shrink:0;line-height:1.6;
}
.recap-hl{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.8);flex:1;line-height:1.35;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.recap-card.open .recap-hl{white-space:normal;padding-bottom:0}
.recap-dismiss{
  background:rgba(74,222,128,.12);border:1.5px solid rgba(74,222,128,.4);
  color:#4ade80;font-size:13px;font-weight:700;
  border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;flex-shrink:0;line-height:1;
  -webkit-tap-highlight-color:transparent;margin-left:6px;
}
.recap-dismiss:active{background:rgba(74,222,128,.3);color:#fff}
.recap-body{
  max-height:0;overflow:hidden;
  transition:max-height .3s cubic-bezier(.4,0,.2,1);
}
.recap-card.open .recap-body{max-height:900px}
.recap-results{margin-top:10px}
.recap-result-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.recap-result-row:last-child{border-bottom:none}
.recap-result-home{flex:1;text-align:right;color:rgba(255,255,255,.75)}
.recap-result-score{font-size:13px;font-weight:800;color:#fff;min-width:36px;text-align:center;letter-spacing:.5px}
.recap-result-away{flex:1;color:rgba(255,255,255,.75)}
.recap-body-inner{padding:0 13px 13px;border-top:1px solid rgba(0,255,135,.08)}
.recap-section{margin-top:10px}
.recap-section-lbl{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--accent);opacity:.6;margin-bottom:3px;
}
.recap-section-txt{font-size:12px;color:rgba(255,255,255,.6);line-height:1.7}

/* ── GOAL SCORERS ────────────────── */
.mc-scorers{display:flex;align-items:flex-start;gap:8px;margin:2px 0 10px}
.mc-scorers-h{flex:1;font-size:10px;color:var(--t2);line-height:1.7;text-align:center}
.mc-scorers-a{flex:1;font-size:10px;color:var(--t2);line-height:1.7;text-align:center}
.mc-scorers-gap{flex-shrink:0;width:56px}
.mc-scorer-min{opacity:.7}
.mc-scorer-og{color:#ff7070}

/* ── GOAL CELEBRATION ──────────────────── */
.goal-banner{
  position:fixed;top:42%;left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  color:#fff;font-weight:900;font-size:56px;
  letter-spacing:4px;z-index:10000;pointer-events:none;
  text-shadow:0 0 30px rgba(255,255,255,.5),0 2px 8px rgba(0,0,0,.8);
  animation:goalBanner 1.8s cubic-bezier(.34,1.4,.64,1) forwards;
}
@keyframes goalBanner{
  0%  {transform:translate(-50%,-50%) scale(0.6);opacity:0}
  20% {transform:translate(-50%,-50%) scale(1.06);opacity:1}
  55% {transform:translate(-50%,-50%) scale(1);opacity:1}
  85% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.02);opacity:0}
}
.goal-particle{
  position:fixed;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%) scale(0);
  animation:goalParticle var(--dur,900ms) var(--delay,0ms) cubic-bezier(.2,.8,.4,1) forwards;
}
@keyframes goalParticle{
  0%  {transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:1}
  12% {transform:translate(calc(-50% + var(--tx)*.12),calc(-50% + var(--ty)*.12 - 50px)) scale(2.2) rotate(90deg);opacity:1}
  40% {transform:translate(calc(-50% + var(--tx)*.45),calc(-50% + var(--ty)*.45 - 110px)) scale(1.4) rotate(300deg);opacity:1}
  100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(0.15) rotate(780deg);opacity:0}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-in">
    <div class="wordmark" onclick="goHome()">
      <div class="wordmark-name">Game Buddy</div>
      <div class="wordmark-event">FIFA World Cup 2026</div>
    </div>
    <div class="hdr-r">
      <button class="play-btn" onclick="openGame()" aria-label="Play Keepy-Uppy King">⚽ PLAY</button>
      <div class="live-pill hidden" id="livePill"><div class="ldot"></div>LIVE</div>
      <div class="hdr-meta">
        <div class="clock" id="clock">--:--:--</div>
        <div class="refresh-label" id="rfLabel" onclick="fetchMatches()" role="button" aria-label="Refresh scores"><span class="rl-icon">↻</span> Refresh</div>

function parseMinute(displayClock){
  if(!displayClock || displayClock==='HT') return 45;
  const m = displayClock.replace(/'/g,'').split('+')[0].trim();
  return Math.max(0, parseInt(m)||0);
}

function countdown(dateObj){
  const diff = Math.max(0, dateObj - Date.now());
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  if(diff===0) return 'Starting…';
  return `${h>0?h+'h ':''}`+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s';
}

function localTime(dateObj){
  return dateObj.toLocaleTimeString([],{hour:'numeric',minute:'2-digit',hour12:true});
}

// ═══════════════════════════════════════════════════
function parseEvent(ev){
  const comp = ev.competitions[0];
  const status = comp.status;
  const state = status.type.state;
  const home = comp.competitors.find(c=>c.homeAway==='home') || comp.competitors[0];
  const away = comp.competitors.find(c=>c.homeAway==='away') || comp.competitors[1];
  const bcast = comp.broadcasts?.[0]?.names?.join(' · ') || '';
  const groupNote = comp.altGameNote || '';
  const groupMatch = groupNote.match(/Group ([A-Z])/);
  const groupLabel = groupMatch ? `Group ${groupMatch[1]}` : groupNote;

  // Extract goal events from comp.details (scoreboard for FT, live updates for in-progress)
  const homeTeamId   = home.team.id;
  const homeTeamAbbr = home.team.abbreviation;
  const goals = (comp.details || [])
    .filter(d => {
      const t = (d.type?.text || d.type?.name || '').toLowerCase();
      return t.includes('goal') || t === 'score';
    })
    .map(d => {
      const og  = d.ownGoal || false;
      const pen = d.penaltyKick || false;
      // ESPN uses athletesInvolved OR participants depending on context
      const raw = d.athletesInvolved?.[0];
      const part = d.participants?.find(p => p.type === 'scorer' || p.order === 1)?.athlete;
      const name = raw?.shortName || raw?.displayName
        || part?.shortName || part?.displayName
        || (og ? 'OG' : '');
      const min  = d.clock?.displayValue || '';
      const dt   = d.team;
      const isHome = dt ? (dt.id === homeTeamId || dt.abbreviation === homeTeamAbbr) : false;
      return { name: og ? 'OG' : name, min, isHome, og, pen };
    })
    .filter(g => g.name || g.og);

  return {
    id: ev.id,
    state,                         // "pre"|"in"|"post"
    isHT: status.type.name === 'STATUS_HALFTIME',
    displayClock: status.displayClock,
    detail: status.type.detail,    // "Tue, June 16th at 3:00 PM EDT"
    date: new Date(ev.date),
    home: {
      name: home.team.displayName,
      abbr: home.team.abbreviation,
      score: parseInt(home.score)||0,
      winner: home.winner||false,
      shootoutScore: home.shootoutScore !== undefined && home.shootoutScore !== null ? parseInt(home.shootoutScore) : null
    },
    away: {
      name: away.team.displayName,
      abbr: away.team.abbreviation,
      score: parseInt(away.score)||0,
      winner: away.winner||false,
      shootoutScore: away.shootoutScore !== undefined && away.shootoutScore !== null ? parseInt(away.shootoutScore) : null
    },
    venue: comp.venue?.fullName || ev.venue?.displayName || '',
    city: comp.venue?.address?.city || '',
    group: groupLabel,
    bcast,
    goals,
  };
}

// One shared promise for the BBC catalog; fetched once per session, 2 pages = up to 100 videos
let _bbcCatalogPromise = null;
function getBBCCatalog(){
  if(_bbcCatalogPromise) return _bbcCatalogPromise;
  _bbcCatalogPromise = (async () => {
    const items = [];
    let pageToken = '';
    for(let page = 0; page < 2; page++){
      const url = `/api/highlights?mode=catalog${pageToken?'&pageToken='+encodeURIComponent(pageToken):''}`;
      const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
      if(!r.ok) break;
      const d = await r.json();
      (d.items || []).forEach(it => items.push({
        videoId: it.snippet.resourceId?.videoId,
        title:   it.snippet.title,
      }));
      pageToken = d.nextPageToken || '';
      if(!pageToken) break;
    }
    return items.filter(v => v.videoId);
  })().catch(() => []);
  return _bbcCatalogPromise;
}
