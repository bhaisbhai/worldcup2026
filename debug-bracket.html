<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Cup 2026 — Bracket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0a0a0a; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0 24px;
}
h1 { font-size: 15px; font-weight: 700; margin-bottom: 3px; text-align: center; letter-spacing: .02em; }
.sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .1em; text-align: center; }
#bc { width: 100%; max-width: min(100vw, 680px); }
svg { width: 100%; height: auto; display: block; touch-action: pinch-zoom; }
#status { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<h1>🏆 FIFA World Cup 2026</h1>
<div class="sub">Knockout Stage</div>
<div id="bc"></div>
<div id="status">Loading live results…</div>
<script>
// ── Dimensions ─────────────────────────────────────────────────────────────
const SZ = 800, CX = 400, CY = 400;
// Two visual rings per team:
const RL   = 340;  // outer badge ring (large flag circle)
const RI   = 278;  // inner dot ring (smaller flag circle)
const RR32 = 220;  // R32 match junction dots
const RR16 = 170;  // R16
const RQF  = 124;  // QF
const RSF  = 82;   // SF

const BR_OUTER = 28;  // outer badge radius
const BR_INNER = 14;  // inner dot radius

// ── Teams (positions 0-31) ──────────────────────────────────────────────────
// Left bracket  0-15: angles 260°→100°
// Right bracket 16-31: angles -80°→80°
const TEAMS = [
  {n:'South Africa',  s:'RSA', f:'🇿🇦'}, {n:'Canada',       s:'CAN', f:'🇨🇦'},
  {n:'Netherlands',   s:'NED', f:'🇳🇱'}, {n:'Morocco',      s:'MAR', f:'🇲🇦'},
  {n:'Germany',       s:'GER', f:'🇩🇪'}, {n:'Paraguay',     s:'PAR', f:'🇵🇾'},
  {n:'France',        s:'FRA', f:'🇫🇷'}, {n:'Sweden',       s:'SWE', f:'🇸🇪'},
  {n:'Brazil',        s:'BRA', f:'🇧🇷'}, {n:'Japan',        s:'JPN', f:'🇯🇵'},
  {n:'Ivory Coast',   s:'CIV', f:'🇨🇮'}, {n:'Norway',       s:'NOR', f:'🇳🇴'},
  {n:'Mexico',        s:'MEX', f:'🇲🇽'}, {n:'Ecuador',      s:'ECU', f:'🇪🇨'},
  {n:'England',       s:'ENG', f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'}, {n:'Congo DR',     s:'COD', f:'🇨🇩'},
  {n:'USA',           s:'USA', f:'🇺🇸'}, {n:'Bosnia-Herz.', s:'BIH', f:'🇧🇦'},
  {n:'Belgium',       s:'BEL', f:'🇧🇪'}, {n:'Senegal',      s:'SEN', f:'🇸🇳'},
  {n:'Portugal',      s:'POR', f:'🇵🇹'}, {n:'Croatia',      s:'CRO', f:'🇭🇷'},
  {n:'Spain',         s:'ESP', f:'🇪🇸'}, {n:'Austria',      s:'AUT', f:'🇦🇹'},
  {n:'Switzerland',   s:'SUI', f:'🇨🇭'}, {n:'Algeria',      s:'ALG', f:'🇩🇿'},
  {n:'Colombia',      s:'COL', f:'🇨🇴'}, {n:'Ghana',        s:'GHA', f:'🇬🇭'},
  {n:'Argentina',     s:'ARG', f:'🇦🇷'}, {n:'Cape Verde',   s:'CPV', f:'🇨🇻'},
  {n:'Australia',     s:'AUS', f:'🇦🇺'}, {n:'Egypt',        s:'EGY', f:'🇪🇬'},
];

// ESPN abbreviation aliases → my abbreviation
const ESPN_MAP = {
  'IVC':'CIV', 'CGO':'COD', 'DRC':'COD', 'BOS':'BIH',
  'CVO':'CPV', 'CTA':'CIV', 'CNG':'COD',
};
function normAbbr(a) { return ESPN_MAP[a] || a; }

// Name fragments for fallback matching
const NAME_FRAGS = {
  'ivory':'CIV', "côte":'CIV', 'cote':'CIV',
  'congo':'COD', 'democratic republic':'COD',
  'bosnia':'BIH', 'herzegovina':'BIH',
  'cape verde':'CPV',
  'england':'ENG',
};
function nameToAbbr(name) {
  const low = name.toLowerCase();
  for (const [k,v] of Object.entries(NAME_FRAGS)) if (low.includes(k)) return v;
  return null;
}

// ── Geometry ────────────────────────────────────────────────────────────────
function rad(d) { return d * Math.PI / 180; }
function pc(r, deg) {
  return { x: +(CX + r*Math.cos(rad(deg))).toFixed(2),
           y: +(CY + r*Math.sin(rad(deg))).toFixed(2) };
}

function leafTheta(i) {
  return i < 16 ? 260 - i*(160/15) : -80 + (i-16)*(160/15);
}

function matchRadius(m) {
  if (m <= 16) return RR32;
  if (m <= 24) return RR16;
  if (m <= 28) return RQF;
  if (m <= 30) return RSF;
  return 0;
}

function matchChildren(m) {
  if (m >= 1  && m <= 16) return {t:'L', a:(m-1)*2,     b:(m-1)*2+1};
  if (m >= 17 && m <= 24) return {t:'M', a:(m-17)*2+1,  b:(m-17)*2+2};
  if (m >= 25 && m <= 28) return {t:'M', a:(m-25)*2+17, b:(m-25)*2+18};
  if (m === 29) return {t:'M', a:25, b:26};
  if (m === 30) return {t:'M', a:27, b:28};
  if (m === 31) return {t:'M', a:29, b:30};
}

function matchTheta(m) {
  if (m === 31) return 0;
  const ch = matchChildren(m);
  const tA = ch.t==='L' ? leafTheta(ch.a) : matchTheta(ch.a);
  const tB = ch.t==='L' ? leafTheta(ch.b) : matchTheta(ch.b);
  return (tA + tB) / 2;
}

// Arc-bracket path: outer → midpoint (line) → arc → midpoint (line) → inner
function halfBracket(rOut, rIn, tOut, tIn) {
  const rArc = (rOut + rIn) / 2;
  const pOut   = pc(rOut, tOut);
  const pArc   = pc(rArc, tOut);
  const pInArc = pc(rArc, tIn);
  const pIn    = rIn === 0 ? {x:CX,y:CY} : pc(rIn, tIn);
  if (Math.abs(tIn-tOut) < 0.1) return `M ${pOut.x} ${pOut.y} L ${pIn.x} ${pIn.y}`;
  let sw = tIn > tOut ? 1 : 0;
  if (Math.abs(tIn-tOut) > 180) sw = 1-sw;
  return `M ${pOut.x} ${pOut.y} L ${pArc.x} ${pArc.y} A ${rArc} ${rArc} 0 0 ${sw} ${pInArc.x} ${pInArc.y} L ${pIn.x} ${pIn.y}`;
}

// ── State ────────────────────────────────────────────────────────────────────
let winners = {};  // matchId -> 0 (child A) | 1 (child B)

function matchTeams(m) {
  const ch = matchChildren(m);
  if (ch.t === 'L') return [TEAMS[ch.a], TEAMS[ch.b]];
  const wA = winners[ch.a], wB = winners[ch.b];
  return [
    wA != null ? matchTeams(ch.a)[wA] : null,
    wB != null ? matchTeams(ch.b)[wB] : null,
  ];
}

// ── Render ───────────────────────────────────────────────────────────────────
function arcColor(m, slot) {
  const w = winners[m];
  if (w == null)   return 'rgba(200,210,230,0.18)';
  if (w === slot)  return 'rgba(255,210,50,0.95)';
  return 'rgba(120,130,160,0.07)';
}

function render() {
  let arcs = '', innerDots = '', outerBadges = '', nodes = '';

  // ── Bracket arcs: inner dot → match nodes ──
  for (let m = 1; m <= 31; m++) {
    const ch = matchChildren(m);
    const mt = matchTheta(m), mr = matchRadius(m);
    let tA, tB, rA, rB;

    if (ch.t === 'L') {
      // From INNER dot ring to R32 match node
      tA = leafTheta(ch.a); tB = leafTheta(ch.b); rA = rB = RI;
    } else {
      tA = matchTheta(ch.a); tB = matchTheta(ch.b);
      rA = matchRadius(ch.a); rB = matchRadius(ch.b);
    }

    const sw = m <= 16 ? 1.6 : m <= 24 ? 2 : m <= 28 ? 2.4 : 3;
    arcs += `<path d="${halfBracket(rA,mr,tA,mt)}" fill="none" stroke="${arcColor(m,0)}" stroke-width="${sw}" stroke-linecap="round"/>`;
    arcs += `<path d="${halfBracket(rB,mr,tB,mt)}" fill="none" stroke="${arcColor(m,1)}" stroke-width="${sw}" stroke-linecap="round"/>`;
  }

  // ── Short radial lines: outer badge → inner dot ──
  for (let i = 0; i < 32; i++) {
    const th = leafTheta(i);
    const p1 = pc(RL - BR_OUTER - 1, th);
    const p2 = pc(RI + BR_INNER + 1, th);
    arcs += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(200,210,230,0.22)" stroke-width="1.4"/>`;
  }

  // ── Match junction nodes (R32-SF) ──
  for (let m = 1; m <= 30; m++) {
    const mt = matchTheta(m), mr = matchRadius(m);
    const {x,y} = pc(mr, mt);
    const [tA, tB] = matchTeams(m);
    const w = winners[m];
    const nr = m<=16 ? 8 : m<=24 ? 9.5 : m<=28 ? 11 : 13.5;

    let fc, sc;
    if      (m <= 16) { fc='#111e38'; sc='#3a6ab5'; }
    else if (m <= 24) { fc='#0e2a18'; sc='#2a9048'; }
    else if (m <= 28) { fc='#251805'; sc='#c08818'; }
    else              { fc='#220805'; sc='#d05528'; }

    nodes += `<circle cx="${x}" cy="${y}" r="${nr}" fill="${fc}" stroke="${sc}" stroke-width="1.8"/>`;
    if (w != null) {
      const wt = w===0 ? tA : tB;
      if (wt) nodes += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="${nr*1.2}">${wt.f}</text>`;
    }
  }

  // ── Final trophy at center ──
  nodes += `
    <circle cx="${CX}" cy="${CY}" r="50" fill="#110d03" stroke="#e8c020" stroke-width="2.5"/>
    <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="middle" font-size="32">🏆</text>`;
  const fw = winners[31]!=null ? matchTeams(31)[winners[31]] : null;
  if (fw) nodes += `<text x="${CX}" y="${CY+64}" text-anchor="middle" font-size="13" fill="#ffd700" font-weight="700">${fw.f} ${fw.s}</text>`;

  // ── Inner dots (second ring) ──
  for (let i = 0; i < 32; i++) {
    const th = leafTheta(i);
    const {x,y} = pc(RI, th);
    const t = TEAMS[i];

    // Find which R32 match this team is in and whether they won/lost
    const m = Math.floor(i/2) + 1;
    const slot = i % 2;
    const w = winners[m];

    let dotFill = '#0d1a2e';
    let dotStroke = 'rgba(100,150,220,0.6)';
    let dotOpacity = 1;
    if (w != null) {
      if (w === slot) { dotFill='#1a2a0a'; dotStroke='rgba(200,220,80,0.9)'; }
      else { dotOpacity = 0.35; }
    }

    innerDots += `<circle cx="${x}" cy="${y}" r="${BR_INNER}" fill="${dotFill}" stroke="${dotStroke}" stroke-width="1.5" opacity="${dotOpacity}"/>`;
    innerDots += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="10" opacity="${dotOpacity}">${t.f}</text>`;
  }

  // ── Outer badges (first / outermost ring) ──
  for (let i = 0; i < 32; i++) {
    const th = leafTheta(i);
    const {x,y} = pc(RL, th);
    const t = TEAMS[i];
    const cosT = Math.cos(rad(th));

    const m = Math.floor(i/2) + 1;
    const slot = i % 2;
    const w = winners[m];

    let badgeFill = '#0c1828';
    let badgeStroke = 'rgba(90,140,230,0.55)';
    let badgeOpacity = 1;
    if (w != null) {
      if (w === slot) { badgeFill='#182814'; badgeStroke='rgba(190,215,70,0.9)'; }
      else { badgeOpacity = 0.3; }
    }

    outerBadges += `<circle cx="${x}" cy="${y}" r="${BR_OUTER}" fill="${badgeFill}" stroke="${badgeStroke}" stroke-width="2" opacity="${badgeOpacity}"/>`;
    outerBadges += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="18" opacity="${badgeOpacity}">${t.f}</text>`;

    // Short code label
    const lr = RL + BR_OUTER + 7;
    const lp = pc(lr, th);
    const anc = cosT > 0.1 ? 'start' : cosT < -0.1 ? 'end' : 'middle';
    outerBadges += `<text x="${lp.x}" y="${lp.y}" text-anchor="${anc}" dominant-baseline="middle" font-size="8.5" fill="rgba(255,255,255,${badgeOpacity * 0.7})" font-weight="600">${t.s}</text>`;
  }

  // ── Guide circles (very subtle) ──
  let guides = '';
  [RI, RR32, RR16, RQF, RSF].forEach(r => {
    guides += `<circle cx="${CX}" cy="${CY}" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="3 6"/>`;
  });

  document.getElementById('bc').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${SZ} ${SZ}">
    <defs>
      <radialGradient id="bg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#111520"/>
        <stop offset="70%" stop-color="#0a0a0f"/>
        <stop offset="100%" stop-color="#060608"/>
      </radialGradient>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c8a030" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#c8a030" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="${SZ}" height="${SZ}" fill="url(#bg)"/>
    <circle cx="${CX}" cy="${CY}" r="110" fill="url(#glow)"/>
    ${guides}${arcs}${nodes}${innerDots}${outerBadges}
  </svg>`;
}

// ── ESPN Live Data ───────────────────────────────────────────────────────────
const resultMap = {};  // "ABB1-ABB2" (sorted) → winning abbr

function setWinnersFromResults() {
  // Propagate in order: R32→R16→QF→SF→Final
  for (let m = 1; m <= 31; m++) {
    if (winners[m] != null) continue;
    const [tA, tB] = matchTeams(m);
    if (!tA || !tB) continue;
    const key = [tA.s, tB.s].sort().join('-');
    const wAbbr = resultMap[key];
    if (wAbbr) winners[m] = (wAbbr === tA.s) ? 0 : 1;
  }
}

async function fetchESPN() {
  try {
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719';
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    let loaded = 0, completed = 0;
    for (const ev of (data.events || [])) {
      const comp = ev.competitions?.[0];
      if (!comp) continue;
      const [c1, c2] = comp.competitors || [];
      if (!c1 || !c2) continue;

      const a1 = normAbbr(c1.team.abbreviation || '') || nameToAbbr(c1.team.displayName || '') || '';
      const a2 = normAbbr(c2.team.abbreviation || '') || nameToAbbr(c2.team.displayName || '') || '';
      if (!a1 || !a2) continue;

      loaded++;
      const finished = comp.status?.type?.completed === true
                    || comp.status?.type?.name === 'STATUS_FINAL';
      if (!finished) continue;

      completed++;
      const key = [a1, a2].sort().join('-');
      if (c1.winner) resultMap[key] = a1;
      else if (c2.winner) resultMap[key] = a2;
    }

    setWinnersFromResults();
    render();
    document.getElementById('status').textContent =
      `${completed} result${completed!==1?'s':''} loaded · ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    document.getElementById('status').textContent = 'Live data unavailable';
    render();
  }
}

render();
fetchESPN();
</script>
</body>
</html>
