<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Circular Bracket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060810;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 8px 40px;
  overflow-x: hidden;
}
h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; text-align: center; }
.sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; }
#bc { width: 100%; max-width: 720px; }
svg { width: 100%; height: auto; display: block; }
.legend {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.5);
}
.li { display: flex; align-items: center; gap: 6px; }
.ld { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<h1>🏆 FIFA World Cup 2026</h1>
<div class="sub">Knockout Stage · Round of 32 → Final</div>
<div id="bc"></div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#0f2340;border:1.5px solid #4080c0"></div> Round of 32</div>
  <div class="li"><div class="ld" style="background:#0f3520;border:1.5px solid #30c060"></div> Round of 16</div>
  <div class="li"><div class="ld" style="background:#2a1a05;border:1.5px solid #e0a020"></div> Quarter-final</div>
  <div class="li"><div class="ld" style="background:#2a0a05;border:1.5px solid #ff7030"></div> Semi-final</div>
</div>
<script>
const W = 820, H = 820, cx = W/2, cy = H/2;
const RAD = Math.PI / 180;
const STEP = 360 / 32; // 11.25° per slot

const R_TEAM = 355, R_R32 = 282, R_R16 = 212, R_QF = 148, R_SF = 90;
const BADGE = 22, FINAL_R = 42;
const NR = { r32: 8.5, r16: 10, qf: 11.5, sf: 14 };

const TEAMS = [
  {n:'South Africa', s:'RSA', f:'🇿🇦', p:0},
  {n:'Canada',       s:'CAN', f:'🇨🇦', p:1},
  {n:'Netherlands',  s:'NED', f:'🇳🇱', p:2},
  {n:'Morocco',      s:'MAR', f:'🇲🇦', p:3},
  {n:'Germany',      s:'GER', f:'🇩🇪', p:4},
  {n:'Paraguay',     s:'PAR', f:'🇵🇾', p:5},
  {n:'France',       s:'FRA', f:'🇫🇷', p:6},
  {n:'Sweden',       s:'SWE', f:'🇸🇪', p:7},
  {n:'Brazil',       s:'BRA', f:'🇧🇷', p:8},
  {n:'Japan',        s:'JPN', f:'🇯🇵', p:9},
  {n:'Ivory Coast',  s:'CIV', f:'🇨🇮', p:10},
  {n:'Norway',       s:'NOR', f:'🇳🇴', p:11},
  {n:'Mexico',       s:'MEX', f:'🇲🇽', p:12},
  {n:'Ecuador',      s:'ECU', f:'🇪🇨', p:13},
  {n:'England',      s:'ENG', f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', p:14},
  {n:'Congo DR',     s:'COD', f:'🇨🇩', p:15},
  {n:'USA',          s:'USA', f:'🇺🇸', p:16},
  {n:'Bosnia-Herz.', s:'BIH', f:'🇧🇦', p:17},
  {n:'Belgium',      s:'BEL', f:'🇧🇪', p:18},
  {n:'Senegal',      s:'SEN', f:'🇸🇳', p:19},
  {n:'Portugal',     s:'POR', f:'🇵🇹', p:20},
  {n:'Croatia',      s:'CRO', f:'🇭🇷', p:21},
  {n:'Spain',        s:'ESP', f:'🇪🇸', p:22},
  {n:'Austria',      s:'AUT', f:'🇦🇹', p:23},
  {n:'Switzerland',  s:'SUI', f:'🇨🇭', p:24},
  {n:'Algeria',      s:'ALG', f:'🇩🇿', p:25},
  {n:'Colombia',     s:'COL', f:'🇨🇴', p:26},
  {n:'Ghana',        s:'GHA', f:'🇬🇭', p:27},
  {n:'Argentina',    s:'ARG', f:'🇦🇷', p:28},
  {n:'Cape Verde',   s:'CPV', f:'🇨🇻', p:29},
  {n:'Australia',    s:'AUS', f:'🇦🇺', p:30},
  {n:'Egypt',        s:'EGY', f:'🇪🇬', p:31},
];

const R32_M = [73,75,74,77,76,78,79,80,81,82,83,84,85,87,86,88];
const R16_M = [90,89,91,92,94,93,96,95];
const QF_M  = [97,98,99,100];
const SF_M  = [101,102];

function ang(i) { return -90 + i * STEP; }
function mid(s, c) { return ang(s) + (c - 1) / 2 * STEP; }
function pt(r, d) {
  const a = d * RAD;
  return [+(cx + r * Math.cos(a)).toFixed(2), +(cy + r * Math.sin(a)).toFixed(2)];
}

const r32 = Array.from({length:16}, (_, i) => {
  const [x, y] = pt(R_R32, mid(i*2, 2));
  return {x, y, m: R32_M[i]};
});
const r16 = Array.from({length:8}, (_, i) => {
  const [x, y] = pt(R_R16, mid(i*4, 4));
  return {x, y, m: R16_M[i]};
});
const qf = Array.from({length:4}, (_, i) => {
  const [x, y] = pt(R_QF, mid(i*8, 8));
  return {x, y, m: QF_M[i]};
});
const sf = Array.from({length:2}, (_, i) => {
  const [x, y] = pt(R_SF, mid(i*16, 16));
  return {x, y, m: SF_M[i]};
});

function ln(x1, y1, x2, y2, s, w) {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${s}" stroke-width="${w}" stroke-linecap="round"/>`;
}

let lines = '';
// teams → r32
TEAMS.forEach(t => {
  const [tx, ty] = pt(R_TEAM, ang(t.p));
  const n = r32[Math.floor(t.p / 2)];
  lines += ln(tx, ty, n.x, n.y, 'rgba(100,150,255,0.18)', 1.5);
});
// r32 → r16
r32.forEach((n, i) => {
  const p = r16[Math.floor(i / 2)];
  lines += ln(n.x, n.y, p.x, p.y, 'rgba(130,190,255,0.26)', 2);
});
// r16 → qf
r16.forEach((n, i) => {
  const p = qf[Math.floor(i / 2)];
  lines += ln(n.x, n.y, p.x, p.y, 'rgba(255,195,60,0.32)', 2.5);
});
// qf → sf
qf.forEach((n, i) => {
  const p = sf[Math.floor(i / 2)];
  lines += ln(n.x, n.y, p.x, p.y, 'rgba(255,170,30,0.48)', 3);
});
// sf → center
sf.forEach(n => {
  lines += ln(n.x, n.y, cx, cy, 'rgba(255,210,0,0.65)', 3.5);
});

let matchNodes = '';
r32.forEach(n => {
  matchNodes += `<circle cx="${n.x}" cy="${n.y}" r="${NR.r32}" fill="#0f2340" stroke="#4080c0" stroke-width="1.5"/>`;
  matchNodes += `<text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle" font-size="5" fill="rgba(255,255,255,0.8)" font-family="monospace" font-weight="bold">M${n.m}</text>`;
});
r16.forEach(n => {
  matchNodes += `<circle cx="${n.x}" cy="${n.y}" r="${NR.r16}" fill="#0f3520" stroke="#30c060" stroke-width="1.5"/>`;
  matchNodes += `<text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle" font-size="5.5" fill="rgba(255,255,255,0.85)" font-family="monospace" font-weight="bold">M${n.m}</text>`;
});
qf.forEach(n => {
  matchNodes += `<circle cx="${n.x}" cy="${n.y}" r="${NR.qf}" fill="#2a1a05" stroke="#e0a020" stroke-width="2"/>`;
  matchNodes += `<text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="#fff" font-family="monospace" font-weight="bold">M${n.m}</text>`;
});
sf.forEach(n => {
  matchNodes += `<circle cx="${n.x}" cy="${n.y}" r="${NR.sf}" fill="#2a0a05" stroke="#ff7030" stroke-width="2.5"/>`;
  matchNodes += `<text x="${n.x}" y="${n.y}" text-anchor="middle" dominant-baseline="middle" font-size="6.5" fill="#fff" font-family="monospace" font-weight="bold">M${n.m}</text>`;
});

let badges = '';
TEAMS.forEach(t => {
  const a = ang(t.p);
  const [tx, ty] = pt(R_TEAM, a);
  const cosA = Math.cos(a * RAD);

  badges += `<circle cx="${tx}" cy="${ty}" r="${BADGE}" fill="#0c1828" stroke="rgba(80,130,255,0.45)" stroke-width="1.5"/>`;
  badges += `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" font-size="14">${t.f}</text>`;

  // Short code label, rotated radially outward
  const labelR = R_TEAM + BADGE + 9;
  const [lx, ly] = pt(labelR, a);
  let labelSvg;
  if (Math.abs(cosA) <= 0.13) {
    // Near top or bottom: horizontal, centered
    labelSvg = `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="rgba(255,255,255,0.72)" font-weight="600">${t.s}</text>`;
  } else if (cosA > 0) {
    // Right half: rotate by angle, anchor start (text extends outward)
    labelSvg = `<text x="${lx}" y="${ly}" text-anchor="start" dominant-baseline="middle" transform="rotate(${a.toFixed(2)},${lx},${ly})" font-size="7.5" fill="rgba(255,255,255,0.72)" font-weight="600">${t.s}</text>`;
  } else {
    // Left half: rotate by angle+180, anchor end (text extends outward, not upside-down)
    const rot = (a + 180).toFixed(2);
    labelSvg = `<text x="${lx}" y="${ly}" text-anchor="end" dominant-baseline="middle" transform="rotate(${rot},${lx},${ly})" font-size="7.5" fill="rgba(255,255,255,0.72)" font-weight="600">${t.s}</text>`;
  }
  badges += labelSvg;
});

const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">
<defs>
  <radialGradient id="bgG" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0a1428"/>
    <stop offset="100%" stop-color="#060810"/>
  </radialGradient>
  <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd700" stop-opacity="0.65"/>
    <stop offset="55%" stop-color="#ff8c00" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="${W}" height="${H}" fill="url(#bgG)"/>

<!-- Guide circles -->
<circle cx="${cx}" cy="${cy}" r="${R_R32}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="3 5"/>
<circle cx="${cx}" cy="${cy}" r="${R_R16}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="3 5"/>
<circle cx="${cx}" cy="${cy}" r="${R_QF}"  fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="3 5"/>
<circle cx="${cx}" cy="${cy}" r="${R_SF}"  fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="3 5"/>

<!-- Lines -->
${lines}

<!-- Match nodes -->
${matchNodes}

<!-- Final -->
<circle cx="${cx}" cy="${cy}" r="${FINAL_R + 20}" fill="url(#glowG)"/>
<circle cx="${cx}" cy="${cy}" r="${FINAL_R}" fill="#120e05" stroke="#ffd700" stroke-width="2.5"/>
<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="28">🏆</text>
<text x="${cx}" y="${+cy + FINAL_R + 14}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="rgba(255,215,0,0.65)" letter-spacing="2" font-weight="700">FINAL</text>

<!-- Team badges + labels -->
${badges}
</svg>`;

document.getElementById('bc').innerHTML = svg;
</script>
</body>
</html>
