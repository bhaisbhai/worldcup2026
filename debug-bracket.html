<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Cup 2026 — Bracket</title>
<style>
:root { --neon:#00ff87; --neon2:#60efff; --bg:#0a0d14; --glass:rgba(18,24,38,0.85); }
* { margin:0; padding:0; box-sizing:border-box; }
html { background:var(--bg); }
body {
  background:var(--bg);
  background-image:
    radial-gradient(circle at 50% 50%,rgba(0,255,135,0.04) 0%,transparent 60%),
    radial-gradient(circle at 20% 30%,rgba(96,239,255,0.02) 0%,transparent 40%);
  color:#f8fafc;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:12px 0 24px;
}
.hud {
  background:var(--glass); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  padding:10px 28px; border-radius:14px; text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4); margin-bottom:10px;
}
.hud h1 {
  font-size:14px; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin:0;
  background:linear-gradient(to right,#fff,#94a3b8);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.hud p { font-size:9px; color:var(--neon); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin:2px 0 0; }
#bc { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
svg { display:block; min-width:620px; width:100%; max-width:750px; height:auto; touch-action:pan-x pan-y pinch-zoom; }
.telemetry {
  background:var(--glass); border:1px solid rgba(255,255,255,0.06);
  padding:8px 22px; border-radius:30px; font-size:9px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase; color:#94a3b8; margin-top:10px;
}
.telemetry em { color:var(--neon2); font-style:normal; margin-left:4px; }
</style>
</head>
<body>
<div class="hud">
  <h1>🏆 FIFA World Cup 2026</h1>
  <p>Live Knockout Stage</p>
</div>
<div id="bc"></div>
<div class="telemetry">Status: <em id="status">Loading live results…</em></div>
<script>
const SZ=850, CX=425, CY=425;
const radialMatrix = {
  t1_out: 380, t1_in: 330,
  t2_out: 260, t2_in: 210,
  t3_out: 150, t3_in: 110,
  t4_out: 70,  t4_in: 45
};
const NEON='#00ff87', NEON2='#60efff';

const TEAMS=[
  {n:'South Africa',s:'RSA',f:'🇿🇦'},{n:'Canada',s:'CAN',f:'🇨🇦'},
  {n:'Netherlands',s:'NED',f:'🇳🇱'},{n:'Morocco',s:'MAR',f:'🇲🇦'},
  {n:'Germany',s:'GER',f:'🇩🇪'},{n:'Paraguay',s:'PAR',f:'🇵🇾'},
  {n:'France',s:'FRA',f:'🇫🇷'},{n:'Sweden',s:'SWE',f:'🇸🇪'},
  {n:'Brazil',s:'BRA',f:'🇧🇷'},{n:'Japan',s:'JPN',f:'🇯🇵'},
  {n:'Ivory Coast',s:'CIV',f:'🇨🇮'},{n:'Norway',s:'NOR',f:'🇳🇴'},
  {n:'Mexico',s:'MEX',f:'🇲🇽'},{n:'Ecuador',s:'ECU',f:'🇪🇨'},
  {n:'England',s:'ENG',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Congo DR',s:'COD',f:'🇨🇩'},
  {n:'USA',s:'USA',f:'🇺🇸'},{n:'Bosnia-Herz.',s:'BIH',f:'🇧🇦'},
  {n:'Belgium',s:'BEL',f:'🇧🇪'},{n:'Senegal',s:'SEN',f:'🇸🇳'},
  {n:'Portugal',s:'POR',f:'🇵🇹'},{n:'Croatia',s:'CRO',f:'🇭🇷'},
  {n:'Spain',s:'ESP',f:'🇪🇸'},{n:'Austria',s:'AUT',f:'🇦🇹'},
  {n:'Switzerland',s:'SUI',f:'🇨🇭'},{n:'Algeria',s:'ALG',f:'🇩🇿'},
  {n:'Colombia',s:'COL',f:'🇨🇴'},{n:'Ghana',s:'GHA',f:'🇬🇭'},
  {n:'Argentina',s:'ARG',f:'🇦🇷'},{n:'Cape Verde',s:'CPV',f:'🇨🇻'},
  {n:'Australia',s:'AUS',f:'🇦🇺'},{n:'Egypt',s:'EGY',f:'🇪🇬'},
];

const ESPN_MAP={'IVC':'CIV','CGO':'COD','DRC':'COD','BOS':'BIH','CVO':'CPV','CTA':'CIV','CNG':'COD'};
function normAbbr(a){return ESPN_MAP[a]||a;}
const NAME_FRAGS={'ivory':'CIV','côte':'CIV','cote':'CIV','congo':'COD','democratic republic':'COD','bosnia':'BIH','herzegovina':'BIH','cape verde':'CPV','england':'ENG'};
function nameToAbbr(n){const l=n.toLowerCase();for(const[k,v]of Object.entries(NAME_FRAGS))if(l.includes(k))return v;return null;}

function rad(d){return d*Math.PI/180;}
function pt(r,deg){return{x:+(CX+r*Math.cos(rad(deg))).toFixed(2),y:+(CY+r*Math.sin(rad(deg))).toFixed(2)};}

// Radial bracket path from Cuppy
function getRadialBracketPath(r1, a1, r2, a2, r_mid) {
  const p1 = pt(r1, a1);
  if (Math.abs(a1 - a2) < 0.001) {
    const p2 = pt(r2, a2);
    return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
  }
  const pm1 = pt(r_mid, a1);
  const pm2 = pt(r_mid, a2);
  const p2 = pt(r2, a2);
  let diff = a2 - a1;
  while (diff < -180) diff += 360;
  while (diff > 180) diff -= 360;
  const sweepFlag = diff >= 0 ? 1 : 0;
  return `M ${p1.x} ${p1.y} L ${pm1.x} ${pm1.y} A ${r_mid} ${r_mid} 0 0 ${sweepFlag} ${pm2.x} ${pm2.y} L ${p2.x} ${p2.y}`;
}

// ── State ──────────────────────────────────────────────────────────────────────
let r32W=new Array(16).fill(null);
let r16W=new Array(8).fill(null);
let qfW=new Array(4).fill(null);
let sfW=new Array(2).fill(null);
let finW=null;

function r16Team(j,s){const m=2*j+s,w=r32W[m];return w!=null?TEAMS[2*m+w]:null;}
function qfTeam(j,s){const m=2*j+s,w=r16W[m];return w!=null?r16Team(m,w):null;}
function sfTeam(j,s){const m=2*j+s,w=qfW[m];return w!=null?qfTeam(m,w):null;}
function sfWinner(j){const w=sfW[j];return w!=null?sfTeam(j,w):null;}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  const nodes = [];
  const nodesMap = {};

  function addNode(id, r, angle, tObj, won, parentId) {
    const coord = pt(r, angle);
    const nodeObj = {
      id,
      cx: coord.x,
      cy: coord.y,
      r,
      angle,
      name: tObj?.n || 'TBD',
      flag: tObj?.f || '🏳️',
      won: !!won,
      parentId
    };
    nodes.push(nodeObj);
    nodesMap[id] = nodeObj;
  }

  // 1. Tier 1 (Round of 32)
  for (let i = 0; i < 16; i++) {
    const angle = i * 22.5 - 90;
    const tAway = TEAMS[2*i+1];
    const tHome = TEAMS[2*i];
    const outWon = r32W[i] === 1;
    const inWon = r32W[i] === 0;

    const nextTierIndex = Math.floor(i / 2);
    const routesToOuter = (i % 2 === 0);
    const targetParentId = `t2-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t1-out-${i}`, radialMatrix.t1_out, angle, tAway, outWon, `t1-in-${i}`);
    addNode(`t1-in-${i}`, radialMatrix.t1_in, angle, tHome, inWon, targetParentId);
  }

  // 2. Tier 2 (Round of 16)
  for (let k = 0; k < 8; k++) {
    const angle = k * 45 - 90 + 11.25;
    const tOut = r16Team(k, 0);
    const tIn = r16Team(k, 1);
    const outWon = r16W[k] === 0;
    const inWon = r16W[k] === 1;

    const nextTierIndex = Math.floor(k / 2);
    const routesToOuter = (k % 2 === 0);
    const targetParentId = `t3-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t2-out-${k}`, radialMatrix.t2_out, angle, tOut, outWon, `t2-in-${k}`);
    addNode(`t2-in-${k}`, radialMatrix.t2_in, angle, tIn, inWon, targetParentId);
  }

  // 3. Tier 3 (Quarterfinals)
  for (let m = 0; m < 4; m++) {
    const angle = m * 90 - 90 + 5.625;
    const tOut = qfTeam(m, 0);
    const tIn = qfTeam(m, 1);
    const outWon = qfW[m] === 0;
    const inWon = qfW[m] === 1;

    const nextTierIndex = Math.floor(m / 2);
    const routesToOuter = (m % 2 === 0);
    const targetParentId = `t4-${routesToOuter ? 'out' : 'in'}-${nextTierIndex}`;

    addNode(`t3-out-${m}`, radialMatrix.t3_out, angle, tOut, outWon, `t3-in-${m}`);
    addNode(`t3-in-${m}`, radialMatrix.t3_in, angle, tIn, inWon, targetParentId);
  }

  // 4. Tier 4 (Semifinals)
  for (let s = 0; s < 2; s++) {
    const angle = s * 180 - 90 + 2.8125;
    const tOut = sfTeam(s, 0);
    const tIn = sfTeam(s, 1);
    const outWon = sfW[s] === 0;
    const inWon = sfW[s] === 1;

    addNode(`t4-out-${s}`, radialMatrix.t4_out, angle, tOut, outWon, `t4-in-${s}`);
    addNode(`t4-in-${s}`, radialMatrix.t4_in, angle, tIn, inWon, 'masterHub');
  }

  // Champion
  const champ = finW != null ? sfWinner(finW) : null;

  const DEFS=`<defs>
    <radialGradient id="tGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${NEON}" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="${NEON}" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonArc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="${NEON}" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonNode" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feFlood flood-color="${NEON}" flood-opacity="0.75" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonBadge" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feFlood flood-color="${NEON2}" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // Concentric dashed guide rings
  let guides = '';
  const rings = [
    { size: 380 * 2, type: 'solid' },
    { size: 330 * 2, type: 'dashed' },
    { size: 260 * 2, type: 'solid' },
    { size: 210 * 2, type: 'dashed' },
    { size: 150 * 2, type: 'solid' },
    { size: 110 * 2, type: 'dashed' },
    { size: 70 * 2,  type: 'solid' },
    { size: 45 * 2,  type: 'dashed' }
  ];
  rings.forEach(rg => {
    const strokeDash = rg.type === 'dashed' ? 'stroke-dasharray="3 6"' : '';
    guides += `<circle cx="${CX}" cy="${CY}" r="${rg.size / 2}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" ${strokeDash}/>`;
  });

  // Draw lines
  let lines = '';
  nodes.forEach(node => {
    if (!node.parentId) return;
    let r2 = 0;
    let a2 = node.angle;

    if (node.parentId !== 'masterHub') {
      const parent = nodesMap[node.parentId];
      if (!parent) return;
      r2 = parent.r;
      a2 = parent.angle;
    } else {
      r2 = 0;
      a2 = node.angle;
    }

    const isProg = node.won;
    const r_mid = (node.r + r2) / 2;
    const pathD = getRadialBracketPath(node.r, node.angle, r2, a2, r_mid);

    let strokeColor = 'rgba(255, 255, 255, 0.15)';
    let strokeWidth = 1.5;
    let filterStyle = '';

    if (isProg) {
      strokeColor = 'rgba(0, 255, 135, 0.65)';
      strokeWidth = 2.5;
      filterStyle = 'filter="url(#neonArc)"';
    }

    lines += `<path id="pipe-${node.id}" d="${pathD}" fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" ${filterStyle} style="transition: stroke 0.3s, stroke-width 0.3s; pointer-events: none;"/>`;
  });

  // Draw flag circles (nodes)
  let flagNodes = '';
  nodes.forEach(node => {
    const isTBD = !node.flag || node.flag === '🏳️' || !node.name || /Winner|Runner-up|TBD|W M\d/.test(node.name);
    
    let tr = 18;
    let fs = 15;
    if (node.id.startsWith('t1-')) { tr = 18; fs = 16; }
    else if (node.id.startsWith('t2-')) { tr = 16; fs = 14; }
    else if (node.id.startsWith('t3-')) { tr = 14; fs = 12; }
    else if (node.id.startsWith('t4-')) { tr = 12; fs = 10; }

    const bgFill = node.won ? 'rgba(0, 255, 135, 0.18)' : isTBD ? 'rgba(30, 35, 45, 0.85)' : 'rgba(15, 20, 30, 0.93)';
    const stroke = node.won ? 'rgba(0, 255, 135, 0.75)' : isTBD ? 'rgba(255, 255, 255, 0.08)' : 'rgba(255, 255, 255, 0.22)';
    const sw = node.won ? 2.2 : 1.2;
    const filterStyle = node.won ? 'filter="url(#neonNode)"' : '';

    flagNodes += `
      <g class="radial-node-group" id="node-${node.id}" style="cursor:pointer" data-id="${node.id}" data-name="${(node.name||'').replace(/"/g,"'")}">
        <circle cx="${node.cx}" cy="${node.cy}" r="${tr}" fill="${bgFill}" stroke="${stroke}" stroke-width="${sw}" ${filterStyle} style="transition: transform 0.2s, stroke 0.2s; transform-origin: ${node.cx}px ${node.cy}px;">
          <title>${node.name}</title>
        </circle>
        <text x="${node.cx}" y="${node.cy}" text-anchor="middle" dominant-baseline="central"
          font-size="${isTBD ? Math.round(fs * 0.7) : fs}" style="pointer-events:none;user-select:none"
          fill="${isTBD ? 'rgba(255,255,255,0.22)' : '#fff'}">${isTBD ? '?' : node.flag}</text>
      </g>
    `;
  });

  // Trophy in center
  const centerFill = champ ? 'rgba(0, 255, 135, 0.1)' : 'rgba(255, 215, 0, 0.05)';
  const centerStroke = champ ? '#00ff87' : 'rgba(255, 215, 0, 0.25)';
  const centerFilter = champ ? 'filter="url(#neonNode)"' : '';

  flagNodes += `
    <g class="radial-node-group" id="node-masterHub" style="cursor:pointer" data-id="masterHub" data-name="${(champ?.n || 'Champion TBD').replace(/"/g,"'")}">
      <circle cx="${CX}" cy="${CY}" r="38" fill="${centerFill}" stroke="${centerStroke}" stroke-width="2" ${centerFilter}/>
      <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central" font-size="28" style="pointer-events:none">🏆</text>
      ${champ ? `<text x="${CX}" y="${CY + 52}" text-anchor="middle" font-size="12" fill="#00ff87" font-weight="700" style="pointer-events:none">${champ.f} ${champ.s}</text>` : ''}
    </g>
  `;

  document.getElementById('bc').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${SZ} ${SZ}" style="width:100%;max-width:750px;height:auto;display:block;margin:0 auto;overflow:hidden">
    ${DEFS}
    <rect width="${SZ}" height="${SZ}" fill="#0a0d14" rx="12"/>
    ${guides}${lines}${flagNodes}
  </svg>`;

  // Centre scroll on mobile
  const bc=document.getElementById('bc');
  if(bc.scrollWidth>bc.clientWidth)bc.scrollLeft=(bc.scrollWidth-bc.clientWidth)/2;

  // Bind hover/touch interactions
  const groups = bc.querySelectorAll('.radial-node-group');
  groups.forEach(g => {
    const nodeId = g.getAttribute('data-id');
    const teamName = g.getAttribute('data-name');

    const handleEnter = () => {
      const activePath = new Set();
      let currentId = nodeId;
      while (currentId) {
        activePath.add(currentId);
        const node = nodesMap[currentId];
        currentId = node ? node.parentId : null;
        if (currentId === 'masterHub') {
          activePath.add('masterHub');
          break;
        }
      }

      document.getElementById('status').textContent = teamName || 'TBD';

      activePath.forEach(id => {
        const pipe = bc.querySelector(`#pipe-${id}`);
        if (pipe) {
          pipe.setAttribute('stroke', '#60efff');
          pipe.setAttribute('stroke-width', '3.5');
          pipe.setAttribute('filter', 'url(#neonArc)');
        }
        const nodeEl = bc.querySelector(`#node-${id} circle`);
        if (nodeEl) {
          nodeEl.style.transform = 'scale(1.25)';
          nodeEl.setAttribute('stroke', '#60efff');
          nodeEl.setAttribute('stroke-width', '2.2');
          nodeEl.setAttribute('filter', 'url(#neonBadge)');
        }
      });
    };

    const handleLeave = () => {
      document.getElementById('status').textContent = statusText;

      nodes.forEach(node => {
        const pipe = bc.querySelector(`#pipe-${node.id}`);
        if (pipe) {
          const isProg = node.won;
          pipe.setAttribute('stroke', isProg ? 'rgba(0, 255, 135, 0.65)' : 'rgba(255, 255, 255, 0.15)');
          pipe.setAttribute('stroke-width', isProg ? '2.5' : '1.5');
          if (isProg) {
            pipe.setAttribute('filter', 'url(#neonArc)');
          } else {
            pipe.removeAttribute('filter');
          }
        }
        const nodeEl = bc.querySelector(`#node-${node.id} circle`);
        if (nodeEl) {
          nodeEl.style.transform = 'scale(1)';
          const isTBD = !node.flag || node.flag === '🏳️' || !node.name || /Winner|Runner-up|TBD|W M\d/.test(node.name);
          nodeEl.setAttribute('stroke', node.won ? 'rgba(0, 255, 135, 0.75)' : isTBD ? 'rgba(255, 255, 255, 0.08)' : 'rgba(255, 255, 255, 0.22)');
          nodeEl.setAttribute('stroke-width', node.won ? '2.2' : '1.2');
          if (node.won) {
            nodeEl.setAttribute('filter', 'url(#neonNode)');
          } else {
            nodeEl.removeAttribute('filter');
          }
        }
      });

      const masterCircle = bc.querySelector('#node-masterHub circle');
      if (masterCircle) {
        masterCircle.style.transform = 'scale(1)';
        masterCircle.setAttribute('stroke', champ ? '#00ff87' : 'rgba(255, 215, 0, 0.25)');
        masterCircle.setAttribute('stroke-width', '2');
        if (champ) {
          masterCircle.setAttribute('filter', 'url(#neonNode)');
        } else {
          masterCircle.removeAttribute('filter');
        }
      }
    };

    g.addEventListener('mouseenter', handleEnter);
    g.addEventListener('mouseleave', handleLeave);
    g.addEventListener('touchstart', e => { e.stopPropagation(); handleEnter(); }, {passive:true});
  });

  bc.addEventListener('touchstart', () => {
    nodes.forEach(node => {
      const pipe = bc.querySelector(`#pipe-${node.id}`);
      if (pipe) {
        const isProg = node.won;
        pipe.setAttribute('stroke', isProg ? 'rgba(0, 255, 135, 0.65)' : 'rgba(255, 255, 255, 0.15)');
        pipe.setAttribute('stroke-width', isProg ? '2.5' : '1.5');
      }
      const nodeEl = bc.querySelector(`#node-${node.id} circle`);
      if (nodeEl) {
        nodeEl.style.transform = 'scale(1)';
      }
    });
    const masterCircle = bc.querySelector('#node-masterHub circle');
    if (masterCircle) masterCircle.style.transform = 'scale(1)';
    document.getElementById('status').textContent = statusText;
  }, {passive:true});
}

// ── ESPN live data ─────────────────────────────────────────────────────────────
const resultMap={};
let statusText='Awaiting live data…';

function propagate(){
  for(let j=0;j<16;j++){
    if(r32W[j]!=null)continue;
    const tA=TEAMS[2*j],tB=TEAMS[2*j+1];
    const k=[tA.s,tB.s].sort().join('-'),w=resultMap[k];
    if(w)r32W[j]=w===tA.s?0:1;
  }
  for(let j=0;j<8;j++){
    if(r16W[j]!=null)continue;
    const tA=r16Team(j,0),tB=r16Team(j,1);
    if(!tA||!tB)continue;
    const k=[tA.s,tB.s].sort().join('-'),w=resultMap[k];
    if(w)r16W[j]=w===tA.s?0:1;
  }
  for(let j=0;j<4;j++){
    if(qfW[j]!=null)continue;
    const tA=qfTeam(j,0),tB=qfTeam(j,1);
    if(!tA||!tB)continue;
    const k=[tA.s,tB.s].sort().join('-'),w=resultMap[k];
    if(w)qfW[j]=w===tA.s?0:1;
  }
  for(let j=0;j<2;j++){
    if(sfW[j]!=null)continue;
    const tA=sfTeam(j,0),tB=sfTeam(j,1);
    if(!tA||!tB)continue;
    const k=[tA.s,tB.s].sort().join('-'),w=resultMap[k];
    if(w)sfW[j]=w===tA.s?0:1;
  }
  if(finW==null){
    const tA=sfWinner(0),tB=sfWinner(1);
    if(tA&&tB){const k=[tA.s,tB.s].sort().join('-'),w=resultMap[k];if(w)finW=w===tA.s?0:1;}
  }
}

async function fetchESPN(){
  try{
    const res=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719');
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    let completed=0;
    for(const ev of(data.events||[])){
      const comp=ev.competitions?.[0];if(!comp)continue;
      const[c1,c2]=comp.competitors||[];if(!c1||!c2)continue;
      const a1=normAbbr(c1.team.abbreviation||'')||nameToAbbr(c1.team.displayName||'')||'';
      const a2=normAbbr(c2.team.abbreviation||'')||nameToAbbr(c2.team.displayName||'')||'';
      if(!a1||!a2)continue;
      const done=comp.status?.type?.completed===true||comp.status?.type?.name==='STATUS_FINAL';
      if(!done)continue;
      completed++;
      const k=[a1,a2].sort().join('-');
      if(c1.winner)resultMap[k]=a1;else if(c2.winner)resultMap[k]=a2;
    }
    propagate();
    statusText=`${completed} result${completed!==1?'s':''} loaded · ${new Date().toLocaleTimeString()}`;
    document.getElementById('status').textContent=statusText;
    render();
  }catch(e){
    statusText='Live data unavailable — tap a team to trace their path';
    document.getElementById('status').textContent=statusText;
    render();
  }
}

render();
fetchESPN();
</script>
